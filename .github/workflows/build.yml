name: Build TradeFlow Bot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/tradeflow/bot
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          # -------------------- build.gradle (root) --------------------
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          EOF

          # -------------------- settings.gradle --------------------
          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "TradeFlowBot"
          include ':app'
          EOF

          # -------------------- gradle.properties --------------------
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.suppressUnsupportedCompileSdk=34
          EOF

          # -------------------- app/build.gradle --------------------
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace 'com.tradeflow.bot'
              compileSdk 34

              defaultConfig {
                  applicationId "com.tradeflow.bot"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.code.gson:gson:2.10.1'
          }

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
              }
          }
          EOF

          # -------------------- AndroidManifest.xml --------------------
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.VIBRATE" />

              <application
                  android:label="TradeFlow Bot"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:icon="@android:drawable/ic_dialog_info">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".TradingService"
                      android:enabled="true"
                      android:exported="false" />
              </application>
          </manifest>
          EOF

          # -------------------- styles.xml --------------------
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar" />
          </resources>
          EOF

          # -------------------- activity_main.xml --------------------
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="16dp"
              android:background="#EEF2F5">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="TradeFlow Bot"
                  android:textSize="24sp"
                  android:textStyle="bold"
                  android:textColor="#1F3A4B"
                  android:layout_marginBottom="20dp"/>

              <EditText
                  android:id="@+id/tokenInput"
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:hint="API Token"
                  android:inputType="textPassword"
                  android:padding="12dp"
                  android:background="@android:drawable/editbox_background"
                  android:layout_marginBottom="12dp"
                  android:text="0XhlE5tsI6zdpFX"/>

              <EditText
                  android:id="@+id/accountInput"
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:hint="Account ID"
                  android:padding="12dp"
                  android:background="@android:drawable/editbox_background"
                  android:layout_marginBottom="20dp"
                  android:text="VRTC11510184"/>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal">

                  <Button
                      android:id="@+id/startButton"
                      android:layout_width="0dp"
                      android:layout_weight="1"
                      android:layout_height="55dp"
                      android:text="START"
                      android:backgroundTint="#15803D"
                      android:layout_marginEnd="8dp"/>

                  <Button
                      android:id="@+id/stopButton"
                      android:layout_width="0dp"
                      android:layout_weight="1"
                      android:layout_height="55dp"
                      android:text="STOP"
                      android:backgroundTint="#B91C1C"
                      android:layout_marginStart="8dp"/>
              </LinearLayout>

              <TextView
                  android:id="@+id/statusText"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Status: Stopped"
                  android:gravity="center"
                  android:padding="12dp"
                  android:layout_marginTop="16dp"
                  android:background="#FFFFFF"
                  android:textStyle="bold"/>

              <TextView
                  android:id="@+id/balanceText"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Balance: Loading..."
                  android:padding="12dp"
                  android:layout_marginTop="8dp"
                  android:background="#FFFFFF"
                  android:gravity="center"
                  android:fontFamily="monospace"/>

              <TextView
                  android:text="Active Trades"
                  android:textSize="14sp"
                  android:textStyle="bold"
                  android:layout_marginTop="12dp"
                  android:layout_marginBottom="4dp"/>

              <TextView
                  android:id="@+id/activeTradesText"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="None"
                  android:padding="8dp"
                  android:background="#FFFFFF"
                  android:textSize="11sp"
                  android:typeface="monospace"/>

              <TextView
                  android:text="Event Log"
                  android:textSize="14sp"
                  android:textStyle="bold"
                  android:layout_marginTop="12dp"
                  android:layout_marginBottom="4dp"/>

              <ScrollView
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"
                  android:background="#FFFFFF"
                  android:padding="8dp">

                  <TextView
                      android:id="@+id/logText"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Ready..."
                      android:textSize="10sp"
                      android:typeface="monospace"/>
              </ScrollView>

              <TextView
                  android:id="@+id/internetStatus"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Internet: Checking..."
                  android:padding="8dp"
                  android:layout_marginTop="8dp"
                  android:background="#FFFFFF"
                  android:gravity="center"
                  android:textSize="11sp"/>

          </LinearLayout>
          EOF

          # -------------------- MainActivity.java --------------------
          cat > app/src/main/java/com/tradeflow/bot/MainActivity.java << 'EOF'
          package com.tradeflow.bot;

          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.net.InetAddress;

          public class MainActivity extends AppCompatActivity {
              private EditText tokenInput, accountInput;
              private Button startButton, stopButton;
              private TextView statusText, balanceText, activeTradesText, logText, internetStatus;
              private SharedPreferences prefs;
              private Handler handler = new Handler(Looper.getMainLooper());
              private boolean isBotRunning = false;
              private Runnable internetRunnable;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  tokenInput = findViewById(R.id.tokenInput);
                  accountInput = findViewById(R.id.accountInput);
                  startButton = findViewById(R.id.startButton);
                  stopButton = findViewById(R.id.stopButton);
                  statusText = findViewById(R.id.statusText);
                  balanceText = findViewById(R.id.balanceText);
                  activeTradesText = findViewById(R.id.activeTradesText);
                  logText = findViewById(R.id.logText);
                  internetStatus = findViewById(R.id.internetStatus);

                  prefs = getSharedPreferences("tradeflow", Context.MODE_PRIVATE);
                  tokenInput.setText(prefs.getString("api_token", "0XhlE5tsI6zdpFX"));
                  accountInput.setText(prefs.getString("account_id", "VRTC11510184"));

                  startButton.setOnClickListener(v -> startBot());
                  stopButton.setOnClickListener(v -> stopBot());

                  startInternetMonitor();
                  startDataRefresh();
              }
              private void startBot() {
                  String token = tokenInput.getText().toString().trim();
                  String account = accountInput.getText().toString().trim();

                  if (token.isEmpty() || account.isEmpty()) {
                      Toast.makeText(this, "Enter API Token and Account ID", Toast.LENGTH_SHORT).show();
                      return;
                  }

                  prefs.edit().putString("api_token", token).putString("account_id", account).apply();
                  isBotRunning = true;

                  Intent intent = new Intent(this, TradingService.class);
                  intent.putExtra("API_TOKEN", token);
                  intent.putExtra("ACCOUNT_ID", account);
                  startForegroundService(intent);

                  statusText.setText("Status: RUNNING");
                  statusText.setTextColor(getColor(android.R.color.holo_green_dark));
                  addLog("Bot started");
                  Toast.makeText(this, "Trading bot started", Toast.LENGTH_SHORT).show();
              }

              private void stopBot() {
                  isBotRunning = false;
                  Intent intent = new Intent(this, TradingService.class);
                  stopService(intent);
                  statusText.setText("Status: STOPPED");
                  statusText.setTextColor(getColor(android.R.color.darker_gray));
                  addLog("Bot stopped");
                  Toast.makeText(this, "Trading bot stopped", Toast.LENGTH_SHORT).show();
              }

              private void startDataRefresh() {
                  new Thread(() -> {
                      while (true) {
                          try { Thread.sleep(2000); } catch (InterruptedException e) { break; }
                          runOnUiThread(() -> {
                              float balance = prefs.getFloat("balance", 0f);
                              balanceText.setText(String.format("Balance: $%.2f", balance));
                              String activeTrades = prefs.getString("active_trades", "None");
                              activeTradesText.setText(activeTrades);
                          });
                      }
                  }).start();
              }

              private void startInternetMonitor() {
                  internetRunnable = new Runnable() {
                      @Override
                      public void run() {
                          boolean connected = isInternetAvailable();
                          runOnUiThread(() -> {
                              if (connected) {
                                  internetStatus.setText("Internet: Connected");
                                  internetStatus.setTextColor(getColor(android.R.color.holo_green_dark));
                              } else {
                                  internetStatus.setText("Internet: DISCONNECTED");
                                  internetStatus.setTextColor(getColor(android.R.color.holo_red_dark));
                              }
                          });
                          handler.postDelayed(this, 1000);
                      }
                  };
                  handler.post(internetRunnable);
              }

              private boolean isInternetAvailable() {
                  try {
                      InetAddress.getByName("google.com").isReachable(2000);
                      return true;
                  } catch (Exception e) {
                      return false;
                  }
              }

              public void addLog(String message) {
                  runOnUiThread(() -> {
                      String timestamp = new java.text.SimpleDateFormat("HH:mm:ss", java.util.Locale.getDefault())
                          .format(new java.util.Date());
                      logText.append("\n[" + timestamp + "] " + message);
                  });
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (handler != null && internetRunnable != null) {
                      handler.removeCallbacks(internetRunnable);
                  }
              }
          }
          EOF

          # -------------------- TradingService.java --------------------
          cat > app/src/main/java/com/tradeflow/bot/TradingService.java << 'EOF'
          package com.tradeflow.bot;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;

          public class TradingService extends Service {
              private DerivWebSocket webSocket;
              private SharedPreferences prefs;
              public static boolean isRunning = false;

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  String apiToken = intent.getStringExtra("API_TOKEN");
                  String accountId = intent.getStringExtra("ACCOUNT_ID");

                  if (apiToken == null || accountId == null) {
                      stopSelf();
                      return START_NOT_STICKY;
                  }

                  prefs = getSharedPreferences("tradeflow", MODE_PRIVATE);
                  isRunning = true;

                  createNotificationChannel();
                  startForeground(1, createNotification());

                  webSocket = new DerivWebSocket(apiToken, accountId, this::onMessage, this::onError, this::onBalance, this::onPortfolio);
                  webSocket.connect();

                  return START_STICKY;
              }

              private void onMessage(String message) { }
              private void onBalance(double balance) { prefs.edit().putFloat("balance", (float) balance).apply(); }
              private void onPortfolio(String portfolioData) { prefs.edit().putString("active_trades", portfolioData).apply(); }
              private void onError(String error) { android.util.Log.e("TradingService", error); }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel("tradeflow", "TradeFlow Bot", NotificationManager.IMPORTANCE_LOW);
                      getSystemService(NotificationManager.class).createNotificationChannel(channel);
                  }
              }

              private Notification createNotification() {
                  Intent intent = new Intent(this, MainActivity.class);
                  PendingIntent pendingIntent = PendingIntent.getActivity(this, 0, intent, PendingIntent.FLAG_IMMUTABLE);
                  return new NotificationCompat.Builder(this, "tradeflow")
                      .setContentTitle("TradeFlow Bot")
                      .setContentText("Trading bot is running")
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .setContentIntent(pendingIntent)
                      .build();
              }

              @Override
              public void onDestroy() {
                  isRunning = false;
                  if (webSocket != null) webSocket.disconnect();
                  super.onDestroy();
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

          # -------------------- DerivWebSocket.java --------------------
          cat > app/src/main/java/com/tradeflow/bot/DerivWebSocket.java << 'EOF'
          package com.tradeflow.bot;

          import com.google.gson.Gson;
          import com.google.gson.JsonArray;
          import com.google.gson.JsonObject;
          import com.google.gson.JsonParser;
          import okhttp3.OkHttpClient;
          import okhttp3.Request;
          import okhttp3.Response;
          import okhttp3.WebSocket;
          import okhttp3.WebSocketListener;
          import okio.ByteString;
          import java.util.ArrayList;
          import java.util.HashMap;
          import java.util.List;
          import java.util.Map;
          import java.util.concurrent.TimeUnit;

          public class DerivWebSocket {
              private final String apiToken;
              private final String appId = "32ZFw49Z0RGY4UQGjIrhh";
              private final OnMessageListener onMessage;
              private final OnErrorListener onError;
              private final OnBalanceListener onBalance;
              private final OnPortfolioListener onPortfolio;
              private WebSocket webSocket;
              private final Gson gson;
              private int reqId = 1;
              
              // Strategy tracking
              private Map<String, List<Double>> priceHistory = new HashMap<>();
              private Map<String, List<Double>> highs = new HashMap<>();
              private Map<String, List<Double>> lows = new HashMap<>();
              private int consecutiveLosses = 0;
              private int activeTrades = 0;
              private static final int MAX_TRADES = 3;
              private static final int STOP_AFTER_LOSSES = 3;

              public interface OnMessageListener { void onMessage(String message); }
              public interface OnErrorListener { void onError(String error); }
              public interface OnBalanceListener { void onBalance(double balance); }
              public interface OnPortfolioListener { void onPortfolio(String portfolio); }

              public DerivWebSocket(String apiToken, String accountId, OnMessageListener onMessage, OnErrorListener onError, OnBalanceListener onBalance, OnPortfolioListener onPortfolio) {
                  this.apiToken = apiToken;
                  this.onMessage = onMessage;
                  this.onError = onError;
                  this.onBalance = onBalance;
                  this.onPortfolio = onPortfolio;
                  this.gson = new Gson();
                  
                  OkHttpClient client = new OkHttpClient.Builder().pingInterval(30, TimeUnit.SECONDS).build();
                  
                  this.webSocket = client.newWebSocket(
                      new Request.Builder().url("wss://ws.derivws.com/websockets/v3?app_id=" + appId).build(),
                      new WebSocketListener() {
                          @Override public void onOpen(WebSocket webSocket, Response response) { authenticate(); }
                          @Override public void onMessage(WebSocket webSocket, String text) { handleMessage(text); }
                          @Override public void onMessage(WebSocket webSocket, ByteString bytes) { }
                          @Override public void onClosed(WebSocket webSocket, int code, String reason) { }
                          @Override public void onFailure(WebSocket webSocket, Throwable t, Response response) { 
                              onError.onError(t.getMessage()); 
                          }
                      });
              }

              public void connect() { }

              private void authenticate() {
                  Map<String, Object> auth = new HashMap<>();
                  auth.put("authorize", apiToken);
                  auth.put("req_id", reqId++);
                  send(gson.toJson(auth));
              }

              private void handleMessage(String text) {
                  onMessage.onMessage(text);
                  try {
                      JsonObject json = JsonParser.parseString(text).getAsJsonObject();
                      
                      if (json.has("authorize") && json.get("authorize").getAsJsonObject().get("authorized").getAsBoolean()) {
                          requestBalance();
                          requestPortfolio();
                          subscribeToTicks();
                      }
                      
                      if (json.has("balance")) onBalance.onBalance(json.get("balance").getAsDouble());
                      
                      if (json.has("portfolio")) {
                          JsonArray portfolio = json.get("portfolio").getAsJsonArray();
                          activeTrades = portfolio.size();
                          StringBuilder sb = new StringBuilder();
                          for (int i = 0; i < portfolio.size(); i++) {
                              JsonObject contract = portfolio.get(i).getAsJsonObject();
                              sb.append(contract.has("symbol") ? contract.get("symbol").getAsString() : "Unknown")
                                .append(" | P/L: $").append(contract.has("profit") ? contract.get("profit").getAsDouble() : 0).append("\n");
                          }
                          onPortfolio.onPortfolio(sb.length() > 0 ? sb.toString() : "None");
                      }
                      
                      if (json.has("tick")) {
                          JsonObject tick = json.getAsJsonObject("tick");
                          String symbol = tick.get("symbol").getAsString();
                          double price = tick.get("quote").getAsDouble();
                          processTick(symbol, price);
                      }
                        } catch (Exception e) { onError.onError(e.getMessage()); }
              }
              
              private void processTick(String symbol, double price) {
                  if (symbol.equals("GBPUSD")) return;
                  if (consecutiveLosses >= STOP_AFTER_LOSSES) return;
                  if (activeTrades >= MAX_TRADES) return;
                  
                  priceHistory.computeIfAbsent(symbol, k -> new ArrayList<>()).add(price);
                  highs.computeIfAbsent(symbol, k -> new ArrayList<>()).add(price);
                  lows.computeIfAbsent(symbol, k -> new ArrayList<>()).add(price);
                  
                  List<Double> prices = priceHistory.get(symbol);
                  if (prices.size() > 200) prices.remove(0);
                  if (highs.get(symbol).size() > 100) highs.get(symbol).remove(0);
                  if (lows.get(symbol).size() > 100) lows.get(symbol).remove(0);
                  if (prices.size() < 50) return;
                  
                  // Detect sweep on 45/30 min (simulated using price extremes)
                  double recentHigh = getRecentHigh(highs.get(symbol), 30);
                  double recentLow = getRecentLow(lows.get(symbol), 30);
                  double prevHigh = getRecentHigh(highs.get(symbol), 60);
                  double prevLow = getRecentLow(lows.get(symbol), 60);
                  
                  boolean highSwept = price > prevHigh;
                  boolean lowSwept = price < prevLow;
                  
                  if (highSwept || lowSwept) {
                      // Check for CHOCH
                      boolean chochConfirmed = checkCHOCH(prices);
                      if (chochConfirmed) {
                          executeTrade(symbol, lowSwept);
                      }
                  }
              }
              
              private boolean checkCHOCH(List<Double> prices) {
                  if (prices.size() < 20) return false;
                  double avgLast5 = average(prices.subList(prices.size() - 5, prices.size()));
                  double avgPrev5 = average(prices.subList(prices.size() - 10, prices.size() - 5));
                  return Math.abs(avgLast5 - avgPrev5) > 0.0005;
              }
              
              private double average(List<Double> list) {
                  return list.stream().mapToDouble(Double::doubleValue).average().orElse(0);
              }
              
              private double getRecentHigh(List<Double> highs, int count) {
                  int start = Math.max(0, highs.size() - count);
                  return highs.subList(start, highs.size()).stream().max(Double::compare).orElse(0.0);
              }
              
              private double getRecentLow(List<Double> lows, int count) {
                  int start = Math.max(0, lows.size() - count);
                  return lows.subList(start, lows.size()).stream().min(Double::compare).orElse(0.0);
              }
              
              private void executeTrade(String symbol, boolean isBuy) {
                  double stake = 0.50;
                  Map<String, Object> params = new HashMap<>();
                  params.put("amount", stake);
                  params.put("basis", "stake");
                  params.put("contract_type", isBuy ? "CALL" : "PUT");
                  params.put("currency", "USD");
                  params.put("duration", 60);
                  params.put("duration_unit", "t");
                  params.put("symbol", symbol);
                  
                  Map<String, Object> buyRequest = new HashMap<>();
                  buyRequest.put("buy", 1);
                  buyRequest.put("parameters", params);
                  buyRequest.put("req_id", reqId++);
                  send(gson.toJson(buyRequest));
                  
                  activeTrades++;
              }
              
              private void requestBalance() {
                  Map<String, Object> req = new HashMap<>();
                  req.put("balance", 1);
                  req.put("req_id", reqId++);
                  send(gson.toJson(req));
              }
              
              private void requestPortfolio() {
                  Map<String, Object> req = new HashMap<>();
                  req.put("portfolio", 1);
                  req.put("req_id", reqId++);
                  send(gson.toJson(req));
              }
              
              private void subscribeToTicks() {
                  String[] pairs = {"EURUSD", "USDJPY", "AUDUSD", "NZDUSD", "USDCAD", "USDCHF",
                      "EURJPY", "EURGBP", "EURAUD", "EURNZD", "EURCAD", "EURCHF",
                      "GBPJPY", "GBPAUD", "GBPCAD", "GBPNZD", "GBPCHF",
                      "AUDJPY", "AUDNZD", "AUDCAD", "AUDCHF", "CADJPY", "CADCHF",
                      "CHFJPY", "NZDJPY", "NZDCAD", "NZDCHF"};
                  for (String pair : pairs) {
                      Map<String, Object> req = new HashMap<>();
                      req.put("ticks", pair);
                      req.put("subscribe", 1);
                      req.put("req_id", reqId++);
                      send(gson.toJson(req));
                  }
              }
              
              private void send(String message) { if (webSocket != null) webSocket.send(message); }
              public void disconnect() { if (webSocket != null) webSocket.close(1000, null); }
          }
          EOF

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0 --distribution-type all
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
