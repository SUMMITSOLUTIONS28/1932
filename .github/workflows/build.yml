                   # -------------------- ConnectivityReceiver.kt --------------------
          cat > app/src/main/java/com/deriv/trader/ConnectivityReceiver.kt << 'EOF'
          package com.deriv.trader

          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import android.net.ConnectivityManager
          import android.net.NetworkCapabilities

          class ConnectivityReceiver : BroadcastReceiver() {
              override fun onReceive(context: Context, intent: Intent) {
                  if (isInternetAvailable(context)) {
                      if (!TradingBotService.isServiceRunning) {
                          val serviceIntent = Intent(context, TradingBotService::class.java)
                          context.startForegroundService(serviceIntent)
                      }
                  }
              }

              private fun isInternetAvailable(context: Context): Boolean {
                  val cm = context.getSystemService(Context.CONNECTIVITY_SERVICE) as ConnectivityManager
                  val network = cm.activeNetwork ?: return false
                  val capabilities = cm.getNetworkCapabilities(network) ?: return false
                  return capabilities.hasCapability(NetworkCapabilities.NET_CAPABILITY_INTERNET)
              }
          }
