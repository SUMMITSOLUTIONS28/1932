          package com.tradeflow.bot;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;
          import com.google.gson.JsonObject;
          import com.google.gson.JsonParser;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;

          public class TradingService extends Service {
              private DerivWebSocket webSocket;
              private SharedPreferences prefs;
              private int consecutiveLosses = 0;
              private int activeTrades = 0;
              private static final int MAX_TRADES = 3;
              private static final int STOP_AFTER_LOSSES = 3;

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  String apiToken = intent.getStringExtra("API_TOKEN");
                  String accountId = intent.getStringExtra("ACCOUNT_ID");

                  if (apiToken == null || accountId == null) {
                      stopSelf();
                      return START_NOT_STICKY;
                  }

                  prefs = getSharedPreferences("tradeflow", MODE_PRIVATE);
                  consecutiveLosses = prefs.getInt("consecutive_losses", 0);
                  activeTrades = prefs.getInt("active_trades_count", 0);

                  createNotificationChannel();
                  startForeground(1, createNotification());

                  webSocket = new DerivWebSocket(apiToken, accountId, this::onMessage, this::onError, this::onBalance, this::onPortfolio);
                  webSocket.connect();

                  return START_STICKY;
              }

              private void onMessage(String message) {
                  android.util.Log.d("TradingService", "Received: " + message);
              }

              private void onBalance(double balance) {
                  prefs.edit().putFloat("balance", (float) balance).apply();
              }

              private void onPortfolio(String portfolioData) {
                  prefs.edit().putString("active_trades", portfolioData).apply();
                  // Parse portfolio to count active trades
                  try {
                      JsonObject json = JsonParser.parseString(portfolioData).getAsJsonObject();
                      if (json.has("portfolio")) {
                          int count = json.get("portfolio").getAsJsonArray().size();
                          activeTrades = count;
                          prefs.edit().putInt("active_trades_count", count).apply();
                      }
                  } catch (Exception e) { }
              }
              private void onError(String error) {
                  android.util.Log.e("TradingService", "Error: " + error);
              }

              private void addToHistory(String pair, String result, double amount) {
                  String history = prefs.getString("trade_history", "");
                  String timestamp = new SimpleDateFormat("yyyy-MM-dd HH:mm:ss", Locale.getDefault()).format(new Date());
                  String entry = pair + " | " + result + " | " + (result.equals("WIN") ? "+$" : "-$") + String.format("%.2f", Math.abs(amount)) + " | " + timestamp + "\n";
                  
                  String[] lines = history.split("\n");
                  StringBuilder newHistory = new StringBuilder(entry);
                  int count = 0;
                  for (String line : lines) {
                      if (count < 19 && !line.isEmpty()) {
                          newHistory.append(line).append("\n");
                          count++;
                      }
                  }
                  prefs.edit().putString("trade_history", newHistory.toString()).apply();
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          "tradeflow", "TradeFlow Bot", NotificationManager.IMPORTANCE_LOW);
                      getSystemService(NotificationManager.class).createNotificationChannel(channel);
                  }
              }

              private Notification createNotification() {
                  Intent intent = new Intent(this, MainActivity.class);
                  PendingIntent pendingIntent = PendingIntent.getActivity(
                      this, 0, intent, PendingIntent.FLAG_IMMUTABLE);
                  return new NotificationCompat.Builder(this, "tradeflow")
                      .setContentTitle("TradeFlow Bot")
                      .setContentText("Bot is running - Connected to Deriv")
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .setContentIntent(pendingIntent)
                      .build();
              }

              @Override
              public void onDestroy() {
                  if (webSocket != null) webSocket.disconnect();
                  super.onDestroy();
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
