name: Build Deriv SMC Trading Bot APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/deriv/trader
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p gradle/wrapper

          # -------------------- build.gradle (root) --------------------
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              }
          }
          EOF

          # -------------------- settings.gradle --------------------
          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "DerivTradingBot"
          include ':app'
          EOF

          # -------------------- gradle.properties --------------------
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # -------------------- gradle-wrapper.properties --------------------
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # -------------------- app/build.gradle --------------------
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.deriv.trader'
              compileSdk 34

              defaultConfig {
                  applicationId "com.deriv.trader"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.lifecycle:lifecycle-service:2.7.0'
              implementation 'org.java-websocket:Java-WebSocket:1.5.4'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'androidx.security:security-crypto:1.1.0-alpha06'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
          }
          EOF

          # -------------------- AndroidManifest.xml --------------------
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />

              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/ic_dialog_info"
                  android:label="Deriv SMC Bot"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:supportsRtl="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".TradingBotService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="dataSync" />

                  <receiver android:name=".ConnectivityReceiver" android:exported="true">
                      <intent-filter>
                          <action android:name="android.net.conn.CONNECTIVITY_CHANGE" />
                      </intent-filter>
                  </receiver>

              </application>
          </manifest>
          EOF

          # -------------------- activity_main.xml --------------------
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="20dp"
              android:gravity="center">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Deriv SMC Trading Bot"
                  android:textSize="24sp"
                  android:textStyle="bold"
                  android:layout_marginBottom="30dp"/>

              <EditText
                  android:id="@+id/tokenInput"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:hint="Enter Deriv API Token"
                  android:inputType="textPassword"
                  android:padding="12dp"
                  android:layout_marginBottom="15dp"/>

              <EditText
                  android:id="@+id/stakeInput"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:hint="Stake Amount per Trade (USD)"
                  android:inputType="numberDecimal"
                  android:padding="12dp"
                  android:layout_marginBottom="15dp"
                  android:text="0.50"/>

              <TextView
                  android:id="@+id/statusText"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Status: Stopped"
                  android:gravity="center"
                  android:padding="10dp"
                  android:layout_marginBottom="20dp"/>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal">

                  <Button
                      android:id="@+id/startButton"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="START"
                      android:backgroundTint="#4CAF50"
                      android:layout_marginEnd="10dp"/>

                  <Button
                      android:id="@+id/stopButton"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="STOP"
                      android:backgroundTint="#F44336"/>
              </LinearLayout>

              <TextView
                  android:id="@+id/logText"
                  android:layout_width="match_parent"
                  android:layout_height="200dp"
                  android:layout_marginTop="20dp"
                  android:background="#F5F5F5"
                  android:padding="10dp"
                  android:scrollbars="vertical"
                  android:text="Logs will appear here..."
                  android:textSize="12sp"/>

          </LinearLayout>
          EOF

          # -------------------- styles.xml --------------------
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar" />
          </resources>
          EOF

          # -------------------- MainActivity.kt --------------------
          cat > app/src/main/java/com/deriv/trader/MainActivity.kt << 'EOF'
          package com.deriv.trader

          import android.content.Context
          import android.content.Intent
          import android.content.SharedPreferences
          import android.os.Bundle
          import android.text.method.ScrollingMovementMethod
          import android.widget.Button
          import android.widget.EditText
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {

              private lateinit var tokenInput: EditText
              private lateinit var stakeInput: EditText
              private lateinit var startButton: Button
              private lateinit var stopButton: Button
              private lateinit var statusText: TextView
              private lateinit var logText: TextView
              private lateinit var prefs: SharedPreferences

              companion object {
                  var logCallback: ((String) -> Unit)? = null
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  tokenInput = findViewById(R.id.tokenInput)
                  stakeInput = findViewById(R.id.stakeInput)
                  startButton = findViewById(R.id.startButton)
                  stopButton = findViewById(R.id.stopButton)
                  statusText = findViewById(R.id.statusText)
                  logText = findViewById(R.id.logText)

                  logText.movementMethod = ScrollingMovementMethod()

                  prefs = getSharedPreferences("trading_prefs", Context.MODE_PRIVATE)

                  tokenInput.setText(prefs.getString("api_token", ""))
                  stakeInput.setText(prefs.getFloat("stake_amount", 0.50f).toString())

                  startButton.setOnClickListener {
                      val token = tokenInput.text.toString().trim()
                      val stake = stakeInput.text.toString().toFloatOrNull()

                      if (token.isEmpty()) {
                          Toast.makeText(this, "Enter your Deriv API token", Toast.LENGTH_SHORT).show()
                          return@setOnClickListener
                      }

                      if (stake == null || stake <= 0) {
                          Toast.makeText(this, "Enter valid stake amount", Toast.LENGTH_SHORT).show()
                          return@setOnClickListener
                      }

                      prefs.edit()
                          .putString("api_token", token)
                          .putFloat("stake_amount", stake)
                          .apply()

                      startTradingService(token, stake)
                  }

                  stopButton.setOnClickListener {
                      stopTradingService()
                  }
              }
              private fun startTradingService(token: String, stake: Float) {
                  val intent = Intent(this, TradingBotService::class.java).apply {
                      putExtra("API_TOKEN", token)
                      putExtra("STAKE_AMOUNT", stake)
                  }
                  startForegroundService(intent)
                  statusText.text = "Status: Running"
                  addLog("Bot started with stake: $$stake")
                  Toast.makeText(this, "Trading bot started", Toast.LENGTH_SHORT).show()
              }

              private fun stopTradingService() {
                  val intent = Intent(this, TradingBotService::class.java)
                  stopService(intent)
                  statusText.text = "Status: Stopped"
                  addLog("Bot stopped by user")
                  Toast.makeText(this, "Trading bot stopped", Toast.LENGTH_SHORT).show()
              }

              fun addLog(message: String) {
                  runOnUiThread {
                      val timestamp = java.text.SimpleDateFormat("HH:mm:ss", java.util.Locale.getDefault()).format(java.util.Date())
                      logText.append("\n[$timestamp] $message")
                      val scrollView = logText.parent as? android.widget.ScrollView
                      scrollView?.post { scrollView.fullScroll(android.view.View.FOCUS_DOWN) }
                  }
              }

              override fun onResume() {
                  super.onResume()
                  logCallback = { message -> addLog(message) }
              }

              override fun onPause() {
                  super.onPause()
                  logCallback = null
              }
          }
          EOF

          # -------------------- TradingBotService.kt --------------------
          cat > app/src/main/java/com/deriv/trader/TradingBotService.kt << 'EOF'
          package com.deriv.trader

          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.PendingIntent
          import android.app.Service
          import android.content.Context
          import android.content.Intent
          import android.os.Build
          import android.os.IBinder
          import androidx.core.app.NotificationCompat
          import kotlinx.coroutines.*

          class TradingBotService : Service() {

              private lateinit var serviceScope: CoroutineScope
              private var apiToken: String = ""
              private var stakeAmount: Float = 0.50f
              private var derivWS: DerivWebSocket? = null
              private var smcStrategy: SMCStrategy? = null
              private var riskManager: RiskManager? = null

              companion object {
                  var isServiceRunning = false
              }

              override fun onCreate() {
                  super.onCreate()
                  serviceScope = CoroutineScope(Dispatchers.IO + SupervisorJob())
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  apiToken = intent?.getStringExtra("API_TOKEN") ?: ""
                  stakeAmount = intent?.getFloatExtra("STAKE_AMOUNT", 0.50f) ?: 0.50f

                  if (apiToken.isEmpty()) {
                      stopSelf()
                      return START_NOT_STICKY
                  }

                  isServiceRunning = true

                  createNotificationChannel()
                  startForeground(1, createNotification())

                  riskManager = RiskManager(initialStake = stakeAmount)
                  derivWS = DerivWebSocket(apiToken, this::onMessage, this::onError)
                  smcStrategy = SMCStrategy(derivWS!!, riskManager!!, stakeAmount, this::addLog)

                  derivWS?.connect()

                  addLog("Trading bot service started")
                  addLog("Stake amount: $$stakeAmount")
                  addLog("Risk/Reward: 1:3 (Max risk $$1.00)")

                  return START_STICKY
              }

              private fun onMessage(message: String) {
                  smcStrategy?.processMessage(message)
              }

              private fun onError(error: String) {
                  addLog("WebSocket Error: $error")
              }

              private fun addLog(message: String) {
                  MainActivity.logCallback?.invoke(message)
                  android.util.Log.d("TradingBot", message)
              }

              private fun createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val channel = NotificationChannel(
                          "trading_channel",
                          "Deriv Trading Bot",
                          NotificationManager.IMPORTANCE_LOW
                      )
                      val manager = getSystemService(NotificationManager::class.java)
                      manager.createNotificationChannel(channel)
                  }
              }

              private fun createNotification(): Notification {
                  val intent = Intent(this, MainActivity::class.java)
                  val pendingIntent = PendingIntent.getActivity(
                      this, 0, intent,
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) PendingIntent.FLAG_IMMUTABLE else 0
                  )

                  return NotificationCompat.Builder(this, "trading_channel")
                      .setContentTitle("Deriv SMC Trading Bot")
                      .setContentText("Bot is running and monitoring markets...")
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .setContentIntent(pendingIntent)
                      .setPriority(NotificationCompat.PRIORITY_LOW)
                      .build()
              }

              override fun onDestroy() {
                  isServiceRunning = false
                  derivWS?.disconnect()
                  serviceScope.cancel()
                  addLog("Trading bot service stopped")
                  super.onDestroy()
              }

              override fun onBind(intent: Intent?): IBinder? = null
          }
          EOF

