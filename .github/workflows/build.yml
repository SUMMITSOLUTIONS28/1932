          # -------------------- RiskManager.kt --------------------
          cat > app/src/main/java/com/deriv/trader/RiskManager.kt << 'EOF'
          package com.deriv.trader

          import kotlin.math.abs

          class RiskManager(private var initialStake: Float = 0.50f) {

              private var consecutiveLosses = 0
              private var lastLossTime: Long = 0
              private val PAUSE_DURATION_MS = 24 * 60 * 60 * 1000L
              private val MAX_RISK_USD = 1.00
              private val MAX_RISK_BOS_5MIN = 0.90
              private val REWARD_RATIO = 3.0

              fun canTrade(): Boolean {
                  if (consecutiveLosses >= 2) {
                      val timeSinceLastLoss = System.currentTimeMillis() - lastLossTime
                      if (timeSinceLastLoss < PAUSE_DURATION_MS) {
                          return false
                      } else {
                          consecutiveLosses = 0
                      }
                  }
                  return true
              }

              fun recordLoss() {
                  consecutiveLosses++
                  lastLossTime = System.currentTimeMillis()
              }

              fun recordWin() {
                  consecutiveLosses = 0
              }

              fun calculateStopLoss(entryPrice: Double, isBuy: Boolean, bosTimeframe: String): Double {
                  val pipSize = 0.0001
                  val stopDistancePips = 10.0
                  val stopDistance = stopDistancePips * pipSize

                  return if (isBuy) {
                      entryPrice - stopDistance
                  } else {
                      entryPrice + stopDistance
                  }
              }

              fun validateRisk(stopLossDistancePips: Double, bosTimeframe: String): Boolean {
                  val riskAmount = initialStake * (stopLossDistancePips / 10000.0)
                  val maxRisk = if (bosTimeframe == "5") MAX_RISK_BOS_5MIN else MAX_RISK_USD
                  return riskAmount <= maxRisk
              }

              fun calculateTakeProfit(entryPrice: Double, stopLoss: Double, isBuy: Boolean): Double {
                  val riskDistance = abs(entryPrice - stopLoss)
                  val rewardDistance = riskDistance * REWARD_RATIO
                  return if (isBuy) {
                      entryPrice + rewardDistance
                  } else {
                      entryPrice - rewardDistance
                  }
              }

              fun getConsecutiveLosses(): Int = consecutiveLosses
              fun resetLosses() { consecutiveLosses = 0 }
          }
          EOF

          # -------------------- DerivWebSocket.kt --------------------
          cat > app/src/main/java/com/deriv/trader/DerivWebSocket.kt << 'EOF'
          package com.deriv.trader

          import android.util.Log
          import com.google.gson.Gson
          import com.google.gson.JsonParser
          import okhttp3.*
          import okio.ByteString
          import java.util.concurrent.TimeUnit

          class DerivWebSocket(
              private val apiToken: String,
              private val onMessage: (String) -> Unit,
              private val onError: (String) -> Unit
          ) {
              private val client = OkHttpClient.Builder()
                  .pingInterval(30, TimeUnit.SECONDS)
                  .build()
              private var webSocket: WebSocket? = null
              private val gson = Gson()
              private var reqId = 1

              fun connect() {
                  val request = Request.Builder()
                      .url("wss://ws.derivws.com/websockets/v3")
                      .build()

                  webSocket = client.newWebSocket(request, object : WebSocketListener() {
                      override fun onOpen(webSocket: WebSocket, response: Response) {
                          onMessage("Connected to Deriv")
                          authenticate()
                      }

                      override fun onMessage(webSocket: WebSocket, text: String) {
                          onMessage(text)
                      }

                      override fun onMessage(webSocket: WebSocket, bytes: ByteString) {
                          onMessage("Binary message received")
                      }

                      override fun onClosing(webSocket: WebSocket, code: Int, reason: String) {
                          webSocket.close(1000, null)
                      }

                      override fun onClosed(webSocket: WebSocket, code: Int, reason: String) {
                          onMessage("Connection closed")
                      }

                      override fun onFailure(webSocket: WebSocket, t: Throwable, response: Response?) {
                          onError("Connection failed: ${t.message}")
                      }
                  })
              }

              private fun authenticate() {
                  val authRequest = mapOf(
                      "authorize" to apiToken,
                      "req_id" to reqId++
                  )
                  send(gson.toJson(authRequest))
              }

              fun subscribeTicks(symbol: String) {
                  val tickRequest = mapOf(
                      "ticks" to symbol,
                      "subscribe" to 1,
                      "req_id" to reqId++
                  )
                  send(gson.toJson(tickRequest))
              }

              fun subscribeCandles(symbol: String, timeframe: String) {
                  val candleRequest = mapOf(
                      "ticks_history" to symbol,
                      "adjust_start_time" to 1,
                      "count" to 500,
                      "end" to "latest",
                      "granularity" to timeframeToGranularity(timeframe),
                      "style" to "candles",
                      "subscribe" to 1,
                      "req_id" to reqId++
                  )
                  send(gson.toJson(candleRequest))
              }

              fun buyContract(symbol: String, amount: Double, duration: Int, durationUnit: String = "t"): Int {
                  val buyRequest = mapOf(
                      "buy" to 1,
                      "parameters" to mapOf(
                          "amount" to amount,
                          "basis" to "stake",
                          "contract_type" to "CALL",
                          "currency" to "USD",
                          "duration" to duration,
                          "duration_unit" to durationUnit,
                          "symbol" to symbol
                      ),
                      "req_id" to reqId++
                  )
                  send(gson.toJson(buyRequest))
                  return reqId - 1
              }

              fun sellContract(contractId: String) {
                  val sellRequest = mapOf(
                      "sell" to contractId,
                      "req_id" to reqId++
                  )
                  send(gson.toJson(sellRequest))
              }

              fun getBalance() {
                  val balanceRequest = mapOf(
                      "balance" to 1,
                      "req_id" to reqId++
                  )
                  send(gson.toJson(balanceRequest))
              }
              private fun timeframeToGranularity(timeframe: String): Int {
                  return when (timeframe) {
                      "1" -> 60
                      "2" -> 120
                      "3" -> 180
                      "5" -> 300
                      "10" -> 600
                      "15" -> 900
                      "30" -> 1800
                      "45" -> 2700
                      "60" -> 3600
                      else -> 300
                  }
              }

              private fun send(message: String) {
                  if (webSocket != null) {
                      webSocket?.send(message)
                      Log.d("DerivWS", "Sent: $message")
                  }
              }

              fun disconnect() {
                  webSocket?.close(1000, "Normal closure")
              }

              fun isConnected(): Boolean = webSocket != null
          }
          EOF

          # -------------------- SMCStrategy.kt --------------------
          cat > app/src/main/java/com/deriv/trader/SMCStrategy.kt << 'EOF'
          package com.deriv.trader

          import com.google.gson.JsonParser
          import kotlin.math.abs

          class SMCStrategy(
              private val derivWS: DerivWebSocket,
              private val riskManager: RiskManager,
              private val defaultStake: Float,
              private val addLog: (String) -> Unit
          ) {

              private val bosTimeframes = listOf("5", "10", "15", "30", "45")
              private val chochTimeframes = listOf("1", "2", "3")
              private val rsiPeriod = 14
              private val retracementPercent = 0.30

              private val priceHistory = mutableMapOf<String, MutableList<Double>>()
              private val candles = mutableMapOf<String, MutableList<Candle>>()
              private var lastBOS: MarketStructure? = null
              private var lastCHoCH: CHoCHSignal? = null
              private var pendingSetup: TradeSetup? = null
              private var isTrackingSetup = false
              private var currentSymbol = ""

              fun processMessage(message: String) {
                  try {
                      val json = JsonParser.parseString(message).asJsonObject

                      if (json.has("authorize")) {
                          val authorized = json.get("authorize").asJsonObject.get("authorized").asBoolean
                          if (authorized) {
                              addLog("Authorized successfully")
                              startScanning()
                          } else {
                              addLog("Authorization failed - check your API token")
                          }
                      }

                      if (json.has("tick")) {
                          val tick = json.getAsJsonObject("tick")
                          val symbol = tick.get("symbol").asString
                          val price = tick.get("quote").asDouble
                          processTick(symbol, price)
                      }

                      if (json.has("candles")) {
                          val candlesArray = json.getAsJsonArray("candles")
                          val symbol = json.get("echo_req").asJsonObject.get("ticks_history").asString
                          processCandles(symbol, candlesArray)
                      }

                      if (json.has("buy")) {
                          val buyObj = json.getAsJsonObject("buy")
                          if (buyObj.has("contract_id")) {
                              val contractId = buyObj.get("contract_id").asString
                              addLog("Trade executed! Contract ID: $contractId")
                          } else if (buyObj.has("error")) {
                              val error = buyObj.get("error").asJsonObject.get("message").asString
                              addLog("Buy error: $error")
                          }
                      }

                  } catch (e: Exception) {
                      addLog("Error processing message: ${e.message}")
                  }
              }

              private fun startScanning() {
                  addLog("Starting market scan for all allowed Forex pairs...")
                  ForexPairs.ALL_PAIRS.forEach { symbol ->
                      subscribeToData(symbol)
                  }
              }

              private fun subscribeToData(symbol: String) {
                  derivWS.subscribeTicks(symbol)
                  bosTimeframes.forEach { tf ->
                      derivWS.subscribeCandles(symbol, tf)
                  }
                  chochTimeframes.forEach { tf ->
                      derivWS.subscribeCandles(symbol, tf)
                  }
              }

              private fun processTick(symbol: String, price: Double) {
                  if (!ForexPairs.isAllowed(symbol)) return

                  priceHistory.getOrPut(symbol) { mutableListOf() }.add(price)
                  if (priceHistory[symbol]!!.size > 1000) {
                      priceHistory[symbol]!!.removeAt(0)
                  }

                  if (isTrackingSetup && currentSymbol == symbol && pendingSetup != null) {
                      checkEntryCondition(price)
                  }
              }

              private fun processCandles(symbol: String, candlesArray: com.google.gson.JsonArray) {
                  if (!ForexPairs.isAllowed(symbol)) return

                  val candleList = candles.getOrPut(symbol) { mutableListOf() }
                  for (i in 0 until candlesArray.size()) {
                      val c = candlesArray.get(i).asJsonObject
                      val candle = Candle(
                          symbol = symbol,
                          timeframe = "unknown",
                          open = c.get("open").asDouble,
                          high = c.get("high").asDouble,
                          low = c.get("low").asDouble,
                          close = c.get("close").asDouble,
                          timestamp = c.get("time").asLong
                      )
                      candleList.add(candle)
                  }

                  analyzeMarketStructure(symbol)
              }

              private fun analyzeMarketStructure(symbol: String) {
                  val candles_ = candles[symbol] ?: return
                  if (candles_.size < 50) return

                  val recentHigh = candles_.takeLast(20).maxOfOrNull { it.high } ?: return
                  val recentLow = candles_.takeLast(20).minOfOrNull { it.low } ?: return
                  val previousHigh = candles_.takeLast(40).dropLast(20).maxOfOrNull { it.high } ?: return
                  val previousLow = candles_.takeLast(40).dropLast(20).minOfOrNull { it.low } ?: return

                  if (recentHigh > previousHigh) {
                      addLog("$symbol: Bullish BOS detected")
                      lastBOS = MarketStructure(symbol, "15", true, recentHigh, recentHigh, recentLow, System.currentTimeMillis())
                      startSetupTracking(symbol, "BUY")
                  }

                  if (recentLow < previousLow) {
                      addLog("$symbol: Bearish BOS detected")
                      lastBOS = MarketStructure(symbol, "15", false, recentLow, recentHigh, recentLow, System.currentTimeMillis())
                      startSetupTracking(symbol, "SELL")
                  }
              }

              private fun startSetupTracking(symbol: String, direction: String) {
                  if (isTrackingSetup) return

                  addLog("$symbol: Starting setup tracking for $direction")
                  isTrackingSetup = true
                  currentSymbol = symbol
              }

              private fun checkCHoCH(symbol: String): Boolean {
                  val candles_ = candles[symbol] ?: return false
                  if (candles_.size < 30) return false

                  val last5 = candles_.takeLast(5)
                  val previous5 = candles_.takeLast(10).dropLast(5)

                  val last5Avg = last5.map { it.close }.average()
                  val previous5Avg = previous5.map { it.close }.average()

                  val isBullishCHoCH = previous5Avg > last5Avg && last5.last().close > last5.first().close
                  val isBearishCHoCH = previous5Avg < last5Avg && last5.last().close < last5.first().close

                  if (isBullishCHoCH || isBearishCHoCH) {
                      lastCHoCH = CHoCHSignal(
                          symbol = symbol,
                          timeframe = "1",
                          isBullish = isBullishCHoCH,
                          price = candles_.last().close,
                          timestamp = System.currentTimeMillis()
                      )
                      addLog("$symbol: CHoCH detected (${if (isBullishCHoCH) "BULLISH" else "BEARISH"})")
                      return true
                  }
                  return false
              }

              private fun checkRSI(symbol: String, direction: String): Boolean {
                  val prices = priceHistory[symbol] ?: return false
                  if (prices.size < rsiPeriod + 1) return false

                  val gains = mutableListOf<Double>()
                  val losses = mutableListOf<Double>()

                  for (i in prices.size - rsiPeriod until prices.size - 1) {
                      val change = prices[i + 1] - prices[i]
                      if (change >= 0) {
                          gains.add(change)
                          losses.add(0.0)
                      } else {
                          gains.add(0.0)
                          losses.add(abs(change))
                      }
                  }

                  val avgGain = gains.average()
                  val avgLoss = losses.average()
                  val rs = if (avgLoss == 0.0) 100.0 else avgGain / avgLoss
                  val rsi = 100 - (100 / (1 + rs))

                  return when (direction) {
                      "BUY" -> rsi < 30
                      "SELL" -> rsi > 70
                      else -> false
                  }
              }

              private fun checkReversalPattern(symbol: String, direction: String): Boolean {
                  val candles_ = candles[symbol] ?: return false
                  if (candles_.size < 10) return false

                  val last10 = candles_.takeLast(10)
                  val highs = last10.map { it.high }
                  val lows = last10.map { it.low }

                  val maxHigh = highs.maxOrNull() ?: return false
                  val secondHigh = highs.sortedDescending().getOrNull(1) ?: return false
                  val minLow = lows.minOrNull() ?: return false
                  val secondLow = lows.sorted().getOrNull(1) ?: return false

                  val isDoubleTop = direction == "SELL" && abs(maxHigh - secondHigh) < (maxHigh * 0.001)
                  val isDoubleBottom = direction == "BUY" && abs(minLow - secondLow) < (minLow * 0.001)

                  return isDoubleTop || isDoubleBottom
              }

              private fun checkCandlestickPattern(symbol: String, direction: String): Boolean {
                  val candles_ = candles[symbol] ?: return false
                  if (candles_.size < 2) return false

                  val last = candles_.last()
                  val previous = candles_[candles_.size - 2]

                  val body = abs(last.close - last.open)
                  val lowerWick = min(last.open, last.close) - last.low
                  val upperWick = last.high - max(last.open, last.close)

                  return when (direction) {
                      "BUY" -> {
                          (last.close > last.open && previous.open > previous.close && last.close > previous.open && last.open < previous.close) ||
                          (lowerWick > body * 2 && upperWick < body * 0.5)
                      }
                      "SELL" -> {
                          (last.close < last.open && previous.open < previous.close && last.close < previous.open && last.open > previous.close) ||
                          (upperWick > body * 2 && lowerWick < body * 0.5)
                      }
                      else -> false
                  }
              }

              private fun checkEntryCondition(currentPrice: Double) {
                  if (pendingSetup == null) return

                  val setup = pendingSetup!!
                  val entryMet = if (setup.direction == "BUY") {
                      currentPrice <= setup.entryPrice
                  } else {
                      currentPrice >= setup.entryPrice
                  }

                  if (entryMet) {
                      executeTrade(setup)
                      pendingSetup = null
                      isTrackingSetup = false
                  }
              }

              private fun executeTrade(setup: TradeSetup) {
                  if (!riskManager.canTrade()) {
                      addLog("Cannot trade - 24 hour pause active due to 2 consecutive losses")
                      return
                  }

                  addLog("EXECUTING TRADE: ${setup.symbol} ${setup.direction}")
                  addLog("Entry: ${setup.entryPrice}, SL: ${setup.stopLoss}, TP: ${setup.takeProfit}")
                  addLog("Stake: $${setup.stake}")

                  val duration = 60
                  derivWS.buyContract(setup.symbol, setup.stake, duration, "t")
              }

              private fun calculateRetracementEntry(impulseHigh: Double, impulseLow: Double, isBuy: Boolean): Double {
                  val impulseRange = abs(impulseHigh - impulseLow)
                  val retracement = impulseRange * retracementPercent
                  return if (isBuy) {
                      impulseLow + retracement
                  } else {
                      impulseHigh - retracement
                  }
              }

              fun processCompletedTrade(won: Boolean) {
                  if (won) {
                      riskManager.recordWin()
                      addLog("Trade WON! Losses reset.")
                  } else {
                      riskManager.recordLoss()
                      addLog("Trade LOST. Consecutive losses: ${riskManager.getConsecutiveLosses()}")
                  }
              }
          }
