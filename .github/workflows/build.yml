name: Build simiyu Real Deriv Trading Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/simiyu/tradingbot
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          # -------------------- REAL Deriv API Trading Bot --------------------
          cat > app/src/main/java/com/simiyu/tradingbot/MainActivity.java << 'EOF'
          package com.simiyu.tradingbot;

          import android.os.Bundle;
          import android.os.Handler;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.LinearLayout;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;
          import org.json.JSONObject;
          import okhttp3.*;
          import java.io.IOException;
          import java.util.concurrent.TimeUnit;

          public class MainActivity extends AppCompatActivity {
              private TextView statusText, statsText, tradesText, balanceText, progressText, balanceValueText;
              private LinearLayout mainLayout;
              private Handler handler = new Handler();
              
              // Deriv API Configuration
              private String API_TOKEN = "0XhlE5tsI6zdpFX";
              private String APP_ID = "32ZFw49Z0RGY4UQGjIrhh";
              private String WEBSOCKET_URL = "wss://ws.derivws.com/websockets/v3?app_id=" + APP_ID;
              
              // Account Data
              private double initialBalance = 0;
              private double currentBalance = 0;
              private double totalProfitLoss = 0;
              
              // Trading Statistics
              private int totalTrades = 0;
              private int wins = 0;
              private int losses = 0;
              private double netProfitPips = 0;
              private int activeTrades = 0;
              private int consecutiveLosses = 0;
              private boolean isConnected = false;
              private boolean isStopped = false;
              
              // WebSocket connection
              private OkHttpClient client;
              private WebSocket webSocket;
              private String lastMessage = "";
              
              // Forex pairs
              private String[] forexPairs = {"frxEURUSD", "frxGBPUSD", "frxUSDJPY", "frxAUDUSD", "frxUSDCAD", "frxUSDCHF", "frxNZDUSD"};
              private String[] pairNames = {"EUR/USD", "GBP/USD", "USD/JPY", "AUD/USD", "USD/CAD", "USD/CHF", "NZD/USD"};
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // Create main layout
                  mainLayout = new LinearLayout(this);
                  mainLayout.setOrientation(LinearLayout.VERTICAL);
                  mainLayout.setPadding(25, 25, 25, 25);
                  mainLayout.setBackgroundColor(Color.parseColor("#0a0a1a"));
                  
                  // Title
                  TextView titleText = new TextView(this);
                  titleText.setText("🤖 SIMIYU TRADING BOT");
                  titleText.setTextSize(26);
                  titleText.setTextColor(Color.parseColor("#00ff88"));
                  titleText.setGravity(Gravity.CENTER);
                  titleText.setTypeface(null, Typeface.BOLD);
                  titleText.setPadding(0, 10, 0, 20);
                  mainLayout.addView(titleText);
                  
                  // Connection Status
                  statusText = new TextView(this);
                  statusText.setText("🔄 CONNECTING TO DERIV...");
                  statusText.setTextSize(14);
                  statusText.setTextColor(Color.parseColor("#ffd700"));
                  statusText.setGravity(Gravity.CENTER);
                  statusText.setPadding(0, 10, 0, 20);
                  mainLayout.addView(statusText);
                  
                  // Account Balance Panel
                  LinearLayout balancePanel = createBalancePanel();
                  mainLayout.addView(balancePanel);
                  
                  // Progress Panel
                  LinearLayout progressPanel = createProgressPanel();
                  mainLayout.addView(progressPanel);
                  
                  // Statistics Panel
                  LinearLayout statsPanel = createStatsPanel();
                  mainLayout.addView(statsPanel);
                  
                  // Trading Log
                  TextView logTitle = new TextView(this);
                  logTitle.setText("📝 TRADING LOG");
                  logTitle.setTextSize(18);
                  logTitle.setTextColor(Color.parseColor("#ffffff"));
                  logTitle.setTypeface(null, Typeface.BOLD);
                  logTitle.setPadding(0, 20, 0, 10);
                  mainLayout.addView(logTitle);
                  
                  final TextView logText = new TextView(this);
                  logText.setText("Initializing connection to Deriv...\n");
                  logText.setTextSize(12);
                  logText.setTextColor(Color.parseColor("#cccccc"));
                  logText.setPadding(20, 15, 20, 15);
                  logText.setBackgroundColor(Color.parseColor("#16213e"));
                  logText.setMaxLines(15);
                  mainLayout.addView(logText);
                  
                  setContentView(mainLayout);
                  
                  // Connect to Deriv
                  connectToDeriv(logText);
              }
              
              private void connectToDeriv(final TextView logText) {
                  addLog("🔌 Connecting to Deriv API...", logText);
                  
                  client = new OkHttpClient.Builder()
                      .connectTimeout(10, TimeUnit.SECONDS)
                      .writeTimeout(10, TimeUnit.SECONDS)
                      .readTimeout(10, TimeUnit.SECONDS)
                      .build();
                  
                  Request request = new Request.Builder()
                      .url(WEBSOCKET_URL)
                      .build();
                  
                  webSocket = client.newWebSocket(request, new WebSocketListener() {
                      @Override
                      public void onOpen(WebSocket webSocket, okhttp3.Response response) {
                          runOnUiThread(() -> {
                              addLog("✅ WebSocket connected!", logText);
                              statusText.setText("🔐 AUTHENTICATING...");
                          });
                          
                          // Authenticate with API token
                          JSONObject authMsg = new JSONObject();
                          try {
                              authMsg.put("authorize", API_TOKEN);
                              authMsg.put("req_id", 1);
                              webSocket.send(authMsg.toString());
                          } catch (Exception e) {
                              runOnUiThread(() -> addLog("❌ Auth error: " + e.getMessage(), logText));
                          }
                      }
                      
                      @Override
                      public void onMessage(WebSocket webSocket, String text) {
                          runOnUiThread(() -> processDerivMessage(text, logText));
                      }
                      
                      @Override
                      public void onFailure(WebSocket webSocket, Throwable t, okhttp3.Response response) {
                          runOnUiThread(() -> {
                              addLog("❌ Connection failed: " + t.getMessage(), logText);
                              statusText.setText("⚠️ CONNECTION FAILED - RETRYING...");
                              statusText.setTextColor(Color.parseColor("#ff4444"));
                              
                              // Retry connection after 5 seconds
                              handler.postDelayed(() -> connectToDeriv(logText), 5000);
                          });
                      }
                      
                      @Override
                      public void onClosed(WebSocket webSocket, int code, String reason) {
                          runOnUiThread(() -> {
                              addLog("🔌 Connection closed: " + reason, logText);
                              isConnected = false;
                              statusText.setText("⚠️ DISCONNECTED");
                          });
                      }
                  });
              }
              private void processDerivMessage(String message, TextView logText) {
                  try {
                      JSONObject json = new JSONObject(message);
                      
                      // Handle authorization response
                      if (json.has("authorize")) {
                          if (json.getBoolean("authorize")) {
                              isConnected = true;
                              addLog("✅ Authentication successful!", logText);
                              statusText.setText("✅ CONNECTED TO DERIV");
                              statusText.setTextColor(Color.parseColor("#00ff88"));
                              
                              // Get account balance
                              getAccountBalance(logText);
                              
                              // Subscribe to price ticks
                              subscribeToPrices(logText);
                          } else {
                              addLog("❌ Authentication failed! Check API token", logText);
                              statusText.setText("❌ AUTH FAILED");
                              statusText.setTextColor(Color.parseColor("#ff4444"));
                          }
                      }
                      
                      // Handle balance response
                      if (json.has("balance")) {
                          double balance = json.getDouble("balance");
                          if (initialBalance == 0) {
                              initialBalance = balance;
                              currentBalance = balance;
                              updateBalanceDisplay();
                              addLog(String.format("💰 Account Balance: $%,.2f", balance), logText);
                          } else {
                              currentBalance = balance;
                              updateBalanceDisplay();
                          }
                      }
                      
                      // Handle price ticks
                      if (json.has("tick") && json.has("symbol")) {
                          String symbol = json.getString("symbol");
                          double price = json.getJSONObject("tick").getDouble("quote");
                          processPriceUpdate(symbol, price, logText);
                      }
                      
                      // Handle subscription
                      if (json.has("subscription")) {
                          addLog("📡 Subscribed to price feed", logText);
                      }
                      
                  } catch (Exception e) {
                      addLog("Error parsing message: " + e.getMessage(), logText);
                  }
              }
              
              private void getAccountBalance(TextView logText) {
                  JSONObject balanceMsg = new JSONObject();
                  try {
                      balanceMsg.put("balance", 1);
                      balanceMsg.put("req_id", 2);
                      if (webSocket != null) {
                          webSocket.send(balanceMsg.toString());
                      }
                  } catch (Exception e) {
                      addLog("Error getting balance: " + e.getMessage(), logText);
                  }
              }
              
              private void subscribeToPrices(TextView logText) {
                  for (String pair : forexPairs) {
                      JSONObject subscribeMsg = new JSONObject();
                      try {
                          subscribeMsg.put("ticks", pair);
                          subscribeMsg.put("subscribe", 1);
                          subscribeMsg.put("req_id", Math.abs(pair.hashCode()));
                          if (webSocket != null) {
                              webSocket.send(subscribeMsg.toString());
                              addLog("📊 Subscribed to " + pair, logText);
                          }
                          Thread.sleep(100); // Rate limiting
                      } catch (Exception e) {
                          addLog("Error subscribing to " + pair + ": " + e.getMessage(), logText);
                      }
                  }
              }
              
              private void processPriceUpdate(String symbol, double price, TextView logText) {
                  // This is where your trading strategy logic goes
                  // Analyze price for liquidity sweeps and CHOCH
                  
                  // For demo, show price updates occasionally
                  if (new Random().nextInt(100) < 5) { // Show 5% of updates
                      addLog(symbol + " → " + String.format("%.5f", price), logText);
                  }
              }
              
              private LinearLayout createBalancePanel() {
                  LinearLayout panel = new LinearLayout(this);
                  panel.setOrientation(LinearLayout.VERTICAL);
                  panel.setPadding(20, 20, 20, 20);
                  panel.setBackgroundColor(Color.parseColor("#1a1a2e"));
                  panel.setLayoutParams(new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT,
                      LinearLayout.LayoutParams.WRAP_CONTENT
                  ));
                  
                  TextView panelTitle = new TextView(this);
                  panelTitle.setText("💰 ACCOUNT BALANCE");
                  panelTitle.setTextSize(16);
                  panelTitle.setTextColor(Color.parseColor("#ffd700"));
                  panelTitle.setTypeface(null, Typeface.BOLD);
                  panel.addView(panelTitle);
                  
                  LinearLayout balanceRow = new LinearLayout(this);
                  balanceRow.setOrientation(LinearLayout.HORIZONTAL);
                  balanceRow.setPadding(0, 15, 0, 10);
                  
                  TextView currentLabel = new TextView(this);
                  currentLabel.setText("Balance: ");
                  currentLabel.setTextSize(16);
                  currentLabel.setTextColor(Color.parseColor("#aaaaaa"));
                  balanceRow.addView(currentLabel);
                  
                  balanceValueText = new TextView(this);
                  balanceValueText.setText("$0.00");
                  balanceValueText.setTextSize(20);
                  balanceValueText.setTextColor(Color.parseColor("#00ff88"));
                  balanceValueText.setTypeface(null, Typeface.BOLD);
                  balanceRow.addView(balanceValueText);
                  
                  panel.addView(balanceRow);
                  
                  return panel;
              }
              
              private LinearLayout createProgressPanel() {
                  LinearLayout panel = new LinearLayout(this);
                  panel.setOrientation(LinearLayout.VERTICAL);
                  panel.setPadding(20, 15, 20, 15);
                  panel.setBackgroundColor(Color.parseColor("#1a1a2e"));
                  panel.setLayoutParams(new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT,
                      LinearLayout.LayoutParams.WRAP_CONTENT
                  ));
                  
                  TextView panelTitle = new TextView(this);
                  panelTitle.setText("📊 PROGRESS");
                  panelTitle.setTextSize(16);
                  panelTitle.setTextColor(Color.parseColor("#ffd700"));
                  panelTitle.setTypeface(null, Typeface.BOLD);
                  panel.addView(panelTitle);
                  
                  progressText = new TextView(this);
                  progressText.setText("Waiting for data...");
                  progressText.setTextSize(14);
                  progressText.setTextColor(Color.parseColor("#ffd700"));
                  progressText.setPadding(0, 10, 0, 0);
                  panel.addView(progressText);
                  
                  return panel;
              }
              
              private LinearLayout createStatsPanel() {
                  LinearLayout panel = new LinearLayout(this);
                  panel.setOrientation(LinearLayout.VERTICAL);
                  panel.setPadding(20, 15, 20, 15);
                  panel.setBackgroundColor(Color.parseColor("#16213e"));
                  panel.setLayoutParams(new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT,
                      LinearLayout.LayoutParams.WRAP_CONTENT
                  ));
                  
                  TextView statsTitle = new TextView(this);
                  statsTitle.setText("📈 STATISTICS");
                  statsTitle.setTextSize(16);
                  statsTitle.setTextColor(Color.parseColor("#00ff88"));
                  statsTitle.setTypeface(null, Typeface.BOLD);
                  panel.addView(statsTitle);
                  
                  statsText = new TextView(this);
                  statsText.setText("Trades: 0\nWins: 0 | Losses: 0\nWin Rate: 0%");
                  statsText.setTextSize(13);
                  statsText.setTextColor(Color.parseColor("#ffffff"));
                  statsText.setPadding(0, 10, 0, 0);
                  panel.addView(statsText);
                  
                  return panel;
              }
              
              private void updateBalanceDisplay() {
                  if (balanceValueText != null) {
                      balanceValueText.setText(String.format("$%,.2f", currentBalance));
                  }
                  
                  if (progressText != null && initialBalance > 0) {
                      double pnl = currentBalance - initialBalance;
                      double percentChange = (pnl / initialBalance) * 100;
                      
                      if (pnl > 0) {
                          progressText.setText("✅ PROFIT: +$" + String.format("%.2f", pnl) + " (+" + String.format("%.2f", percentChange) + "%)");
                          progressText.setTextColor(Color.parseColor("#00ff88"));
                      } else if (pnl < 0) {
                          progressText.setText("❌ LOSS: -$" + String.format("%.2f", Math.abs(pnl)) + " (" + String.format("%.2f", percentChange) + "%)");
                          progressText.setTextColor(Color.parseColor("#ff4444"));
                      } else {
                          progressText.setText("⚡ BREAK EVEN");
                          progressText.setTextColor(Color.parseColor("#ffd700"));
                      }
                  }
              }
              
              private void addLog(final String message, final TextView logText) {
                  runOnUiThread(() -> {
                      String timestamp = new SimpleDateFormat("HH:mm:ss", Locale.US).format(new Date());
                      String currentLog = logText.getText().toString();
                      String newLog = "[" + timestamp + "] " + message + "\n" + currentLog;
                      
                      String[] lines = newLog.split("\n");
                      if (lines.length > 30) {
                          StringBuilder sb = new StringBuilder();
                          for (int i = 0; i < 30; i++) {
                              sb.append(lines[i]).append("\n");
                          }
                          newLog = sb.toString();
                      }
                      
                      logText.setText(newLog);
                  });
              }
              
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (webSocket != null) {
                      webSocket.close(1000, "App closed");
                  }
                  handler.removeCallbacksAndMessages(null);
              }
          }
          EOF

          # -------------------- Add OkHttp dependency --------------------
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace 'com.simiyu.tradingbot'
              compileSdk 34

              defaultConfig {
                  applicationId "com.simiyu.tradingbot"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'org.json:json:20230227'
          }
          EOF

          # -------------------- AndroidManifest.xml --------------------
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.simiyu.tradingbot">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/stat_sys_download"
                  android:label="Simiyu Trading Bot"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>

          </manifest>
          EOF

          # -------------------- build.gradle (root) --------------------
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          EOF

          # -------------------- settings.gradle --------------------
          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SimiyuTradingBot"
          include ':app'
          EOF

          # -------------------- gradle.properties --------------------
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0 --distribution-type all
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simiyu-real-deriv-bot
          path: app/build/outputs/apk/debug/*.apk
