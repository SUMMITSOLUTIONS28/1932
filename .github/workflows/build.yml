name: Build TradeFlow Bot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/tradeflow/bot
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          # -------------------- build.gradle (root) --------------------
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          EOF

          # -------------------- settings.gradle --------------------
          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "TradeFlowBot"
          include ':app'
          EOF

          # -------------------- gradle.properties --------------------
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.suppressUnsupportedCompileSdk=34
          EOF

          # -------------------- app/build.gradle (FIXED - removed Kotlin conflicts) --------------------
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace 'com.tradeflow.bot'
              compileSdk 34

              defaultConfig {
                  applicationId "com.tradeflow.bot"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
          }
          EOF

          # -------------------- AndroidManifest.xml --------------------
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />

              <application
                  android:label="TradeFlow Bot"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                  android:icon="@android:drawable/ic_dialog_info">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # -------------------- styles.xml --------------------
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar" />
          </resources>
          EOF

          # -------------------- activity_main.xml --------------------
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:padding="20dp">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="TradeFlow Bot"
                  android:textSize="28sp"
                  android:textStyle="bold"
                  android:textColor="#1F3A4B"
                  android:layout_marginBottom="20dp"/>

              <TextView
                  android:id="@+id/statusText"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="App is working!"
                  android:textSize="18sp"
                  android:textColor="#15803D"
                  android:layout_marginBottom="30dp"/>

              <Button
                  android:id="@+id/testButton"
                  android:layout_width="200dp"
                  android:layout_height="55dp"
                  android:text="TEST BUTTON"
                  android:backgroundTint="#1F3A4B"/>

          </LinearLayout>
          EOF

          # -------------------- MainActivity.java --------------------
          cat > app/src/main/java/com/tradeflow/bot/MainActivity.java << 'EOF'
          package com.tradeflow.bot;

          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {

              private TextView statusText;
              private Button testButton;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  statusText = findViewById(R.id.statusText);
                  testButton = findViewById(R.id.testButton);

                  testButton.setOnClickListener(v -> {
                      Toast.makeText(this, "Button clicked - App is working!", Toast.LENGTH_SHORT).show();
                      statusText.setText("Button was clicked!");
                  });
              }
          }
          EOF

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0 --distribution-type all
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradeFlow-Minimal-APK
          path: app/build/outputs/apk/debug/*.apk
