name: Build TradeFlow Bot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/tradeflow/bot
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }
          EOF

          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "TradeFlowBot"
          include ':app'
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace 'com.tradeflow.bot'
              compileSdk 33

              defaultConfig {
                  applicationId "com.tradeflow.bot"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.9.0'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.code.gson:gson:2.10.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <application
                  android:label="TradeFlow Bot"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                  android:icon="@android:drawable/ic_dialog_info">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".TradingService" android:enabled="true" android:exported="false" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar" />
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="20dp"
              android:gravity="center">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="TradeFlow Bot"
                  android:textSize="28sp"
                  android:textStyle="bold"
                  android:layout_marginBottom="30dp"/>

              <TextView
                  android:id="@+id/balanceText"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Balance: Connecting..."
                  android:gravity="center"
                  android:padding="15dp"
                  android:background="#E0E0E0"
                  android:layout_marginBottom="20dp"/>

              <Button
                  android:id="@+id/startBtn"
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:text="START BOT"
                  android:backgroundTint="#15803D"
                  android:layout_marginBottom="10dp"/>

              <Button
                  android:id="@+id/stopBtn"
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:text="STOP BOT"
                  android:backgroundTint="#B91C1C"/>

              <TextView
                  android:id="@+id/statusText"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Status: Stopped"
                  android:gravity="center"
                  android:padding="15dp"
                  android:layout_marginTop="20dp"/>

              <ScrollView
                  android:layout_width="match_parent"
                  android:layout_height="200dp"
                  android:layout_marginTop="20dp"
                  android:background="#F5F5F5"
                  android:padding="10dp">

                  <TextView
                      android:id="@+id/logText"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Logs will appear here..."
                      android:textSize="11sp"/>
              </ScrollView>
          </LinearLayout>
          EOF

          cat > app/src/main/java/com/tradeflow/bot/MainActivity.java << 'EOF'
          package com.tradeflow.bot;

          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private Button startBtn, stopBtn;
              private TextView balanceText, statusText, logText;
              private SharedPreferences prefs;
              private Handler handler = new Handler(Looper.getMainLooper());
              private boolean isRunning = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  prefs = getSharedPreferences("tradeflow", MODE_PRIVATE);

                  startBtn = findViewById(R.id.startBtn);
                  stopBtn = findViewById(R.id.stopBtn);
                  balanceText = findViewById(R.id.balanceText);
                  statusText = findViewById(R.id.statusText);
                  logText = findViewById(R.id.logText);

                  startBtn.setOnClickListener(v -> startBot());
                  stopBtn.setOnClickListener(v -> stopBot());

                  startDataRefresh();
              }

              private void startBot() {
                  if (isRunning) return;
                  isRunning = true;
                  statusText.setText("Status: RUNNING");
                  addLog("Bot starting...");
                  
                  Intent intent = new Intent(this, TradingService.class);
                  startForegroundService(intent);
                  Toast.makeText(this, "Bot started", Toast.LENGTH_SHORT).show();
              }

              private void stopBot() {
                  if (!isRunning) return;
                  isRunning = false;
                  statusText.setText("Status: STOPPED");
                  addLog("Bot stopped");
                  
                  Intent intent = new Intent(this, TradingService.class);
                  stopService(intent);
                  Toast.makeText(this, "Bot stopped", Toast.LENGTH_SHORT).show();
              }

              private void startDataRefresh() {
                  new Thread(() -> {
                      while (true) {
                          try { Thread.sleep(2000); } catch (InterruptedException e) { break; }
                          runOnUiThread(() -> {
                              float balance = prefs.getFloat("balance", 0f);
                              if (balance > 0) {
                                  balanceText.setText(String.format("Balance: $%.2f", balance));
                              }
                              String log = prefs.getString("event_log", "");
                              if (!log.isEmpty()) logText.setText(log);
                          });
                      }
                  }).start();
              }

              private void addLog(String message) {
                  String timestamp = new SimpleDateFormat("HH:mm:ss", Locale.getDefault()).format(new Date());
                  String existing = prefs.getString("event_log", "");
                  String newLog = "[" + timestamp + "] " + message + "\n" + (existing.length() > 3000 ? existing.substring(0, 3000) : existing);
                  prefs.edit().putString("event_log", newLog).apply();
              }
          }
          EOF

          cat > app/src/main/java/com/tradeflow/bot/TradingService.java << 'EOF'
          package com.tradeflow.bot;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;

          public class TradingService extends Service {
              private SharedPreferences prefs;
              private DerivWebSocket webSocket;

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  prefs = getSharedPreferences("tradeflow", MODE_PRIVATE);
                  createNotificationChannel();
                  startForeground(1, createNotification());
                  
                  webSocket = new DerivWebSocket(prefs, this::onError);
                  webSocket.connect();
                  
                  return START_STICKY;
              }

              private void onError(String error) {
                  android.util.Log.e("TradingService", error);
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel("tradeflow", "TradeFlow Bot", NotificationManager.IMPORTANCE_LOW);
                      getSystemService(NotificationManager.class).createNotificationChannel(channel);
                  }
              }

              private Notification createNotification() {
                  Intent intent = new Intent(this, MainActivity.class);
                  PendingIntent pendingIntent = PendingIntent.getActivity(this, 0, intent, PendingIntent.FLAG_IMMUTABLE);
                  return new NotificationCompat.Builder(this, "tradeflow")
                      .setContentTitle("TradeFlow Bot")
                      .setContentText("Trading bot is running")
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .setContentIntent(pendingIntent)
                      .build();
              }

              @Override
              public void onDestroy() {
                  if (webSocket != null) webSocket.disconnect();
                  super.onDestroy();
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

          cat > app/src/main/java/com/tradeflow/bot/DerivWebSocket.java << 'EOF'
          package com.tradeflow.bot;

          import android.content.SharedPreferences;
          import com.google.gson.Gson;
          import com.google.gson.JsonObject;
          import com.google.gson.JsonParser;
          import okhttp3.OkHttpClient;
          import okhttp3.Request;
          import okhttp3.Response;
          import okhttp3.WebSocket;
          import okhttp3.WebSocketListener;
          import okio.ByteString;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.HashMap;
          import java.util.Locale;
          import java.util.Map;
          import java.util.concurrent.TimeUnit;

          public class DerivWebSocket {
              private final String apiToken = "0XhlE5tsI6zdpFX";
              private final String appId = "32ZFw49Z0RGY4UQGjIrhh";
              private WebSocket webSocket;
              private final Gson gson = new Gson();
              private int reqId = 1;
              private SharedPreferences prefs;
              private OnErrorListener onError;

              public interface OnErrorListener { void onError(String error); }

              public DerivWebSocket(SharedPreferences prefs, OnErrorListener onError) {
                  this.prefs = prefs;
                  this.onError = onError;
                  
                  OkHttpClient client = new OkHttpClient.Builder().pingInterval(30, TimeUnit.SECONDS).build();
                  
                  this.webSocket = client.newWebSocket(
                      new Request.Builder().url("wss://ws.derivws.com/websockets/v3?app_id=" + appId).build(),
                      new WebSocketListener() {
                          @Override public void onOpen(WebSocket webSocket, Response response) { authenticate(); }
                          @Override public void onMessage(WebSocket webSocket, String text) { handleMessage(text); }
                          @Override public void onMessage(WebSocket webSocket, ByteString bytes) { }
                          @Override public void onClosed(WebSocket webSocket, int code, String reason) { }
                          @Override public void onFailure(WebSocket webSocket, Throwable t, Response response) { 
                              onError.onError(t.getMessage()); 
                          }
                      });
              }

              public void connect() { }

              private void authenticate() {
                  Map<String, Object> auth = new HashMap<>();
                  auth.put("authorize", apiToken);
                  auth.put("req_id", reqId++);
                  send(gson.toJson(auth));
              }

              private void handleMessage(String text) {
                  try {
                      JsonObject json = JsonParser.parseString(text).getAsJsonObject();
                      
                      if (json.has("authorize")) {
                          boolean authorized = json.get("authorize").getAsJsonObject().get("authorized").getAsBoolean();
                          if (authorized) {
                              addLog("Connected to Deriv");
                              requestBalance();
                          } else {
                              addLog("Authentication failed");
                          }
                      }
                      
                      if (json.has("balance")) {
                          double balance = json.get("balance").getAsDouble();
                          prefs.edit().putFloat("balance", (float) balance).apply();
                          addLog("Balance: $" + balance);
                      }
                      
                  } catch (Exception e) {
                      addLog("Error: " + e.getMessage());
                  }
              }

              private void requestBalance() {
                  Map<String, Object> req = new HashMap<>();
                  req.put("balance", 1);
                  req.put("req_id", reqId++);
                  send(gson.toJson(req));
              }

              private void addLog(String message) {
                  String timestamp = new SimpleDateFormat("HH:mm:ss", Locale.getDefault()).format(new Date());
                  String existing = prefs.getString("event_log", "");
                  prefs.edit().putString("event_log", "[" + timestamp + "] " + message + "\n" + (existing.length() > 3000 ? existing.substring(0, 3000) : existing)).apply();
              }

              private void send(String message) { if (webSocket != null) webSocket.send(message); }
              public void disconnect() { if (webSocket != null) webSocket.close(1000, null); }
          }
          EOF

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0 --distribution-type all
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradeFlow-Bot-APK
          path: app/build/outputs/apk/debug/*.apk
