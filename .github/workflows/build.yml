name: Build simiyu App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/simiyu/app
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          # -------------------- MainActivity.java --------------------
          cat > app/src/main/java/com/simiyu/app/MainActivity.java << 'EOF'
          package com.simiyu.app;

          import android.os.Bundle;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          import android.graphics.Typeface;
          import android.view.Gravity;
          import android.widget.LinearLayout;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // Create a linear layout as the root view
                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setGravity(Gravity.CENTER);
                  layout.setPadding(50, 50, 50, 50);
                  
                  // Create text view to display name
                  TextView nameTextView = new TextView(this);
                  nameTextView.setText("Simiyu");
                  nameTextView.setTextSize(48);
                  nameTextView.setTypeface(null, Typeface.BOLD);
                  nameTextView.setGravity(Gravity.CENTER);
                  nameTextView.setTextColor(0xFF000000);
                  
                  // Add subtitle
                  TextView subtitleTextView = new TextView(this);
                  subtitleTextView.setText("Welcome to your Dashboard");
                  subtitleTextView.setTextSize(20);
                  subtitleTextView.setGravity(Gravity.CENTER);
                  subtitleTextView.setTextColor(0xFF666666);
                  subtitleTextView.setPadding(0, 20, 0, 0);
                  
                  // Add views to layout
                  layout.addView(nameTextView);
                  layout.addView(subtitleTextView);
                  
                  setContentView(layout);
              }
          }
          EOF

          # -------------------- AndroidManifest.xml --------------------
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.simiyu.app">

              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:label="simiyu"
                  android:theme="@style/Theme.AppCompat.Light">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>

          </manifest>
          EOF

          # -------------------- build.gradle (root) --------------------
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          EOF

          # -------------------- settings.gradle --------------------
          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "simiyu"
          include ':app'
          EOF

          # -------------------- app/build.gradle --------------------
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace 'com.simiyu.app'
              compileSdk 34

              defaultConfig {
                  applicationId "com.simiyu.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # -------------------- gradle.properties --------------------
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0 --distribution-type all
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simiyu-App
          path: app/build/outputs/apk/debug/*.apk
