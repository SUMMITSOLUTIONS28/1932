name: Build Simiyu Trading Bot - Paste Token to Trade

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/simiyu/tradingbot
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > app/src/main/java/com/simiyu/tradingbot/MainActivity.java << 'EOF'
          package com.simiyu.tradingbot;

          import android.os.Bundle;
          import android.os.Handler;
          import android.text.InputType;
          import android.view.View;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.view.Gravity;
          import android.widget.LinearLayout;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;
          import java.util.Random;
          import org.json.JSONObject;
          import okhttp3.*;
          import java.util.concurrent.TimeUnit;

          public class MainActivity extends AppCompatActivity {
              private TextView statusText, balanceText, statsText, logText;
              private EditText tokenInput;
              private Button startButton;
              private LinearLayout mainLayout;
              private Handler handler = new Handler();
              private Random random = new Random();
              
              private String WEBSOCKET_URL = "wss://ws.derivws.com/websockets/v3?app_id=1089";
              
              private String apiToken = "";
              private double currentBalance = 0;
              private OkHttpClient client;
              private WebSocket webSocket;
              private boolean isAuthenticated = false;
              private boolean tradeActive = false;
              private boolean botRunning = false;
              
              private String[] symbols = {"frxEURUSD", "frxGBPUSD", "frxUSDJPY"};
              private String[] symbolNames = {"EUR/USD", "GBP/USD", "USD/JPY"};
              
              private int totalTrades = 0, wins = 0, losses = 0;
              private double totalProfit = 0;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  createUI();
              }
              
              private void createUI() {
                  mainLayout = new LinearLayout(this);
                  mainLayout.setOrientation(LinearLayout.VERTICAL);
                  mainLayout.setPadding(30, 40, 30, 30);
                  mainLayout.setBackgroundColor(Color.parseColor("#0a0a1a"));
                  
                  // Title
                  TextView title = new TextView(this);
                  title.setText("🤖 SIMIYU TRADING BOT");
                  title.setTextSize(24);
                  title.setTextColor(Color.parseColor("#00ff88"));
                  title.setGravity(Gravity.CENTER);
                  title.setTypeface(null, Typeface.BOLD);
                  title.setPadding(0, 0, 0, 30);
                  mainLayout.addView(title);
                  
                  // Info panel
                  TextView info = new TextView(this);
                  info.setText("Enter your Deriv PAT Token to start trading");
                  info.setTextSize(14);
                  info.setTextColor(Color.parseColor("#aaaaaa"));
                  info.setGravity(Gravity.CENTER);
                  info.setPadding(0, 0, 0, 20);
                  mainLayout.addView(info);
                  
                  // Token input
                  tokenInput = new EditText(this);
                  tokenInput.setHint("Paste your PAT token here (starts with pat_)");
                  tokenInput.setHintTextColor(Color.parseColor("#666666"));
                  tokenInput.setBackgroundColor(Color.parseColor("#1a1a2e"));
                  tokenInput.setTextColor(Color.WHITE);
                  tokenInput.setPadding(20, 15, 20, 15);
                  tokenInput.setInputType(InputType.TYPE_TEXT_VARIATION_VISIBLE_PASSWORD);
                  mainLayout.addView(tokenInput);
                  
                  // Start button
                  startButton = new Button(this);
                  startButton.setText("🚀 START BOT");
                  startButton.setBackgroundColor(Color.parseColor("#00ff88"));
                  startButton.setTextColor(Color.BLACK);
                  startButton.setTypeface(null, Typeface.BOLD);
                  startButton.setPadding(0, 20, 0, 20);
                  startButton.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          startTrading();
                      }
                  });
                  mainLayout.addView(startButton);
                  
                  // Status
                  statusText = new TextView(this);
                  statusText.setText("⚡ Waiting for token...");
                  statusText.setTextSize(14);
                  statusText.setTextColor(Color.parseColor("#ffd700"));
                  statusText.setGravity(Gravity.CENTER);
                  statusText.setPadding(0, 20, 0, 10);
                  mainLayout.addView(statusText);
                  
                  // Balance
                  TextView balanceTitle = new TextView(this);
                  balanceTitle.setText("💰 ACCOUNT BALANCE");
                  balanceTitle.setTextSize(16);
                  balanceTitle.setTextColor(Color.parseColor("#ffd700"));
                  balanceTitle.setTypeface(null, Typeface.BOLD);
                  balanceTitle.setPadding(0, 20, 0, 10);
                  mainLayout.addView(balanceTitle);
                  
                  balanceText = new TextView(this);
                  balanceText.setText("$0.00");
                  balanceText.setTextSize(28);
                  balanceText.setTextColor(Color.parseColor("#00ff88"));
                  balanceText.setTypeface(null, Typeface.BOLD);
                  balanceText.setGravity(Gravity.CENTER);
                  mainLayout.addView(balanceText);
                  
                  // Stats
                  TextView statsTitle = new TextView(this);
                  statsTitle.setText("📊 TRADING STATISTICS");
                  statsTitle.setTextSize(16);
                  statsTitle.setTextColor(Color.parseColor("#ffd700"));
                  statsTitle.setTypeface(null, Typeface.BOLD);
                  statsTitle.setPadding(0, 20, 0, 10);
                  mainLayout.addView(statsTitle);
                  
                  statsText = new TextView(this);
                  statsText.setText("Trades: 0 | Wins: 0 | Losses: 0\nProfit: $0.00 | Win Rate: 0%");
                  statsText.setTextSize(13);
                  statsText.setTextColor(Color.parseColor("#ffffff"));
                  mainLayout.addView(statsText);
                  
                  // Log
                  TextView logTitle = new TextView(this);
                  logTitle.setText("📝 TRADING LOG");
                  logTitle.setTextSize(16);
                  logTitle.setTextColor(Color.parseColor("#ffffff"));
                  logTitle.setTypeface(null, Typeface.BOLD);
                  logTitle.setPadding(0, 20, 0, 10);
                  mainLayout.addView(logTitle);
                  
                  logText = new TextView(this);
                  logText.setText("Ready. Paste your PAT token and press START.\n");
                  logText.setTextSize(11);
                  logText.setTextColor(Color.parseColor("#cccccc"));
                  logText.setBackgroundColor(Color.parseColor("#16213e"));
                  logText.setPadding(15, 15, 15, 15);
                  logText.setMaxLines(12);
                  mainLayout.addView(logText);
                  
                  setContentView(mainLayout);
              }
              
              private void startTrading() {
                  apiToken = tokenInput.getText().toString().trim();
                  
                  if (apiToken.isEmpty()) {
                      Toast.makeText(this, "Please paste your PAT token", Toast.LENGTH_SHORT).show();
                      return;
                  }
                  
                  if (!apiToken.startsWith("pat_")) {
                      Toast.makeText(this, "Token must start with 'pat_'", Toast.LENGTH_SHORT).show();
                      return;
                  }
                  
                  addLog("🔌 Token received. Connecting to Deriv...");
                  statusText.setText("🔄 CONNECTING...");
                  startButton.setEnabled(false);
                  startButton.setText("CONNECTING...");
                  
                  connectToDeriv();
              }
              
              private void connectToDeriv() {
                  Request request = new Request.Builder()
                      .url(WEBSOCKET_URL)
                      .addHeader("Deriv-App-ID", "1089")
                      .addHeader("Authorization", "Bearer " + apiToken)
                      .build();
                  
                  client = new OkHttpClient.Builder()
                      .connectTimeout(30, TimeUnit.SECONDS)
                      .writeTimeout(30, TimeUnit.SECONDS)
                      .readTimeout(30, TimeUnit.SECONDS)
                      .build();
                  
                  webSocket = client.newWebSocket(request, new WebSocketListener() {
                      @Override
                      public void onOpen(WebSocket webSocket, okhttp3.Response response) {
                          runOnUiThread(() -> {
                              addLog("✅ WebSocket connected!");
                              statusText.setText("🔐 AUTHENTICATING...");
                          });
                          
                          JSONObject authMsg = new JSONObject();
                          try {
                              authMsg.put("authorize", apiToken);
                              webSocket.send(authMsg.toString());
                          } catch (Exception e) {
                              runOnUiThread(() -> addLog("❌ Auth error: " + e.getMessage()));
                          }
                      }
                      
                      @Override
                      public void onMessage(WebSocket webSocket, String text) {
                          runOnUiThread(() -> {
                              try {
                                  JSONObject json = new JSONObject(text);
                                  
                                  if (json.has("authorize")) {
                                      if (json.getInt("authorize") == 1) {
                                          isAuthenticated = true;
                                          currentBalance = json.getDouble("balance");
                                          balanceText.setText(String.format("$%,.2f", currentBalance));
                                          addLog("✅✅✅ AUTHENTICATED SUCCESSFULLY! ✅✅✅");
                                          addLog("💰 Balance: $" + String.format("%,.2f", currentBalance));
                                          statusText.setText("✅ CONNECTED - TRADING");
                                          statusText.setTextColor(Color.parseColor("#00ff88"));
                                          startButton.setText("BOT RUNNING");
                                          startButton.setEnabled(false);
                                          
                                          // Start random trading
                                          startRandomTrading();
                                      } else {
                                          addLog("❌ Authentication failed! Invalid token.");
                                          statusText.setText("❌ INVALID TOKEN");
                                          statusText.setTextColor(Color.parseColor("#ff4444"));
                                          startButton.setText("START BOT");
                                          startButton.setEnabled(true);
                                      }
                                  }
                                  
                                  if (json.has("balance")) {
                                      currentBalance = json.getDouble("balance");
                                      balanceText.setText(String.format("$%,.2f", currentBalance));
                                  }
                                  
                                  if (json.has("buy")) {
                                      addLog("📊 Trade placed!");
                                      tradeActive = true;
                                  }
                                  
                                  if (json.has("proposal_open_contract")) {
                                      JSONObject contract = json.getJSONObject("proposal_open_contract");
                                      if (contract.has("is_sold") && contract.getBoolean("is_sold")) {
                                          double profit = contract.getDouble("profit");
                                          totalProfit += profit;
                                          totalTrades++;
                                          if (profit > 0) {
                                              wins++;
                                              addLog("✅ WIN! +$" + String.format("%.2f", profit));
                                          } else {
                                              losses++;
                                              addLog("❌ LOSS! " + String.format("%.2f", profit));
                                          }
                                          updateStats();
                                          tradeActive = false;
                                      }
                                  }
                                  
                                  if (json.has("error")) {
                                      addLog("❌ Error: " + json.getJSONObject("error").getString("message"));
                                  }
                                  
                              } catch (Exception e) {
                                  addLog("Parse error: " + e.getMessage());
                              }
                          });
                      }
                      
                      @Override
                      public void onFailure(WebSocket webSocket, Throwable t, okhttp3.Response response) {
                          runOnUiThread(() -> {
                              addLog("❌ Connection error: " + t.getMessage());
                              statusText.setText("⚠️ CONNECTION FAILED");
                              startButton.setText("START BOT");
                              startButton.setEnabled(true);
                          });
                      }
                  });
              }
              
              private void startRandomTrading() {
                  addLog("🔄 Starting random trades every 2 minutes...");
                  
                  handler.postDelayed(new Runnable() {
                      @Override
                      public void run() {
                          if (isAuthenticated && !tradeActive) {
                              executeRandomTrade();
                          }
                          handler.postDelayed(this, 120000);
                      }
                  }, 5000);
              }
              
              private void executeRandomTrade() {
                  if (!isAuthenticated || tradeActive) return;
                  
                  int symbolIndex = random.nextInt(symbols.length);
                  String symbol = symbols[symbolIndex];
                  String symbolName = symbolNames[symbolIndex];
                  String direction = random.nextBoolean() ? "CALL" : "PUT";
                  double stake = Math.max(1.0, currentBalance * 0.01);
                  stake = Math.min(stake, currentBalance * 0.1);
                  
                  JSONObject tradeMsg = new JSONObject();
                  try {
                      JSONObject params = new JSONObject();
                      params.put("amount", stake);
                      params.put("basis", "stake");
                      params.put("contract_type", direction);
                      params.put("currency", "USD");
                      params.put("duration", 2);
                      params.put("duration_unit", "m");
                      params.put("symbol", symbol);
                      
                      tradeMsg.put("buy", 1);
                      tradeMsg.put("price", stake);
                      tradeMsg.put("parameters", params);
                      
                      webSocket.send(tradeMsg.toString());
                      addLog("🎲 TRADE: " + symbolName + " " + direction + " | $" + String.format("%.2f", stake));
                      
                  } catch (Exception e) {
                      addLog("❌ Trade error: " + e.getMessage());
                      tradeActive = false;
                  }
              }
              
              private void updateStats() {
                  double winRate = totalTrades > 0 ? (wins * 100.0 / totalTrades) : 0;
                  statsText.setText(String.format(
                      "Trades: %d | Wins: %d | Losses: %d\nProfit: $%.2f | Win Rate: %.1f%%",
                      totalTrades, wins, losses, totalProfit, winRate
                  ));
              }
              
              private void addLog(String message) {
                  runOnUiThread(() -> {
                      String timestamp = new SimpleDateFormat("HH:mm:ss", Locale.US).format(new Date());
                      String currentLog = logText.getText().toString();
                      String newLog = "[" + timestamp + "] " + message + "\n" + currentLog;
                      String[] lines = newLog.split("\n");
                      if (lines.length > 30) {
                          StringBuilder sb = new StringBuilder();
                          for (int i = 0; i < 30; i++) sb.append(lines[i]).append("\n");
                          newLog = sb.toString();
                      }
                      logText.setText(newLog);
                  });
              }
              
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (webSocket != null) webSocket.close(1000, "App closed");
                  handler.removeCallbacksAndMessages(null);
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/stat_sys_download"
                  android:label="Simiyu Trading Bot"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.simiyu.tradingbot'
              compileSdk 34

              defaultConfig {
                  applicationId "com.simiyu.tradingbot"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'org.json:json:20230227'
          }
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
          }
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SimiyuTradingBot"
          include ':app'
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.suppressUnsupportedCompileSdk=34
          EOF

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0 --distribution-type all
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simiyu-bot-paste-token
          path: app/build/outputs/apk/debug/*.apk
