                      <button class="connect" onclick="connect()">Connect</button>
                      <button class="disconnect" onclick="disconnect()">Stop</button>
                  </div>
                  <div id="accountInfo" class="account-info">No account connected</div>
              </div>

              <div class="card">
                  <div class="stats-grid">
                      <div class="stat"><div>Balance</div><div class="stat-value" id="balance">0.00</div></div>
                      <div class="stat"><div>Profit</div><div class="stat-value profit" id="profit">0.00</div></div>
                      <div class="stat"><div>Loss</div><div class="stat-value loss" id="loss">0.00</div></div>
                      <div class="stat"><div>Open Trades</div><div class="stat-value" id="openTrades">0</div></div>
                      <div class="stat"><div>Consecutive Losses</div><div class="stat-value" id="consecutiveLosses">0</div></div>
                      <div class="stat"><div>Status</div><div><span class="status-dot red" id="statusDot"></span><span id="statusText">Disconnected</span></div></div>
                  </div>
              </div>

              <div class="card">
                  <h3>Trade Log</h3>
                  <div class="trade-log">
                      <table id="tradeTable">
                          <thead><tr><th>Pair</th><th>Action</th><th>R:R</th><th>Time</th></tr></thead>
                          <tbody></tbody>
                       </table>
                  </div>
              </div>
          </div>

          <script>
              // Profile image upload
              function uploadProfileImage(event) {
                  const file = event.target.files[0];
                  if (file) {
                      const reader = new FileReader();
                      reader.onload = function(e) {
                          localStorage.setItem('profileImage', e.target.result);
                          document.getElementById('profileImg').src = e.target.result;
                      }
                      reader.readAsDataURL(file);
                  }
              }
              const savedImg = localStorage.getItem('profileImage');
              if (savedImg) document.getElementById('profileImg').src = savedImg;

              function connect() {
                  const token = document.getElementById('apiToken').value.trim();
                  if (!token) { log("Please enter API token"); return; }
                  AndroidBot.connect(token);
                  log("Connecting to Deriv...");
              }
              function disconnect() { AndroidBot.disconnect(); updateConnectionStatus(false); log("Bot stopped"); }

              function updateBotStatus(balance, profit, loss, status, openTrades, consecutiveLosses) {
                  document.getElementById('balance').innerText = parseFloat(balance).toFixed(2);
                  document.getElementById('profit').innerText = parseFloat(profit).toFixed(2);
                  document.getElementById('loss').innerText = parseFloat(loss).toFixed(2);
                  document.getElementById('openTrades').innerText = openTrades;
                  document.getElementById('consecutiveLosses').innerText = consecutiveLosses;
                  const dot = document.getElementById('statusDot');
                  const text = document.getElementById('statusText');
                  if (status === 'Connected') {
                      dot.className = 'status-dot green';
                      text.innerText = 'Connected';
                  } else {
                      dot.className = 'status-dot red';
                      text.innerText = 'Disconnected';
                  }
              }
              function updateConnectionStatus(connected) {
                  const dot = document.getElementById('statusDot');
                  const text = document.getElementById('statusText');
                  if (connected) {
                      dot.className = 'status-dot green';
                      text.innerText = 'Connected';
                      log("Connected to Deriv");
                  } else {
                      dot.className = 'status-dot red';
                      text.innerText = 'Disconnected';
                      log("Disconnected - retrying...");
                  }
              }
              function updateAccountDisplay(info) {
                  const div = document.getElementById('accountInfo');
                  if (info && info.loginid) {
                      div.innerHTML = `<strong>${info.loginid}</strong> | Balance: ${info.balance} ${info.currency} | ${info.is_virtual ? 'Demo' : 'Real'}`;
                  } else {
                      div.innerHTML = 'No account connected. Please enter API token and click Connect.';
                  }
              }
              function addTradeToTable(pair, action, rr) {
                  const tbody = document.getElementById('tradeTable').getElementsByTagName('tbody')[0];
                  const row = tbody.insertRow(0);
                  const time = new Date().toLocaleTimeString();
                  row.insertCell(0).innerText = pair;
                  row.insertCell(1).innerText = action;
                  row.insertCell(2).innerText = rr;
                  row.insertCell(3).innerText = time;
                  if (tbody.rows.length > 50) tbody.deleteRow(50);
              }
              function log(msg) { console.log(msg); }

              // Listen for trade broadcasts from Android
              window.addEventListener('message', function(e) {
                  if (e.data && e.data.type === 'newTrade') {
                      addTradeToTable(e.data.pair, e.data.action, e.data.rr);
                  }
              });

              // Periodically fetch account info and connection status
              setInterval(() => {
                  if (typeof AndroidBot !== 'undefined') {
                      AndroidBot.getConnectionStatus();
                      const infoStr = AndroidBot.getAccountInfo();
                      try {
                          const info = JSON.parse(infoStr);
                          if (info && info.loginid) updateAccountDisplay(info);
                      } catch(e) { console.log("parse error", e); }
                  }
              }, 2000);
          </script>
          </body>
