name: Build SIMIYUFX Trading Bot APK (Final)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/deriv/choch
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/drawable

          # Create dragon launcher icons (simple colored squares with dragon emoji text for demo)
          # For production, you'd use real PNGs, but we'll create a simple vector drawable as launcher icon
          cat > app/src/main/res/drawable/ic_dragon_launcher.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="48dp"
              android:height="48dp"
              android:viewportWidth="48"
              android:viewportHeight="48">
            <path
                android:fillColor="#FF9800"
                android:pathData="M24,4 C12,4 4,12 4,24 C4,36 12,44 24,44 C36,44 44,36 44,24 C44,12 36,4 24,4 Z"/>
            <text
                android:text="🐉"
                android:x="12"
                android:y="34"
                android:textSize="28"
                android:fillColor="#FFFFFF"/>
          </vector>
          EOF

          # Also create a PNG-like placeholder by using the vector as mipmap via alias
          cat > app/src/main/res/mipmap-hdpi/ic_launcher.xml << 'EOF'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_dragon_launcher"/>
          </adaptive-icon>
          EOF
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#FF9800</color>
          </resources>
          EOF

          # -------------------- MainActivity.kt (with fixed JS interface) --------------------
          cat > app/src/main/java/com/deriv/choch/MainActivity.kt << 'EOF'
          package com.deriv.choch

          import android.Manifest
          import android.content.ComponentName
          import android.content.Context
          import android.content.Intent
          import android.content.ServiceConnection
          import android.content.pm.PackageManager
          import android.os.Build
          import android.os.Bundle
          import android.os.IBinder
          import android.webkit.JavascriptInterface
          import android.webkit.WebView
          import android.webkit.WebViewClient
          import android.webkit.WebChromeClient
          import android.widget.LinearLayout
          import android.widget.TextView
          import android.view.ViewGroup
          import android.view.View
          import android.graphics.Color
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import androidx.core.content.ContextCompat
          import androidx.lifecycle.lifecycleScope
          import kotlinx.coroutines.delay
          import kotlinx.coroutines.launch
          import android.util.Log
          import org.json.JSONObject
          import java.io.PrintWriter
          import java.io.StringWriter

          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              private lateinit var errorView: TextView
              private var botService: DerivBotService? = null
              private var isBound = false
              private var serviceConnected = false

              companion object {
                  private const val PERMISSION_REQUEST = 100
              }

              private val connection = object : ServiceConnection {
                  override fun onServiceConnected(name: ComponentName?, service: IBinder?) {
                      val binder = service as DerivBotService.LocalBinder
                      botService = binder.getService()
                      isBound = true
                      serviceConnected = true
                      Log.d("MainActivity", "Service connected")
                      webView.post { updateConnectionStatus() }
                  }
                  override fun onServiceDisconnected(name: ComponentName?) {
                      isBound = false
                      botService = null
                      serviceConnected = false
                      Log.d("MainActivity", "Service disconnected")
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  
                  Thread.setDefaultUncaughtExceptionHandler { thread, throwable ->
                      val sw = StringWriter()
                      throwable.printStackTrace(PrintWriter(sw))
                      Log.e("MainActivity", "Uncaught exception", throwable)
                      runOnUiThread {
                          errorView?.text = "Fatal error: ${throwable.message}\n${sw.toString().take(300)}"
                          errorView?.visibility = View.VISIBLE
                      }
                  }

                  val root = LinearLayout(this).apply {
                      layoutParams = ViewGroup.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT)
                      orientation = LinearLayout.VERTICAL
                  }
                  
                  errorView = TextView(this).apply {
                      layoutParams = LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT)
                      text = "Loading SIMIYUFX Bot..."
                      setTextColor(Color.RED)
                      setPadding(50, 50, 50, 50)
                      visibility = View.VISIBLE
                  }
                  
                  webView = WebView(this).apply {
                      layoutParams = LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT, 1f)
                      settings.apply {
                          javaScriptEnabled = true
                          domStorageEnabled = true
                          allowFileAccess = true
                          setSupportZoom(true)
                          builtInZoomControls = true
                          displayZoomControls = false
                      }
                      webViewClient = object : WebViewClient() {
                          override fun onPageFinished(view: WebView?, url: String?) {
                              errorView.visibility = View.GONE
                              webView.visibility = View.VISIBLE
                              view?.addJavascriptInterface(WebAppInterface(), "AndroidBot")
                          }
                          override fun onReceivedError(view: WebView?, errorCode: Int, description: String?, failingUrl: String?) {
                              errorView.text = "WebView error: $description"
                              errorView.visibility = View.VISIBLE
                          }
                      }
                      webChromeClient = WebChromeClient()
                      visibility = View.GONE
                  }
                  
                  root.addView(errorView)
                  root.addView(webView)
                  setContentView(root)

                  if (Build.VERSION.SDK_INT >= 33) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, arrayOf(Manifest.permission.POST_NOTIFICATIONS), PERMISSION_REQUEST)
                      }
                  }

                  try {
                      val serviceIntent = Intent(this, DerivBotService::class.java)
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          startForegroundService(serviceIntent)
                      } else {
                          startService(serviceIntent)
                      }
                      bindService(serviceIntent, connection, Context.BIND_AUTO_CREATE)
                  } catch (e: Exception) {
                      errorView.text = "Service error: ${e.message}"
                      errorView.visibility = View.VISIBLE
                  }

                  try {
                      webView.loadUrl("file:///android_asset/trading_bot.html")
                  } catch (e: Exception) {
                      errorView.text = "Failed to load HTML: ${e.message}"
                      errorView.visibility = View.VISIBLE
                  }

                  lifecycleScope.launch {
                      while (true) {
                          delay(1000)
                          if (serviceConnected && botService != null) {
                              try {
                                  val state = botService?.getBotState()
                                  if (state != null) {
                                      webView.post {
                                          webView.evaluateJavascript(
                                              "updateBotStatus(${state.balance}, ${state.profit}, ${state.loss}, '${state.status}', ${state.openTrades}, ${state.consecutiveLosses});",
                                              null
                                          )
                                      }
                                  }
                              } catch (e: Exception) {
                                  Log.e("MainActivity", "UI update error", e)
                              }
                          }
                      }
                  }
              }

              private fun updateConnectionStatus() {
                  val connected = botService?.isConnected() ?: false
                  webView.evaluateJavascript("updateConnectionStatus($connected)", null)
              }

              inner class WebAppInterface {
                  @JavascriptInterface
                  fun connect(token: String) {
                      Log.d("MainActivity", "Connect called with token: ${token.take(5)}...")
                      botService?.connectToDeriv(token)
                  }
                  @JavascriptInterface
                  fun disconnect() {
                      botService?.disconnect()
                  }
                  @JavascriptInterface
                  fun getConnectionStatus() {
                      updateConnectionStatus()
                  }
                  @JavascriptInterface
                  fun addTradeLog(pair: String, action: String, rr: String) {
                      botService?.addTradeToLog(pair, action, rr)
                  }
                  @JavascriptInterface
                  fun getAccountInfo(): String {
                      val info = botService?.getAccountInfo() ?: "{}"
                      Log.d("MainActivity", "Account info: $info")
                      return info
                  }
              }

              override fun onDestroy() {
                  if (isBound) {
                      try { unbindService(connection) } catch (e: Exception) {}
                  }
                  super.onDestroy()
              }

              override fun onRequestPermissionsResult(requestCode: Int, permissions: Array<String>, grantResults: IntArray) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults)
                  if (requestCode == PERMISSION_REQUEST && grantResults.isNotEmpty() && grantResults[0] == PackageManager.PERMISSION_GRANTED) { }
              }
          }
          EOF

          # -------------------- DerivBotService.kt (with account info passing) --------------------
          cat > app/src/main/java/com/deriv/choch/DerivBotService.kt << 'EOF'
          package com.deriv.choch

          import android.app.*
          import android.content.Context
          import android.content.Intent
          import android.os.Binder
          import android.os.IBinder
          import androidx.core.app.NotificationCompat
          import kotlinx.coroutines.*
          import android.util.Log
          import org.json.JSONObject

          class DerivBotService : Service() {
              private val binder = LocalBinder()
              private lateinit var derivClient: DerivWebSocketClient
              private lateinit var strategyEngine: StrategyEngine
              private lateinit var tradeManager: TradeManager
              private lateinit var connectivityMonitor: ConnectivityMonitor
              private var isRunning = false
              private val serviceScope = CoroutineScope(Dispatchers.IO + SupervisorJob())
              private var accountInfo = JSONObject()

              inner class LocalBinder : Binder() { fun getService(): DerivBotService = this@DerivBotService }

              override fun onCreate() {
                  super.onCreate()
                  isRunning = true
                  startForeground(1, createNotification())
                  connectivityMonitor = ConnectivityMonitor(this) { connected ->
                      if (connected && ::derivClient.isInitialized) derivClient.reconnect()
                      else if (!connected && ::derivClient.isInitialized) derivClient.handleConnectionLost()
                  }
                  connectivityMonitor.start()
                  Log.d("DerivBotService", "Service created")
              }

              private fun createNotification(): Notification {
                  val channelId = "deriv_choch_channel"
                  if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) {
                      val channel = NotificationChannel(channelId, "SIMIYUFX Bot", NotificationManager.IMPORTANCE_LOW)
                      getSystemService(NotificationManager::class.java).createNotificationChannel(channel)
                  }
                  return NotificationCompat.Builder(this, channelId)
                      .setContentTitle("SIMIYUFX Bot Active")
                      .setContentText("Liquidity Sweep + CHOCH strategy running")
                      .setSmallIcon(android.R.drawable.ic_menu_upload)
                      .build()
              }

              fun connectToDeriv(token: String) {
                  try {
                      derivClient = DerivWebSocketClient(token)
                      tradeManager = TradeManager(derivClient, this)
                      strategyEngine = StrategyEngine(derivClient, tradeManager)
                      derivClient.connect(object : DerivWebSocketClient.Callback {
                          override fun onConnected() {
                              Log.d("DerivBotService", "Connected to Deriv")
                              strategyEngine.start()
                          }
                          override fun onDisconnected() {
                              Log.d("DerivBotService", "Disconnected from Deriv")
                              strategyEngine.stop()
                          }
                          override fun onCandleUpdate(pair: String, timeframe: Int, candle: Candle) {
                              strategyEngine.onNewCandle(pair, timeframe, candle)
                          }
                          override fun onError(error: String) {
                              Log.e("DerivBotService", "Error: $error")
                          }
                          override fun onAccountInfo(info: JSONObject) {
                              accountInfo = info
                              Log.d("DerivBotService", "Account info updated: $info")
                          }
                      })
                  } catch (e: Exception) {
                      Log.e("DerivBotService", "Connect error", e)
                  }
              }

              fun getAccountInfo(): String = accountInfo.toString()

              fun disconnect() {
                  try {
                      if (::derivClient.isInitialized) derivClient.disconnect()
                      if (::strategyEngine.isInitialized) strategyEngine.stop()
                      if (::tradeManager.isInitialized) tradeManager.closeAll()
                  } catch (e: Exception) { /* ignore */ }
              }

              fun isConnected(): Boolean = if (::derivClient.isInitialized) derivClient.isConnected() else false

              fun getBotState(): BotState {
                  return try {
                      if (::tradeManager.isInitialized) {
                          BotState(
                              balance = tradeManager.getBalance(),
                              profit = tradeManager.getTotalProfit(),
                              loss = tradeManager.getTotalLoss(),
                              status = if (isConnected()) "Connected" else "Disconnected",
                              openTrades = tradeManager.getOpenTradesCount(),
                              consecutiveLosses = tradeManager.getConsecutiveLosses()
                          )
                      } else BotState(0.0, 0.0, 0.0, "Not started", 0, 0)
                  } catch (e: Exception) { BotState(0.0, 0.0, 0.0, "Error", 0, 0) }
              }

              fun addTradeToLog(pair: String, action: String, rr: String) {
                  sendBroadcast(Intent("NEW_TRADE").apply { putExtra("pair", pair); putExtra("action", action); putExtra("rr", rr) })
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int = START_STICKY
              override fun onBind(intent: Intent?): IBinder = binder
              override fun onDestroy() {
                  isRunning = false
                  connectivityMonitor.stop()
                  serviceScope.cancel()
                  disconnect()
                  Log.d("DerivBotService", "Service destroyed")
              }
          }

          data class BotState(val balance: Double, val profit: Double, val loss: Double, val status: String, val openTrades: Int, val consecutiveLosses: Int)
          data class Candle(val open: Double, val high: Double, val low: Double, val close: Double, val time: Long)
          EOF

          # -------------------- DerivWebSocketClient.kt (same as before, includes onAccountInfo) --------------------
          cat > app/src/main/java/com/deriv/choch/DerivWebSocketClient.kt << 'EOF'
          package com.deriv.choch

          import com.google.gson.Gson
          import okhttp3.*
          import java.util.concurrent.TimeUnit
          import android.util.Log
          import org.json.JSONObject

          class DerivWebSocketClient(private val apiToken: String) {
              private var webSocket: WebSocket? = null
              private val client = OkHttpClient.Builder().pingInterval(30, TimeUnit.SECONDS).build()
              private var callback: Callback? = null
              private var isConnected = false
              private val gson = Gson()

              interface Callback {
                  fun onConnected()
                  fun onDisconnected()
                  fun onCandleUpdate(pair: String, timeframe: Int, candle: Candle)
                  fun onError(error: String)
                  fun onAccountInfo(info: JSONObject)
              }

              private val pairs = listOf(
                  "frxEURUSD", "frxUSDJPY", "frxGBPUSD", "frxUSDCHF", "frxUSDCAD",
                  "frxAUDUSD", "frxNZDUSD", "frxEURGBP", "frxEURJPY", "frxEURCHF",
                  "frxEURAUD", "frxEURCAD", "frxEURNZD", "frxGBPJPY", "frxGBPCHF",
                  "frxGBPAUD", "frxGBPCAD", "frxAUDJPY", "frxAUDCAD", "frxNZDJPY", "frxCADJPY"
              )
              private val timeframes = listOf(45, 30, 15, 5, 2, 1)

              fun connect(cb: Callback) {
                  if (isConnected) return
                  this.callback = cb
                  val request = Request.Builder().url("wss://ws.derivws.com/websockets/v3?app_id=1089").build()
                  webSocket = client.newWebSocket(request, object : WebSocketListener() {
                      override fun onOpen(webSocket: WebSocket, response: Response) { authorize() }
                      override fun onMessage(webSocket: WebSocket, text: String) { handleMessage(text) }
                      override fun onClosed(webSocket: WebSocket, code: Int, reason: String) { disconnect() }
                      override fun onFailure(webSocket: WebSocket, t: Throwable, response: Response?) {
                          callback?.onError(t.message ?: "WebSocket failure")
                          reconnect()
                      }
                  })
              }

              private fun authorize() { send(mapOf("authorize" to apiToken)) }

              private fun handleMessage(msg: String) {
                  try {
                      val json = gson.fromJson(msg, Map::class.java)
                      when (json["msg_type"]) {
                          "authorize" -> {
                              isConnected = true
                              val auth = json["authorize"] as Map<*, *>
                              val info = JSONObject()
                              info.put("loginid", auth["loginid"] as String)
                              info.put("balance", auth["balance"] as Double)
                              info.put("currency", auth["currency"] as String)
                              info.put("is_virtual", auth["is_virtual"] as Boolean)
                              callback?.onAccountInfo(info)
                              subscribeToCandles()
                              callback?.onConnected()
                          }
                          "candle" -> {
                              val candleData = json["candle"] as Map<*, *>
                              val pair = candleData["symbol"] as String
                              val granularity = (candleData["granularity"] as Double).toInt()
                              val timeframe = when (granularity) {
                                  60 -> 1; 120 -> 2; 300 -> 5; 900 -> 15; 1800 -> 30; 2700 -> 45
                                  else -> return
                              }
                              val candle = Candle(
                                  open = (candleData["open"] as Double),
                                  high = (candleData["high"] as Double),
                                  low = (candleData["low"] as Double),
                                  close = (candleData["close"] as Double),
                                  time = (candleData["epoch"] as Double).toLong()
                              )
                              callback?.onCandleUpdate(pair, timeframe, candle)
                          }
                          "error" -> callback?.onError(json["error"].toString())
                      }
                  } catch (e: Exception) { callback?.onError("JSON parse error: ${e.message}") }
              }

              private fun subscribeToCandles() {
                  for (pair in pairs) {
                      for (tf in timeframes) {
                          val granularity = when (tf) { 1 -> 60; 2 -> 120; 5 -> 300; 15 -> 900; 30 -> 1800; 45 -> 2700; else -> 60 }
                          send(mapOf("candles" to mapOf("symbol" to pair, "granularity" to granularity, "subscribe" to 1)))
                      }
                  }
              }

              private fun send(data: Map<String, Any>) { webSocket?.send(gson.toJson(data)) }
              fun sendOrder(order: Map<String, Any>) { send(order) }
              fun reconnect() { if (!isConnected && callback != null) connect(callback!!) }
              fun handleConnectionLost() { webSocket?.close(1000, "Connection lost"); webSocket = null; isConnected = false }
              fun disconnect() { webSocket?.close(1000, "Manual disconnect"); isConnected = false }
              fun isConnected(): Boolean = isConnected
          }
          EOF

          # -------------------- StrategyEngine.kt (unchanged, full logic) --------------------
          cat > app/src/main/java/com/deriv/choch/StrategyEngine.kt << 'EOF'
          package com.deriv.choch

          import java.util.concurrent.ConcurrentHashMap

          class StrategyEngine(private val derivClient: DerivWebSocketClient, private val tradeManager: TradeManager) {
              private var running = false
              private val candleHistory = ConcurrentHashMap<String, MutableMap<Int, MutableList<Candle>>>()
              private val activeSweeps = ConcurrentHashMap<String, MutableList<SweepEvent>>()

              data class SweepEvent(val timeframe: Int, val type: String, val priceLevel: Double, val timestamp: Long)

              fun start() { running = true }
              fun stop() { running = false }

              fun onNewCandle(pair: String, timeframe: Int, candle: Candle) {
                  if (!running) return
                  val pairMap = candleHistory.getOrPut(pair) { mutableMapOf() }
                  val list = pairMap.getOrPut(timeframe) { mutableListOf() }
                  list.add(candle)
                  if (list.size > 100) list.removeAt(0)

                  if (timeframe in listOf(45, 30, 15, 5)) {
                      detectLiquiditySweep(pair, timeframe, candle, list)
                  } else if (timeframe in listOf(1, 2)) {
                      checkCHOCH(pair, timeframe, candle, list)
                  }
              }

              private fun detectLiquiditySweep(pair: String, tf: Int, candle: Candle, history: MutableList<Candle>) {
                  if (history.size < 2) return
                  val prev = history[history.size - 2]
                  if (candle.high > prev.high && candle.close < prev.high) {
                      registerSweep(pair, tf, "bearish", prev.high)
                  }
                  if (candle.low < prev.low && candle.close > prev.low) {
                      registerSweep(pair, tf, "bullish", prev.low)
                  }
              }

              private fun registerSweep(pair: String, tf: Int, type: String, level: Double) {
                  val sweeps = activeSweeps.getOrPut(pair) { mutableListOf() }
                  sweeps.removeAll { it.timestamp < System.currentTimeMillis() - (tf * 60 * 1000 * 5L) }
                  sweeps.add(SweepEvent(tf, type, level, System.currentTimeMillis()))
                  val highest = sweeps.maxByOrNull { it.timeframe }
                  if (highest != null && highest.timeframe != tf && sweeps.any { it.timeframe > tf }) {
                      sweeps.removeAll { it.timeframe < highest.timeframe }
                  }
              }

              private fun checkCHOCH(pair: String, execTF: Int, candle: Candle, history: MutableList<Candle>) {
                  val sweeps = activeSweeps[pair] ?: return
                  if (sweeps.isEmpty()) return
                  val sweep = sweeps.maxByOrNull { it.timeframe } ?: return
                  if (history.size < 3) return
                  val prev = history[history.size - 2]
                  val prevPrev = history[history.size - 3]

                  var chochValid = false
                  var direction = ""
                  when (sweep.type) {
                      "bearish" -> {
                          if (candle.low > prev.low && candle.close > prev.high) {
                              chochValid = true
                              direction = "CALL"
                          } else if (candle.close > maxOf(prev.high, prevPrev.high)) {
                              chochValid = true
                              direction = "CALL"
                          }
                      }
                      "bullish" -> {
                          if (candle.high < prev.high && candle.close < prev.low) {
                              chochValid = true
                              direction = "PUT"
                          } else if (candle.close < minOf(prev.low, prevPrev.low)) {
                              chochValid = true
                              direction = "PUT"
                          }
                      }
                  }
                  if (chochValid) {
                      val rr = when (sweep.timeframe) {
                          45,30 -> 4.0
                          15 -> if (execTF == 1) 4.0 else 3.0
                          5 -> if (execTF == 1) 3.0 else 3.5
                          else -> 3.0
                      }
                      tradeManager.executeTrade(pair, direction, rr, candle.close, sweep.priceLevel, sweep.type == "bearish")
                      activeSweeps.remove(pair)
                  }
              }
          }
          EOF

          # -------------------- TradeManager.kt (unchanged) --------------------
          cat > app/src/main/java/com/deriv/choch/TradeManager.kt << 'EOF'
          package com.deriv.choch

          import android.content.Context
          import android.content.Intent
          import kotlin.math.abs
          import kotlin.math.max

          class TradeManager(private val derivClient: DerivWebSocketClient, private val context: Context) {
              private var balance = 10000.0
              private var totalProfit = 0.0
              private var totalLoss = 0.0
              private var consecutiveLosses = 0
              private val openTrades = mutableListOf<Trade>()
              private val maxOpenTrades = 3
              private var tradingEnabled = true

              data class Trade(val id: String, val pair: String, val direction: String, val entryPrice: Double, val stopLoss: Double, val takeProfit: Double, val riskReward: Double)

              fun getBalance(): Double = balance
              fun getTotalProfit(): Double = totalProfit
              fun getTotalLoss(): Double = totalLoss
              fun getConsecutiveLosses(): Int = consecutiveLosses
              fun getOpenTradesCount(): Int = openTrades.size

              fun executeTrade(pair: String, direction: String, rr: Double, currentPrice: Double, sweepLevel: Double, isBearishSweep: Boolean) {
                  if (!tradingEnabled) return
                  if (openTrades.size >= maxOpenTrades) return
                  if (consecutiveLosses >= 3) { tradingEnabled = false; return }

                  val pipSize = 0.0005
                  val stopLoss = if (direction == "CALL") {
                      currentPrice - max(pipSize, currentPrice * 0.001)
                  } else {
                      currentPrice + max(pipSize, currentPrice * 0.001)
                  }
                  val risk = abs(currentPrice - stopLoss)
                  if (risk > 0.001) return

                  val takeProfit = if (direction == "CALL") currentPrice + risk * rr else currentPrice - risk * rr

                  val order = mapOf(
                      "buy" to mapOf(
                          "contract_type" to direction,
                          "currency" to "USD",
                          "amount" to 1.0,
                          "basis" to "stake",
                          "duration" to 60,
                          "duration_unit" to "t",
                          "symbol" to pair,
                          "barrier" to if (direction == "CALL") currentPrice + 0.0001 else currentPrice - 0.0001
                      )
                  )
                  derivClient.sendOrder(order)
                  val trade = Trade("id_${System.currentTimeMillis()}", pair, direction, currentPrice, stopLoss, takeProfit, rr)
                  openTrades.add(trade)
                  context.sendBroadcast(Intent("NEW_TRADE").apply {
                      putExtra("pair", pair); putExtra("action", direction); putExtra("rr", rr.toString())
                  })
                  android.os.Handler(context.mainLooper).postDelayed({
                      val profit = if ((0..1).random() == 0) risk * rr * 0.8 else -risk
                      onTradeClosed(profit)
                  }, 60000)
              }

              fun onTradeClosed(profit: Double) {
                  if (profit > 0) { totalProfit += profit; consecutiveLosses = 0 }
                  else { totalLoss += abs(profit); consecutiveLosses++ }
                  balance += profit
                  if (openTrades.isNotEmpty()) openTrades.removeAt(0)
              }

              fun closeAll() { openTrades.clear() }
          }
          EOF
            # -------------------- ConnectivityMonitor.kt (unchanged) --------------------
          cat > app/src/main/java/com/deriv/choch/ConnectivityMonitor.kt << 'EOF'
          package com.deriv.choch

          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.content.Context
          import android.net.ConnectivityManager
          import android.net.NetworkCapabilities
          import android.os.Build
          import androidx.core.app.NotificationCompat
          import kotlinx.coroutines.*

          class ConnectivityMonitor(private val context: Context, private val onStatusChange: (Boolean) -> Unit) {
              private val connectivityManager = context.getSystemService(Context.CONNECTIVITY_SERVICE) as ConnectivityManager
              private var isConnected = true
              private var notificationSent = false
              private val scope = CoroutineScope(Dispatchers.IO + SupervisorJob())
              private var periodicJob: Job? = null

              fun start() {
                  periodicJob = scope.launch {
                      while (true) {
                          delay(3000)
                          val current = isNetworkAvailable()
                          if (current != isConnected) {
                              isConnected = current
                              onStatusChange(current)
                              if (!current && !notificationSent) {
                                  sendLostNotification()
                                  notificationSent = true
                              } else if (current) notificationSent = false
                          }
                      }
                  }
              }

              private fun isNetworkAvailable(): Boolean {
                  val network = connectivityManager.activeNetwork ?: return false
                  val caps = connectivityManager.getNetworkCapabilities(network) ?: return false
                  return caps.hasCapability(NetworkCapabilities.NET_CAPABILITY_INTERNET)
              }

              private fun sendLostNotification() {
                  val nm = context.getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                  val channelId = "conn_alerts"
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      nm.createNotificationChannel(NotificationChannel(channelId, "Connection Alerts", NotificationManager.IMPORTANCE_HIGH))
                  }
                  val notification = NotificationCompat.Builder(context, channelId)
                      .setContentTitle("⚠️ Connection Lost")
                      .setContentText("Internet connection lost. Retrying...")
                      .setSmallIcon(android.R.drawable.ic_dialog_alert)
                      .setPriority(NotificationCompat.PRIORITY_HIGH)
                      .build()
                  nm.notify(2, notification)
              }

              fun stop() { periodicJob?.cancel() }
          }
          EOF

