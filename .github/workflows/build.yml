              private void saveApiCredentials() {
                  String token = apiTokenInput.getText().toString().trim();
                  String account = accountIdInput.getText().toString().trim();
                  if (token.isEmpty() || account.isEmpty()) {
                      Toast.makeText(this, "Enter both API Token and Account ID", Toast.LENGTH_SHORT).show();
                      return;
                  }
                  prefs.edit().putString("api_token", token).putString("account_id", account).apply();
                  apiCard.setVisibility(View.GONE);
                  Toast.makeText(this, "API credentials saved", Toast.LENGTH_SHORT).show();
              }

              private void startBot() {
                  String token = prefs.getString("api_token", "");
                  String account = prefs.getString("account_id", "");
                  if (token.isEmpty() || account.isEmpty()) {
                      apiCard.setVisibility(View.VISIBLE);
                      Toast.makeText(this, "Please enter API credentials first", Toast.LENGTH_SHORT).show();
                      return;
                  }
                  
                  isBotRunning = true;
                  startTime = System.currentTimeMillis();
                  botStatus.setText("ACTIVE");
                  botStatus.setTextColor(getColor(android.R.color.holo_green_dark));
                  
                  Intent intent = new Intent(this, TradingService.class);
                  intent.putExtra("API_TOKEN", token);
                  intent.putExtra("ACCOUNT_ID", account);
                  startForegroundService(intent);
                  
                  startUptimeTimer();
                  startDataRefresh();
                  Toast.makeText(this, "Bot started - Connecting to Deriv", Toast.LENGTH_SHORT).show();
              }

              private void stopBot() {
                  isBotRunning = false;
                  botStatus.setText("INACTIVE");
                  botStatus.setTextColor(getColor(android.R.color.darker_gray));
                  Intent intent = new Intent(this, TradingService.class);
                  stopService(intent);
                  Toast.makeText(this, "Bot stopped", Toast.LENGTH_SHORT).show();
              }

              private void startUptimeTimer() {
                  new Thread(() -> {
                      while (isBotRunning) {
                          try { Thread.sleep(1000); } catch (InterruptedException e) { break; }
                          long elapsed = System.currentTimeMillis() - startTime;
                          long h = (elapsed / 3600000) % 24;
                          long m = (elapsed / 60000) % 60;
                          long s = (elapsed / 1000) % 60;
                          String time = String.format("%02d:%02d:%02d", h, m, s);
                          runOnUiThread(() -> uptimeTimer.setText(time));
                      }
                  }).start();
              }

              private void startDataRefresh() {
                  new Thread(() -> {
                      while (isBotRunning) {
                          try { Thread.sleep(5000); } catch (InterruptedException e) { break; }
                          runOnUiThread(() -> {
                              loadStatsFromStorage();
                              loadActiveTrades();
                              loadTradeHistory();
                              loadBalance();
                          });
                      }
                  }).start();
              }

              private void loadBalance() {
                  float balance = prefs.getFloat("balance", 0f);
                  balanceText.setText(String.format("💰 Balance: $%.2f", balance));
              }

              private void loadStatsFromStorage() {
                  winsCount.setText(String.valueOf(prefs.getInt("wins", 0)));
                  lossesCount.setText(String.valueOf(prefs.getInt("losses", 0)));
                  consecutiveWins.setText(String.valueOf(prefs.getInt("consecutive_wins", 0)));
                  consecutiveLosses.setText(String.valueOf(prefs.getInt("consecutive_losses", 0)));
                  int wins = prefs.getInt("wins", 0);
                  int losses = prefs.getInt("losses", 0);
                  int total = wins + losses;
                  int rate = total > 0 ? (wins * 100 / total) : 0;
                  winRate.setText(rate + "%");
                  float pl = prefs.getFloat("total_pl", 0f);
                  totalPL.setText(String.format("$%.2f", pl));
                  totalPL.setTextColor(pl >= 0 ? getColor(android.R.color.holo_green_dark) : getColor(android.R.color.holo_red_dark));
                  int progress = (int)((pl / 2000) * 100);
                  progressBar.setProgress(Math.min(100, Math.max(0, progress + 50)));
              }

              private void loadActiveTrades() {
                  activeTradesContainer.removeAllViews();
                  String activeTrades = prefs.getString("active_trades", "");
                  if (activeTrades.isEmpty()) {
                      TextView empty = new TextView(this);
                      empty.setText("No active trades");
                      empty.setPadding(16, 16, 16, 16);
                      empty.setGravity(View.TEXT_ALIGNMENT_CENTER);
                      activeTradesContainer.addView(empty);
                  } else {
                      TextView tv = new TextView(this);
                      tv.setText(activeTrades);
                      tv.setPadding(16, 16, 16, 16);
                      tv.setTypeface(null, android.graphics.Typeface.MONOSPACE);
                      tv.setTextSize(11);
                      activeTradesContainer.addView(tv);
                  }
              }

              private void loadTradeHistory() {
                  historyContainer.removeAllViews();
                  String history = prefs.getString("trade_history", "");
                  if (history.isEmpty()) {
                      TextView empty = new TextView(this);
                      empty.setText("No trade history yet");
                      empty.setPadding(16, 16, 16, 16);
                      historyContainer.addView(empty);
                  } else {
                      String[] lines = history.split("\n");
                      for (String line : lines) {
                          TextView tv = new TextView(this);
                          tv.setText(line);
                          tv.setPadding(16, 8, 16, 8);
                          tv.setTextSize(11);
                          tv.setTypeface(null, android.graphics.Typeface.MONOSPACE);
                          if (line.contains("WIN")) {
                              tv.setTextColor(getColor(android.R.color.holo_green_dark));
                          } else if (line.contains("LOSS")) {
                              tv.setTextColor(getColor(android.R.color.holo_red_dark));
                          }
                          historyContainer.addView(tv);
                      }
                  }
              }

              private void loadWatchlist() {
                  watchlistContainer.removeAllViews();
                  for (String pair : forexPairs) {
                      TextView tv = new TextView(this);
                      tv.setText("🔍 " + pair + " - monitoring");
                      tv.setPadding(16, 10, 16, 10);
                      tv.setTextColor(getColor(android.R.color.black));
                      watchlistContainer.addView(tv);
                  }
              }

              private void startInternetMonitor() {
                  new Thread(() -> {
                      while (true) {
                          try { Thread.sleep(1000); } catch (InterruptedException e) { break; }
                          boolean connected = isInternetAvailable();
                          runOnUiThread(() -> {
                              if (connected) {
                                  internetStatus.setText("🌐 Internet: Connected ✅");
                                  internetStatus.setTextColor(getColor(android.R.color.holo_green_dark));
                                  alarmBanner.setVisibility(View.GONE);
                              } else {
                                  internetStatus.setText("⚠️ Internet: DISCONNECTED ❌");
                                  internetStatus.setTextColor(getColor(android.R.color.holo_red_dark));
                                  alarmBanner.setVisibility(View.VISIBLE);
                                  Vibrator v = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE);
                                  if (v != null) v.vibrate(VibrationEffect.createOneShot(500, VibrationEffect.DEFAULT_AMPLITUDE));
                                  new Handler(Looper.getMainLooper()).postDelayed(() -> alarmBanner.setVisibility(View.GONE), 4000);
                              }
                          });
                      }
                  }).start();
              }

              private boolean isInternetAvailable() {
                  try {
                      java.net.InetAddress.getByName("google.com").isReachable(3000);
                      return true;
                  } catch (Exception e) {
                      return false;
                  }
              }
          }
