name: Deriv Token Tester for Mobile

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create Token Tester App
        run: |
          mkdir -p app/src/main/java/com/deriv/tester
          
          cat > app/src/main/java/com/deriv/tester/MainActivity.java << 'EOF'
          package com.deriv.tester;
          
          import android.os.Bundle;
          import android.os.Handler;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.LinearLayout;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;
          import org.json.JSONObject;
          import okhttp3.*;
          import java.util.concurrent.TimeUnit;
          
          public class MainActivity extends AppCompatActivity {
              private TextView statusText, resultText, logText;
              private EditText tokenInput;
              private Button testButton;
              private LinearLayout mainLayout;
              private OkHttpClient client;
              private WebSocket webSocket;
              private String APP_ID = "32ZFw49Z0RGY4UQGjIrhh";
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  createUI();
              }
              
              private void createUI() {
                  mainLayout = new LinearLayout(this);
                  mainLayout.setOrientation(LinearLayout.VERTICAL);
                  mainLayout.setPadding(30, 50, 30, 30);
                  mainLayout.setBackgroundColor(Color.parseColor("#0a0a1a"));
                  
                  TextView title = new TextView(this);
                  title.setText("🔑 Deriv Token Tester");
                  title.setTextSize(24);
                  title.setTextColor(Color.parseColor("#00ff88"));
                  title.setGravity(Gravity.CENTER);
                  title.setTypeface(null, Typeface.BOLD);
                  title.setPadding(0, 0, 0, 30);
                  mainLayout.addView(title);
                  
                  // Instructions
                  TextView instructions = new TextView(this);
                  instructions.setText("1. Get token from Deriv app\n2. Tap Settings → API Token\n3. Create token with 'Read' access\n4. Paste below:");
                  instructions.setTextSize(12);
                  instructions.setTextColor(Color.parseColor("#aaaaaa"));
                  instructions.setPadding(0, 0, 0, 20);
                  mainLayout.addView(instructions);
                  
                  // Token input
                  tokenInput = new EditText(this);
                  tokenInput.setHint("Paste your API token here");
                  tokenInput.setBackgroundColor(Color.parseColor("#16213e"));
                  tokenInput.setTextColor(Color.WHITE);
                  tokenInput.setPadding(20, 15, 20, 15);
                  mainLayout.addView(tokenInput);
                  
                  // Test button
                  testButton = new Button(this);
                  testButton.setText("🔌 TEST CONNECTION");
                  testButton.setBackgroundColor(Color.parseColor("#00ff88"));
                  testButton.setTextColor(Color.BLACK);
                  testButton.setTypeface(null, Typeface.BOLD);
                  testButton.setPadding(0, 20, 0, 20);
                  testButton.setOnClickListener(v -> testConnection());
                  mainLayout.addView(testButton);
                  
                  // Status
                  statusText = new TextView(this);
                  statusText.setText("⚡ Ready to test");
                  statusText.setTextColor(Color.parseColor("#ffd700"));
                  statusText.setPadding(0, 20, 0, 10);
                  mainLayout.addView(statusText);
                  
                  // Result
                  resultText = new TextView(this);
                  resultText.setText("");
                  resultText.setTextSize(18);
                  resultText.setTypeface(null, Typeface.BOLD);
                  resultText.setGravity(Gravity.CENTER);
                  resultText.setPadding(0, 10, 0, 20);
                  mainLayout.addView(resultText);
                  
                  // Log
                  TextView logTitle = new TextView(this);
                  logTitle.setText("📝 Live Log:");
                  logTitle.setTextColor(Color.WHITE);
                  logTitle.setTypeface(null, Typeface.BOLD);
                  logTitle.setPadding(0, 20, 0, 10);
                  mainLayout.addView(logTitle);
                  
                  logText = new TextView(this);
                  logText.setText("Waiting for test...\n");
                  logText.setTextSize(11);
                  logText.setTextColor(Color.parseColor("#cccccc"));
                  logText.setBackgroundColor(Color.parseColor("#16213e"));
                  logText.setPadding(20, 15, 20, 15);
                  logText.setMaxLines(10);
                  mainLayout.addView(logText);
                  
                  setContentView(mainLayout);
              }
              
              private void testConnection() {
                  String token = tokenInput.getText().toString().trim();
                  if (token.isEmpty()) {
                      addLog("❌ Please paste your API token first");
                      return;
                  }
                  
                  addLog("🔌 Connecting to Deriv...");
                  statusText.setText("🔄 CONNECTING...");
                  testButton.setEnabled(false);
                  
                  client = new OkHttpClient.Builder()
                      .connectTimeout(15, TimeUnit.SECONDS)
                      .build();
                  
                  Request request = new Request.Builder()
                      .url("wss://ws.derivws.com/websockets/v3?app_id=" + APP_ID)
                      .build();
                  
                  webSocket = client.newWebSocket(request, new WebSocketListener() {
                      @Override
                      public void onOpen(WebSocket webSocket, okhttp3.Response response) {
                          runOnUiThread(() -> addLog("✅ WebSocket connected, authorizing..."));
                          
                          JSONObject authMsg = new JSONObject();
                          try {
                              authMsg.put("authorize", token);
                              webSocket.send(authMsg.toString());
                          } catch (Exception e) {
                              runOnUiThread(() -> addLog("❌ Error: " + e.getMessage()));
                          }
                      }
                      
                      @Override
                      public void onMessage(WebSocket webSocket, String text) {
                          runOnUiThread(() -> {
                              try {
                                  JSONObject json = new JSONObject(text);
                                  
                                  if (json.has("authorize") && json.getInt("authorize") == 1) {
                                      double balance = json.getDouble("balance");
                                      String currency = json.getString("currency");
                                      
                                      resultText.setText("✅ SUCCESS!\nBalance: " + currency + " " + String.format("%,.2f", balance));
                                      resultText.setTextColor(Color.parseColor("#00ff88"));
                                      statusText.setText("✅ CONNECTED");
                                      statusText.setTextColor(Color.parseColor("#00ff88"));
                                      addLog("✅ Authentication successful!");
                                      addLog("💰 Balance: " + currency + " " + balance);
                                      addLog("🎉 Your token is VALID and working!");
                                  } else if (json.has("error")) {
                                      String errorMsg = json.getJSONObject("error").getString("message");
                                      resultText.setText("❌ FAILED\n" + errorMsg);
                                      resultText.setTextColor(Color.parseColor("#ff4444"));
                                      statusText.setText("❌ AUTH FAILED");
                                      statusText.setTextColor(Color.parseColor("#ff4444"));
                                      addLog("❌ Error: " + errorMsg);
                                      addLog("💡 Tip: Generate a new token in Deriv app");
                                  }
                                  
                                  webSocket.close(1000, "Test complete");
                                  testButton.setEnabled(true);
                                  
                              } catch (Exception e) {
                                  addLog("❌ Parse error: " + e.getMessage());
                                  testButton.setEnabled(true);
                              }
                          });
                      }
                      
                      @Override
                      public void onFailure(WebSocket webSocket, Throwable t, okhttp3.Response response) {
                          runOnUiThread(() -> {
                              addLog("❌ Connection failed: " + t.getMessage());
                              statusText.setText("❌ CONNECTION FAILED");
                              statusText.setTextColor(Color.parseColor("#ff4444"));
                              resultText.setText("❌ NETWORK ERROR\nCheck your internet");
                              testButton.setEnabled(true);
                          });
                      }
                  });
              }
              
              private void addLog(String message) {
                  runOnUiThread(() -> {
                      String timestamp = new SimpleDateFormat("HH:mm:ss", Locale.US).format(new Date());
                      String currentLog = logText.getText().toString();
                      String newLog = "[" + timestamp + "] " + message + "\n" + currentLog;
                      String[] lines = newLog.split("\n");
                      if (lines.length > 15) {
                          StringBuilder sb = new StringBuilder();
                          for (int i = 0; i < 15; i++) sb.append(lines[i]).append("\n");
                          newLog = sb.toString();
                      }
                      logText.setText(newLog);
                  });
              }
          }
          EOF
          
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/stat_sys_download"
                  android:label="Deriv Token Tester"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.deriv.tester'
              compileSdk 34
              defaultConfig {
                  applicationId "com.deriv.tester"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'org.json:json:20230227'
          }
          EOF
          
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google() mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          EOF
          
          cat > settings.gradle << 'EOF'
          rootProject.name = "TokenTester"
          include ':app'
          EOF
          
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0 --distribution-type all
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deriv-token-tester
          path: app/build/outputs/apk/debug/*.apk
