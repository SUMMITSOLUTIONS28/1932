          <!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Deriv CHOCH Bot Pro</title><style>
          body{margin:0;font-family:Arial;background:#f9fafb}.container{max-width:1200px;margin:auto;padding:20px}.header{background:#fff;padding:20px;border-radius:14px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-top:20px}.card{background:#fff;padding:15px;border-radius:14px}.table{background:#fff;padding:15px;border-radius:14px;margin-top:20px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #eee;text-align:center}.profit{color:green}.loss{color:red}.status{width:10px;height:10px;border-radius:50%;display:inline-block}.green{background:green}.red{background:red}input,button{padding:10px;border-radius:8px;border:1px solid #ddd}.connect{background:#16a34a;color:#fff;font-weight:bold}.disconnect{background:#dc2626;color:#fff;font-weight:bold}
          </style></head><body><div class="container"><div class="header"><input id="token" placeholder="Deriv API Token" style="width:300px"><button class="connect" onclick="connect()">Connect & Start CHOCH Bot</button><button class="disconnect" onclick="disconnect()">Stop</button><div style="margin-top:10px; display:grid; grid-template-columns:repeat(3,1fr); gap:10px;"><div>Balance: <b id="bal">-</b></div><div>Profit: <b id="p" class="profit">0</b></div><div>Loss: <b id="l" class="loss">0</b></div><div>Status: <span id="st" class="status red"></span> <span id="statusText">Disconnected</span></div><div>Open Trades: <b id="openTrades">0</b></div><div>Consecutive Losses: <b id="consecutiveLosses">0</b></div></div><small id="log"></small></div><div class="grid"><div class="card"><h3>Strategy</h3><p>Liquidity Sweep + CHOCH<br>Multi-timeframe (45,30,15,5,2,1m)</p></div><div class="card"><h3>Risk:Reward</h3><p>Dynamic: 1:3 to 1:4</p></div><div class="card"><h3>Max Trades</h3><p>3 concurrent<br>Stop after 3 losses</p></div><div class="card"><h3>Pairs</h3><p>22 Forex pairs</p></div></div><div class="table"><h3>Trade Log</h3><table id="t"><tr><th>Pair</th><th>Action</th><th>R:R</th></tr></table></div></div><script>
          function connect(){let token=document.getElementById('token').value;if(token){AndroidBot.connect(token);log('Connecting...');}}
          function disconnect(){AndroidBot.disconnect();updateConnectionStatus(false);log('Bot stopped');}
          function updateBotStatus(balance,profit,loss,status,openTrades,consecutiveLosses){
              document.getElementById('bal').innerText=balance.toFixed(2);
              document.getElementById('p').innerText=profit.toFixed(2);
              document.getElementById('l').innerText=loss.toFixed(2);
              document.getElementById('openTrades').innerText=openTrades;
              document.getElementById('consecutiveLosses').innerText=consecutiveLosses;
              let st=document.getElementById('st');let stText=document.getElementById('statusText');
              if(status==='Connected'){st.className='status green';stText.innerText='Connected';}
              else{st.className='status red';stText.innerText='Disconnected';}
          }
          function updateConnectionStatus(connected){let st=document.getElementById('st');let stText=document.getElementById('statusText');
              if(connected){st.className='status green';stText.innerText='Connected';log('CONNECTED ✔');}
              else{st.className='status red';stText.innerText='Disconnected';log('DISCONNECTED - Retrying...');}
          }
          function log(msg){document.getElementById('log').innerText=msg;}
          window.addEventListener('message',function(e){if(e.data.type==='newTrade'){let row=document.createElement('tr');row.innerHTML='<td>'+e.data.pair+'</td><td>'+e.data.action+'</td><td>'+e.data.rr+'</td>';document.getElementById('t').prepend(row);if(document.getElementById('t').rows.length>50)document.getElementById('t').deleteRow(50);}});
          setInterval(()=>{if(typeof AndroidBot!=='undefined')AndroidBot.getConnectionStatus();},3000);
          </script></body></html>
          EOF

          # ---------- AndroidManifest.xml ----------
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application android:allowBackup="true" android:icon="@android:drawable/ic_menu_upload" android:label="Deriv CHOCH Bot" android:usesCleartextTraffic="true" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
                  <service android:name=".DerivBotService" android:exported="false" />
              </application>
          </manifest>
          EOF

          # ---------- build.gradle (root) ----------
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              }
          }
          EOF

          # ---------- settings.gradle ----------
          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "DerivCHOCHBot"
          include ':app'
          EOF

          # ---------- app/build.gradle ----------
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
          }

          android {
              namespace 'com.deriv.choch'
              compileSdk 34

              defaultConfig {
                  applicationId "com.deriv.choch"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
          }
          EOF

          # ---------- gradle.properties ----------
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.suppressUnsupportedCompileSdk=34
          EOF

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0 --distribution-type all
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Deriv-CHOCH-Bot-Fixed-Crash
          path: app/build/outputs/apk/debug/*.apk
