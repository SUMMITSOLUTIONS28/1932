                  <TextView android:text="🐉 SIMIYUFX" android:textSize="24sp" android:textColor="#ff9800" android:layout_weight="1"/>
                  <EditText android:id="@+id/tokenInput" android:hint="API Token" android:layout_width="200dp" android:layout_height="wrap_content" android:inputType="textPassword"/>
