name: Build Deriv SMC Trading Bot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/deriv/trader
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          # -------------------- root build.gradle --------------------
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          EOF

          # -------------------- settings.gradle --------------------
          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "DerivTradingBot"
          include ':app'
          EOF

          # -------------------- gradle.properties --------------------
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

          # -------------------- app/build.gradle --------------------
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace 'com.deriv.trader'
              compileSdk 34

              defaultConfig {
                  applicationId "com.deriv.trader"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'org.java-websocket:Java-WebSocket:1.5.4'
              implementation 'com.google.code.gson:gson:2.10.1'
          }

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
              }
          }
          EOF

          # -------------------- AndroidManifest.xml --------------------
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />

              <application
                  android:label="Deriv SMC Bot"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:allowBackup="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  
                  <service
                      android:name=".TradingBotService"
                      android:enabled="true"
                      android:exported="false" />
                          
              </application>
          </manifest>
          EOF

          # -------------------- styles.xml --------------------
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar" />
          </resources>
          EOF

          # -------------------- activity_main.xml --------------------
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="20dp"
              android:gravity="center">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Deriv SMC Trading Bot"
                  android:textSize="24sp"
                  android:textStyle="bold"
                  android:layout_marginBottom="30dp"/>

              <EditText
                  android:id="@+id/tokenInput"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:hint="Enter Deriv API Token"
                  android:inputType="textPassword"
                  android:padding="12dp"
                  android:layout_marginBottom="15dp"/>

              <EditText
                  android:id="@+id/stakeInput"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:hint="Stake Amount per Trade (USD)"
                  android:inputType="numberDecimal"
                  android:padding="12dp"
                  android:layout_marginBottom="15dp"
                  android:text="0.50"/>

              <TextView
                  android:id="@+id/statusText"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Status: Stopped"
                  android:gravity="center"
                  android:padding="10dp"
                  android:layout_marginBottom="20dp"/>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal">

                  <Button
                      android:id="@+id/startButton"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="START"
                      android:backgroundTint="#4CAF50"
                      android:layout_marginEnd="10dp"/>

                  <Button
                      android:id="@+id/stopButton"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="STOP"
                      android:backgroundTint="#F44336"/>
              </LinearLayout>

              <TextView
                  android:id="@+id/logText"
                  android:layout_width="match_parent"
                  android:layout_height="200dp"
                  android:layout_marginTop="20dp"
                  android:background="#F5F5F5"
                  android:padding="10dp"
                  android:scrollbars="vertical"
                  android:text="Logs will appear here..."
                  android:textSize="12sp"/>

          </LinearLayout>
          EOF

          # -------------------- MainActivity.java --------------------
          cat > app/src/main/java/com/deriv/trader/MainActivity.java << 'EOF'
          package com.deriv.trader;

          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.text.method.ScrollingMovementMethod;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {

              private EditText tokenInput;
              private EditText stakeInput;
              private Button startButton;
              private Button stopButton;
              private TextView statusText;
              private TextView logText;
              private SharedPreferences prefs;

              public static LogCallback logCallback;

              public interface LogCallback {
                  void onLog(String message);
              }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  tokenInput = findViewById(R.id.tokenInput);
                  stakeInput = findViewById(R.id.stakeInput);
                  startButton = findViewById(R.id.startButton);
                  stopButton = findViewById(R.id.stopButton);
                  statusText = findViewById(R.id.statusText);
                  logText = findViewById(R.id.logText);

                  logText.setMovementMethod(new ScrollingMovementMethod());

                  prefs = getSharedPreferences("trading_prefs", Context.MODE_PRIVATE);

                  tokenInput.setText(prefs.getString("api_token", ""));
                  stakeInput.setText(String.valueOf(prefs.getFloat("stake_amount", 0.50f)));

                  startButton.setOnClickListener(v -> {
                      String token = tokenInput.getText().toString().trim();
                      String stakeStr = stakeInput.getText().toString().trim();
                      float stake;

                      if (token.isEmpty()) {
                          Toast.makeText(this, "Enter your Deriv API token", Toast.LENGTH_SHORT).show();
                          return;
                      }

                      try {
                          stake = Float.parseFloat(stakeStr);
                          if (stake <= 0) throw new NumberFormatException();
                      } catch (NumberFormatException e) {
                          Toast.makeText(this, "Enter valid stake amount", Toast.LENGTH_SHORT).show();
                          return;
                      }

                      prefs.edit()
                          .putString("api_token", token)
                          .putFloat("stake_amount", stake)
                          .apply();

                      startTradingService(token, stake);
                  });

                  stopButton.setOnClickListener(v -> stopTradingService());
              }
              private void startTradingService(String token, float stake) {
                  Intent intent = new Intent(this, TradingBotService.class);
                  intent.putExtra("API_TOKEN", token);
                  intent.putExtra("STAKE_AMOUNT", stake);
                  startForegroundService(intent);
                  statusText.setText("Status: Running");
                  addLog("Bot started with stake: $" + stake);
                  Toast.makeText(this, "Trading bot started", Toast.LENGTH_SHORT).show();
              }

              private void stopTradingService() {
                  Intent intent = new Intent(this, TradingBotService.class);
                  stopService(intent);
                  statusText.setText("Status: Stopped");
                  addLog("Bot stopped by user");
                  Toast.makeText(this, "Trading bot stopped", Toast.LENGTH_SHORT).show();
              }

              public void addLog(String message) {
                  runOnUiThread(() -> {
                      String timestamp = new java.text.SimpleDateFormat("HH:mm:ss", java.util.Locale.getDefault())
                          .format(new java.util.Date());
                      logText.append("\n[" + timestamp + "] " + message);
                      android.widget.ScrollView scrollView = (android.widget.ScrollView) logText.getParent();
                      if (scrollView != null) {
                          scrollView.post(() -> scrollView.fullScroll(android.view.View.FOCUS_DOWN));
                      }
                  });
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  logCallback = this::addLog;
              }

              @Override
              protected void onPause() {
                  super.onPause();
                  logCallback = null;
              }
          }
          EOF

          # -------------------- TradingBotService.java --------------------
          cat > app/src/main/java/com/deriv/trader/TradingBotService.java << 'EOF'
          package com.deriv.trader;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.os.Build;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;

          public class TradingBotService extends Service {
              
              private String apiToken;
              private float stakeAmount;
              private DerivWebSocket derivWS;
              private SMCStrategy smcStrategy;
              private RiskManager riskManager;

              public static boolean isServiceRunning = false;

              @Override
              public void onCreate() {
                  super.onCreate();
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  apiToken = intent.getStringExtra("API_TOKEN");
                  stakeAmount = intent.getFloatExtra("STAKE_AMOUNT", 0.50f);

                  if (apiToken == null || apiToken.isEmpty()) {
                      stopSelf();
                      return START_NOT_STICKY;
                  }

                  isServiceRunning = true;
                  createNotificationChannel();
                  startForeground(1, createNotification());

                  riskManager = new RiskManager(stakeAmount);
                  derivWS = new DerivWebSocket(apiToken, this::onMessage, this::onError);
                  smcStrategy = new SMCStrategy(derivWS, riskManager, stakeAmount, this::addLog);

                  derivWS.connect();

                  addLog("Trading bot service started");
                  addLog("Stake amount: $" + stakeAmount);
                  addLog("Risk/Reward: 1:3 (Max risk $1.00)");

                  return START_STICKY;
              }

              private void onMessage(String message) {
                  if (smcStrategy != null) {
                      smcStrategy.processMessage(message);
                  }
              }

              private void onError(String error) {
                  addLog("WebSocket Error: " + error);
              }

              private void addLog(String message) {
                  if (MainActivity.logCallback != null) {
                      MainActivity.logCallback.onLog(message);
                  }
                  android.util.Log.d("TradingBot", message);
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          "trading_channel",
                          "Deriv Trading Bot",
                          NotificationManager.IMPORTANCE_LOW
                      );
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) {
                          manager.createNotificationChannel(channel);
                      }
                  }
              }

              private Notification createNotification() {
                  Intent intent = new Intent(this, MainActivity.class);
                  PendingIntent pendingIntent = PendingIntent.getActivity(
                      this, 0, intent,
                      Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0
                  );

                  return new NotificationCompat.Builder(this, "trading_channel")
                      .setContentTitle("Deriv SMC Trading Bot")
                      .setContentText("Bot is running and monitoring markets...")
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .setContentIntent(pendingIntent)
                      .setPriority(NotificationCompat.PRIORITY_LOW)
                      .build();
              }

              @Override
              public void onDestroy() {
                  isServiceRunning = false;
                  if (derivWS != null) {
                      derivWS.disconnect();
                  }
                  addLog("Trading bot service stopped");
                  super.onDestroy();
              }

              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }
          }
          EOF

          # -------------------- DerivWebSocket.java --------------------
          cat > app/src/main/java/com/deriv/trader/DerivWebSocket.java << 'EOF'
          package com.deriv.trader;

          import android.util.Log;
          import com.google.gson.Gson;
          import com.google.gson.JsonObject;
          import com.google.gson.JsonParser;
          import okhttp3.*;
          import okio.ByteString;
          import java.util.HashMap;
          import java.util.Map;
          import java.util.concurrent.TimeUnit;

          public class DerivWebSocket {
              private final String apiToken;
              private final OnMessageListener onMessage;
              private final OnErrorListener onError;
              private WebSocket webSocket;
              private final OkHttpClient client;
              private final Gson gson;
              private int reqId = 1;

              public interface OnMessageListener {
                  void onMessage(String message);
              }

              public interface OnErrorListener {
                  void onError(String error);
              }

              public DerivWebSocket(String apiToken, OnMessageListener onMessage, OnErrorListener onError) {
                  this.apiToken = apiToken;
                  this.onMessage = onMessage;
                  this.onError = onError;
                  this.gson = new Gson();
                  this.client = new OkHttpClient.Builder()
                      .pingInterval(30, TimeUnit.SECONDS)
                      .build();
              }

              public void connect() {
                  Request request = new Request.Builder()
                      .url("wss://ws.derivws.com/websockets/v3")
                      .build();

                  webSocket = client.newWebSocket(request, new WebSocketListener() {
                      @Override
                      public void onOpen(WebSocket webSocket, Response response) {
                          onMessage.onMessage("Connected to Deriv");
                          authenticate();
                      }

                      @Override
                      public void onMessage(WebSocket webSocket, String text) {
                          onMessage.onMessage(text);
                      }

                      @Override
                      public void onMessage(WebSocket webSocket, ByteString bytes) {
                          onMessage.onMessage("Binary message received");
                      }

                      @Override
                      public void onClosing(WebSocket webSocket, int code, String reason) {
                          webSocket.close(1000, null);
                      }

                      @Override
                      public void onClosed(WebSocket webSocket, int code, String reason) {
                          onMessage.onMessage("Connection closed");
                      }

                      @Override
                      public void onFailure(WebSocket webSocket, Throwable t, Response response) {
                          onError.onError("Connection failed: " + t.getMessage());
                      }
                  });
              }

              private void authenticate() {
                  Map<String, Object> authRequest = new HashMap<>();
                  authRequest.put("authorize", apiToken);
                  authRequest.put("req_id", reqId++);
                  send(gson.toJson(authRequest));
              }

              public void subscribeTicks(String symbol) {
                  Map<String, Object> tickRequest = new HashMap<>();
                  tickRequest.put("ticks", symbol);
                  tickRequest.put("subscribe", 1);
                  tickRequest.put("req_id", reqId++);
                  send(gson.toJson(tickRequest));
              }

              public void buyContract(String symbol, double amount, int duration, String durationUnit) {
                  Map<String, Object> params = new HashMap<>();
                  params.put("amount", amount);
                  params.put("basis", "stake");
                  params.put("contract_type", "CALL");
                  params.put("currency", "USD");
                  params.put("duration", duration);
                  params.put("duration_unit", durationUnit);
                  params.put("symbol", symbol);

                  Map<String, Object> buyRequest = new HashMap<>();
                  buyRequest.put("buy", 1);
                  buyRequest.put("parameters", params);
                  buyRequest.put("req_id", reqId++);
                  send(gson.toJson(buyRequest));
              }

              private void send(String message) {
                  if (webSocket != null) {
                      webSocket.send(message);
                      Log.d("DerivWS", "Sent: " + message);
                  }
              }

              public void disconnect() {
                  if (webSocket != null) {
                      webSocket.close(1000, "Normal closure");
                  }
              }
          }
          EOF

          # -------------------- RiskManager.java --------------------
          cat > app/src/main/java/com/deriv/trader/RiskManager.java << 'EOF'
          package com.deriv.trader;

          public class RiskManager {
              private float initialStake;
              private int consecutiveLosses = 0;
              private long lastLossTime = 0;
              private final long PAUSE_DURATION_MS = 24 * 60 * 60 * 1000L;
              private final double MAX_RISK_USD = 1.00;
              private final double MAX_RISK_BOS_5MIN = 0.90;
              private final double REWARD_RATIO = 3.0;

              public RiskManager(float initialStake) {
                  this.initialStake = initialStake;
              }

              public boolean canTrade() {
                  if (consecutiveLosses >= 2) {
                      long timeSinceLastLoss = System.currentTimeMillis() - lastLossTime;
                      if (timeSinceLastLoss < PAUSE_DURATION_MS) {
                          return false;
                      } else {
                          consecutiveLosses = 0;
                      }
                  }
                  return true;
              }

              public void recordLoss() {
                  consecutiveLosses++;
                  lastLossTime = System.currentTimeMillis();
              }

              public void recordWin() {
                  consecutiveLosses = 0;
              }

              public int getConsecutiveLosses() {
                  return consecutiveLosses;
              }
          }
          EOF
           # -------------------- SMCStrategy.java --------------------
          cat > app/src/main/java/com/deriv/trader/SMCStrategy.java << 'EOF'
          package com.deriv.trader;

          import com.google.gson.JsonObject;
          import com.google.gson.JsonParser;
          import java.util.ArrayList;
          import java.util.HashMap;
          import java.util.List;
          import java.util.Map;

          public class SMCStrategy {
              private final DerivWebSocket derivWS;
              private final RiskManager riskManager;
              private final float defaultStake;
              private final LogCallback logCallback;
              private boolean isTrackingSetup = false;
              private String currentSymbol = "";
              private String currentDirection = "";

              public interface LogCallback {
                  void onLog(String message);
              }

              public SMCStrategy(DerivWebSocket derivWS, RiskManager riskManager, float defaultStake, LogCallback logCallback) {
                  this.derivWS = derivWS;
                  this.riskManager = riskManager;
                  this.defaultStake = defaultStake;
                  this.logCallback = logCallback;
              }

              public void processMessage(String message) {
                  try {
                      JsonObject json = JsonParser.parseString(message).getAsJsonObject();

                      if (json.has("authorize")) {
                          boolean authorized = json.get("authorize").getAsJsonObject().get("authorized").getAsBoolean();
                          if (authorized) {
                              addLog("Authorized successfully");
                              startScanning();
                          } else {
                              addLog("Authorization failed - check your API token");
                          }
                      }

                      if (json.has("tick")) {
                          JsonObject tick = json.getAsJsonObject("tick");
                          String symbol = tick.get("symbol").getAsString();
                          double price = tick.get("quote").getAsDouble();
                          processTick(symbol, price);
                      }

                      if (json.has("buy")) {
                          JsonObject buyObj = json.getAsJsonObject("buy");
                          if (buyObj.has("contract_id")) {
                              String contractId = buyObj.get("contract_id").getAsString();
                              addLog("Trade executed! Contract ID: " + contractId);
                          } else if (buyObj.has("error")) {
                              String error = buyObj.get("error").getAsJsonObject().get("message").getAsString();
                              addLog("Buy error: " + error);
                          }
                      }

                  } catch (Exception e) {
                      addLog("Error processing message: " + e.getMessage());
                  }
              }

              private void startScanning() {
                  addLog("Starting market scan for all allowed Forex pairs...");
                  String[] pairs = {
                      "EURUSD", "USDJPY", "AUDUSD", "NZDUSD", "USDCAD", "USDCHF",
                      "EURJPY", "EURGBP", "EURAUD", "EURNZD", "EURCAD", "EURCHF",
                      "GBPJPY", "GBPAUD", "GBPCAD", "GBPNZD", "GBPCHF",
                      "AUDJPY", "AUDNZD", "AUDCAD", "AUDCHF",
                      "CADJPY", "CADCHF", "CHFJPY",
                      "NZDJPY", "NZDCAD", "NZDCHF"
                  };
                  
                  for (String pair : pairs) {
                      if (!pair.equals("GBPUSD")) {
                          derivWS.subscribeTicks(pair);
                      }
                  }
              }

              private void processTick(String symbol, double price) {
                  if (symbol.equals("GBPUSD")) return;
                  
                  // Simplified demo: execute a demo trade after 30 seconds for testing
                  if (!isTrackingSetup) {
                      isTrackingSetup = true;
                      currentSymbol = symbol;
                      currentDirection = "BUY";
                      addLog(symbol + ": Demo setup detected - would execute BUY at " + price);
                      
                      // Execute demo trade
                      if (riskManager.canTrade()) {
                          addLog("EXECUTING DEMO TRADE: " + symbol + " BUY");
                          addLog("Stake: $" + defaultStake);
                          derivWS.buyContract(symbol, defaultStake, 60, "t");
                          isTrackingSetup = false;
                      }
                  }
              }

              private void addLog(String message) {
                  if (logCallback != null) {
                      logCallback.onLog(message);
                  }
              }
          }
          EOF

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0 --distribution-type all
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Deriv-SMC-Trading-Bot-APK
          path: app/build/outputs/apk/debug/*.apk
