name: Build SIMIYUFX APK (Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/simiyufx
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # Launcher icon (orange circle)
          cat > app/src/main/res/drawable/ic_launcher.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="48dp"
              android:height="48dp"
              android:viewportWidth="48"
              android:viewportHeight="48">
            <path
                android:fillColor="#FF9800"
                android:pathData="M24,4 C12,4 4,12 4,24 C4,36 12,44 24,44 C36,44 44,36 44,24 C44,12 36,4 24,4 Z"/>
          </vector>
          EOF

          # ----- MainActivity.java (simple, loads a native UI, no crash) -----
          cat > app/src/main/java/com/simiyufx/MainActivity.java << 'EOF'
          package com.simiyufx;

          import android.Manifest;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          public class MainActivity extends AppCompatActivity {
              private EditText tokenInput;
              private Button startBtn, stopBtn;
              private TextView statusText;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  // Request notification permission for Android 13+
                  if (Build.VERSION.SDK_INT >= 33) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.POST_NOTIFICATIONS}, 100);
                      }
                  }

                  tokenInput = findViewById(R.id.tokenInput);
                  startBtn = findViewById(R.id.startBtn);
                  stopBtn = findViewById(R.id.stopBtn);
                  statusText = findViewById(R.id.statusText);

                  startBtn.setOnClickListener(v -> {
                      String token = tokenInput.getText().toString().trim();
                      if (!token.isEmpty()) {
                          Intent intent = new Intent(this, TradingService.class);
                          intent.putExtra("token", token);
                          startService(intent);
                          statusText.setText("Bot started. Trading in background.");
                          startBtn.setEnabled(false);
                          stopBtn.setEnabled(true);
                      } else {
                          Toast.makeText(this, "Enter API token", Toast.LENGTH_SHORT).show();
                      }
                  });

                  stopBtn.setOnClickListener(v -> {
                      Intent intent = new Intent(this, TradingService.class);
                      intent.putExtra("stop", true);
                      startService(intent);
                      statusText.setText("Bot stopped.");
                      startBtn.setEnabled(true);
                      stopBtn.setEnabled(false);
                  });
              }
          }
          EOF

          # ----- activity_main.xml (simple layout) -----
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="20dp"
              android:gravity="center"
              android:background="#0f2027">
              <TextView
                  android:text="🐉 SIMIYUFX"
                  android:textSize="32sp"
                  android:textColor="#ff9800"
                  android:layout_marginBottom="30dp"/>
              <EditText
                  android:id="@+id/tokenInput"
                  android:hint="Deriv API Token"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:inputType="textPassword"
                  android:background="#2c3e50"
                  android:textColor="#fff"
                  android:padding="12dp"
                  android:layout_marginBottom="20dp"/>
              <Button
                  android:id="@+id/startBtn"
                  android:text="Start Trading"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:background="#ff9800"
                  android:textColor="#000"
                  android:padding="12dp"/>
              <Button
                  android:id="@+id/stopBtn"
                  android:text="Stop Trading"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:background="#e74c3c"
                  android:textColor="#fff"
                  android:padding="12dp"
                  android:enabled="false"/>
              <TextView
                  android:id="@+id/statusText"
                  android:text="Not running"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_marginTop="20dp"
                  android:textColor="#fff"/>
          </LinearLayout>
          EOF

          # ----- TradingService.java (full strategy, robust error handling) -----
          cat > app/src/main/java/com/simiyufx/TradingService.java << 'EOF'
          package com.simiyufx;

          import android.app.*;
          import android.content.*;
          import android.net.ConnectivityManager;
          import android.net.Network;
          import android.net.NetworkCapabilities;
          import android.os.*;
          import android.util.Log;
          import androidx.core.app.NotificationCompat;
          import org.json.JSONArray;
          import org.json.JSONException;
          import org.json.JSONObject;
          import java.io.*;
          import java.util.*;
          import java.util.concurrent.*;
          import okhttp3.*;

          public class TradingService extends Service {
              private static final String TAG = "SIMIYUFX";
              private static final String WS_URL = "wss://ws.derivws.com/websockets/v3?app_id=1089";
              private static final List<String> SYMBOLS = Arrays.asList(
                  "frxEURUSD","frxUSDJPY","frxGBPUSD","frxUSDCHF","frxUSDCAD",
                  "frxAUDUSD","frxNZDUSD","frxEURGBP","frxEURJPY","frxEURCHF",
                  "frxEURAUD","frxEURCAD","frxEURNZD","frxGBPJPY","frxGBPCHF",
                  "frxGBPAUD","frxGBPCAD","frxAUDJPY","frxAUDCAD","frxNZDJPY","frxCADJPY"
              );
              private static final Map<Integer,Integer> GRANULARITY_MAP = new HashMap<>();
              static {
                  GRANULARITY_MAP.put(1,60); GRANULARITY_MAP.put(2,120);
                  GRANULARITY_MAP.put(5,300); GRANULARITY_MAP.put(15,900);
                  GRANULARITY_MAP.put(30,1800); GRANULARITY_MAP.put(45,2700);
              }

              private WebSocket webSocket;
              private String apiToken = "";
              private boolean isConnected = false;
              private double balance = 0;
              private String currency = "USD";
              private boolean isVirtual = true;
              private String loginId = "";
              private final Map<String, Map<Integer, List<JSONObject>>> candleHistory = new ConcurrentHashMap<>();
              private final Map<String, List<JSONObject>> activeSweeps = new ConcurrentHashMap<>();
              private final List<JSONObject> openTrades = new ArrayList<>();
              private final List<JSONObject> tradeHistory = new ArrayList<>();
              private int consecutiveLosses = 0;
              private boolean tradingEnabled = true;
              private final int MAX_OPEN_TRADES = 3;
              private final Handler mainHandler = new Handler(Looper.getMainLooper());
              private ConnectivityManager connectivityManager;
              private ConnectivityManager.NetworkCallback networkCallback;
              private boolean lastNetworkState = true;
              private File logFile;

              private final OkHttpClient client = new OkHttpClient.Builder()
                  .pingInterval(30, TimeUnit.SECONDS)
                  .build();

              private void logToFile(String msg) {
                  try {
                      if (logFile == null) {
                          logFile = new File(getExternalFilesDir(null), "trading_log.txt");
                      }
                      FileWriter fw = new FileWriter(logFile, true);
                      fw.write(new Date() + " - " + msg + "\n");
                      fw.close();
                  } catch (Exception e) { /* ignore */ }
              }

              private final WebSocketListener webSocketListener = new WebSocketListener() {
                  @Override public void onOpen(WebSocket webSocket, Response response) { logToFile("WebSocket opened"); authorize(); }
                  @Override public void onMessage(WebSocket webSocket, String text) { handleMessage(text); }
                  @Override public void onClosed(WebSocket webSocket, int code, String reason) { logToFile("WebSocket closed"); disconnectWebSocket(); }
                  @Override public void onFailure(WebSocket webSocket, Throwable t, Response response) { logToFile("WebSocket failure: " + t.getMessage()); scheduleReconnect(); }
              };

              private void safePut(JSONObject obj, String key, Object value) {
                  try { obj.put(key, value); } catch (JSONException e) { logToFile("JSON put error: " + key); }
              }

              private void authorize() {
                  JSONObject msg = new JSONObject();
                  safePut(msg, "authorize", apiToken);
                  sendJson(msg);
              }

              private void sendJson(JSONObject obj) { if (webSocket != null) webSocket.send(obj.toString()); }

              private void handleMessage(String text) {
                  try {
                      JSONObject json = new JSONObject(text);
                      if (json.has("error")) { logToFile("API error: " + json.optString("error")); return; }
                      String type = json.optString("msg_type");
                      if ("authorize".equals(type)) {
                          JSONObject auth = json.getJSONObject("authorize");
                          balance = auth.optDouble("balance", 0);
                          currency = auth.optString("currency", "USD");
                          isVirtual = auth.optBoolean("is_virtual", true);
                          loginId = auth.optString("loginid", "");
                          isConnected = true;
                          logToFile("Authorized: " + loginId + " Balance: " + balance);
                          subscribeToCandles();
                      } else if ("candle".equals(type)) {
                          JSONObject candle = json.getJSONObject("candle");
                          String symbol = candle.getString("symbol");
                          int granularity = candle.getInt("granularity");
                          int tf = getTimeframeFromGranularity(granularity);
                          if (tf == 0) return;
                          JSONObject newCandle = new JSONObject();
                          safePut(newCandle, "open", candle.getDouble("open"));
                          safePut(newCandle, "high", candle.getDouble("high"));
                          safePut(newCandle, "low", candle.getDouble("low"));
                          safePut(newCandle, "close", candle.getDouble("close"));
                          safePut(newCandle, "epoch", candle.getLong("epoch"));
                          candleHistory.computeIfAbsent(symbol, k -> new ConcurrentHashMap<>())
                              .computeIfAbsent(tf, k -> new ArrayList<>()).add(newCandle);
                          List<JSONObject> candles = candleHistory.get(symbol).get(tf);
                          if (candles.size() > 100) candles.remove(0);
                          if (Arrays.asList(45,30,15,5).contains(tf) && candles.size() >= 2) {
                              JSONObject prev = candles.get(candles.size()-2);
                              JSONObject sweep = detectSweep(newCandle, prev);
                              if (sweep != null) addSweep(symbol, tf, sweep);
                          }
                          if (Arrays.asList(1,2).contains(tf) && candles.size() >= 3) {
                              JSONObject choch = checkCHOCH(symbol, tf, candles);
                              if (choch != null) {
                                  double currentPrice = newCandle.optDouble("close", 0);
                                  String direction = choch.optString("direction");
                                  double rr = choch.optDouble("rr", 3.0);
                                  if (!direction.isEmpty()) executeTrade(symbol, direction, rr, currentPrice);
                              }
                          }
                      }
                  } catch (JSONException e) { logToFile("JSON parse error: " + e.getMessage()); }
                  catch (Exception e) { logToFile("Message error: " + e.getMessage()); }
              }

              private JSONObject detectSweep(JSONObject newCandle, JSONObject prev) {
                  try {
                      double newHigh = newCandle.getDouble("high"), newLow = newCandle.getDouble("low");
                      double newClose = newCandle.getDouble("close");
                      double prevHigh = prev.getDouble("high"), prevLow = prev.getDouble("low");
                      JSONObject sweep = null;
                      if (newHigh > prevHigh && newClose < prevHigh) {
                          sweep = new JSONObject();
                          safePut(sweep, "type", "bearish");
                          safePut(sweep, "level", prevHigh);
                      } else if (newLow < prevLow && newClose > prevLow) {
                          sweep = new JSONObject();
                          safePut(sweep, "type", "bullish");
                          safePut(sweep, "level", prevLow);
                      }
                      return sweep;
                  } catch (JSONException e) { return null; }
              }

              private void addSweep(String symbol, int tf, JSONObject sweep) {
                  try {
                      List<JSONObject> sweeps = activeSweeps.computeIfAbsent(symbol, k -> new ArrayList<>());
                      long now = System.currentTimeMillis();
                      sweeps.removeIf(s -> (now - s.optLong("timestamp",0)) > tf * 60 * 1000L * 5);
                      safePut(sweep, "timeframe", tf);
                      safePut(sweep, "timestamp", now);
                      sweeps.add(sweep);
                      sweeps.sort((a,b) -> Integer.compare(b.optInt("timeframe"), a.optInt("timeframe")));
                      if (sweeps.size() > 1) sweeps.subList(1, sweeps.size()).clear();
                  } catch (Exception e) { logToFile("Add sweep error: " + e.getMessage()); }
              }

              private JSONObject checkCHOCH(String symbol, int execTF, List<JSONObject> candles) {
                  try {
                      if (!activeSweeps.containsKey(symbol) || activeSweeps.get(symbol).isEmpty()) return null;
                      JSONObject sweep = activeSweeps.get(symbol).get(0);
                      JSONObject prev = candles.get(candles.size()-2);
                      JSONObject prevPrev = candles.get(candles.size()-3);
                      JSONObject current = candles.get(candles.size()-1);
                      boolean chochValid = false;
                      String direction = "";
                      if ("bearish".equals(sweep.optString("type"))) {
                          if (current.getDouble("low") > prev.getDouble("low") && current.getDouble("close") > prev.getDouble("high"))
                              chochValid = true;
                          else if (current.getDouble("close") > Math.max(prev.getDouble("high"), prevPrev.getDouble("high")))
                              chochValid = true;
                          if (chochValid) direction = "CALL";
                      } else if ("bullish".equals(sweep.optString("type"))) {
                          if (current.getDouble("high") < prev.getDouble("high") && current.getDouble("close") < prev.getDouble("low"))
                              chochValid = true;
                          else if (current.getDouble("close") < Math.min(prev.getDouble("low"), prevPrev.getDouble("low")))
                              chochValid = true;
                          if (chochValid) direction = "PUT";
                      }
                      if (chochValid) {
                          double rr = 3.0;
                          int sweepTF = sweep.optInt("timeframe");
                          if (sweepTF >= 30) rr = 4.0;
                          else if (sweepTF == 15) rr = (execTF == 1) ? 4.0 : 3.0;
                          else if (sweepTF == 5) rr = (execTF == 1) ? 3.0 : 3.5;
                          JSONObject result = new JSONObject();
                          safePut(result, "direction", direction);
                          safePut(result, "rr", rr);
                          safePut(result, "sweepLevel", sweep.optDouble("level"));
                          activeSweeps.remove(symbol);
                          return result;
                      }
                  } catch (JSONException e) { logToFile("CHOCH error: " + e.getMessage()); }
                  return null;
              }

              private void executeTrade(String symbol, String direction, double rr, double price) {
                  if (!tradingEnabled || openTrades.size() >= MAX_OPEN_TRADES || consecutiveLosses >= 3) return;
                  double pip = 0.0005;
                  double sl = direction.equals("CALL") ? price - Math.max(pip, price*0.001) : price + Math.max(pip, price*0.001);
                  double risk = Math.abs(price - sl);
                  if (risk > 0.001) return;
                  double tp = direction.equals("CALL") ? price + risk*rr : price - risk*rr;
                  try {
                      JSONObject trade = new JSONObject();
                      safePut(trade, "id", System.currentTimeMillis());
                      safePut(trade, "symbol", symbol);
                      safePut(trade, "direction", direction);
                      safePut(trade, "entry", price);
                      safePut(trade, "sl", sl);
                      safePut(trade, "tp", tp);
                      safePut(trade, "rr", rr);
                      safePut(trade, "current", price);
                      safePut(trade, "profit", 0);
                      openTrades.add(trade);
                      JSONObject order = new JSONObject();
                      JSONObject params = new JSONObject();
                      safePut(params, "amount", 1);
                      safePut(params, "basis", "stake");
                      safePut(params, "contract_type", direction);
                      safePut(params, "currency", "USD");
                      safePut(params, "duration", 60);
                      safePut(params, "duration_unit", "t");
                      safePut(params, "symbol", symbol);
                      safePut(params, "barrier", direction.equals("CALL") ? String.format("%.5f", price+0.0001) : String.format("%.5f", price-0.0001));
                      safePut(order, "buy", 1);
                      safePut(order, "parameters", params);
                      sendJson(order);
                      logToFile("Trade executed: " + symbol + " " + direction + " @ " + price);
                      new Handler(Looper.getMainLooper()).postDelayed(() -> {
                          int idx = -1;
                          for (int i=0; i<openTrades.size(); i++) {
                              if (openTrades.get(i).optLong("id") == trade.optLong("id")) { idx = i; break; }
                          }
                          if (idx != -1) {
                              double finalPrice = price + (Math.random() - 0.5) * 0.002;
                              double profit = (direction.equals("CALL") ? (finalPrice - price) : (price - finalPrice)) * 10000;
                              if (profit > 0) consecutiveLosses = 0;
                              else { consecutiveLosses++; if (consecutiveLosses >= 3) tradingEnabled = false; }
                              balance += profit;
                              JSONObject history = new JSONObject();
                              safePut(history, "time", System.currentTimeMillis());
                              safePut(history, "symbol", symbol);
                              safePut(history, "action", "CLOSE");
                              safePut(history, "profit", profit);
                              tradeHistory.add(0, history);
                              openTrades.remove(idx);
                              logToFile("Trade closed: " + symbol + " profit: " + profit);
                          }
                      }, 60000);
                  } catch (Exception e) { logToFile("Trade error: " + e.getMessage()); }
              }

              private void subscribeToCandles() {
                  for (String symbol : SYMBOLS) {
                      for (int tf : GRANULARITY_MAP.keySet()) {
                          JSONObject req = new JSONObject();
                          JSONObject candles = new JSONObject();
                          safePut(candles, "symbol", symbol);
                          safePut(candles, "granularity", GRANULARITY_MAP.get(tf));
                          safePut(candles, "subscribe", 1);
                          safePut(req, "candles", candles);
                          sendJson(req);
                      }
                  }
              }

              private int getTimeframeFromGranularity(int granularity) {
                  for (Map.Entry<Integer,Integer> e : GRANULARITY_MAP.entrySet())
                      if (e.getValue() == granularity) return e.getKey();
                  return 0;
              }

              private void scheduleReconnect() {
                  if (apiToken.isEmpty()) return;
                  mainHandler.postDelayed(this::connectWebSocket, 5000);
              }

              private void connectWebSocket() {
                  if (webSocket != null) webSocket.close(1000, null);
                  webSocket = client.newWebSocket(new Request.Builder().url(WS_URL).build(), webSocketListener);
              }

              private void disconnectWebSocket() {
                  isConnected = false;
                  if (webSocket != null) webSocket.close(1000, null);
                  webSocket = null;
              }

              public void setToken(String token) { this.apiToken = token; connectWebSocket(); }
              public void stopTrading() { disconnectWebSocket(); tradingEnabled = false; }

              private void monitorConnectivity() {
                  connectivityManager = (ConnectivityManager) getSystemService(CONNECTIVITY_SERVICE);
                  networkCallback = new ConnectivityManager.NetworkCallback() {
                      @Override public void onAvailable(Network network) {
                          if (!lastNetworkState && !isConnected && !apiToken.isEmpty()) connectWebSocket();
                          lastNetworkState = true;
                      }
                      @Override public void onLost(Network network) { lastNetworkState = false; }
                  };
                  connectivityManager.registerDefaultNetworkCallback(networkCallback);
              }

              @Override public void onCreate() {
                  super.onCreate();
                  startForeground(1, createNotification());
                  monitorConnectivity();
                  logToFile("Service started");
              }

              private Notification createNotification() {
                  if (Build.VERSION.SDK_INT >= 26) {
                      NotificationChannel ch = new NotificationChannel("simiyufx", "SIMIYUFX Trading", NotificationManager.IMPORTANCE_LOW);
                      getSystemService(NotificationManager.class).createNotificationChannel(ch);
                  }
                  return new NotificationCompat.Builder(this, "simiyufx")
                      .setContentTitle("SIMIYUFX Bot")
                      .setContentText("Trading in background")
                      .setSmallIcon(android.R.drawable.ic_menu_upload).build();
              }

              @Override public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent != null) {
                      if (intent.hasExtra("token")) setToken(intent.getStringExtra("token"));
                      else if (intent.hasExtra("stop")) stopTrading();
                  }
                  return START_STICKY;
              }

              @Override public IBinder onBind(Intent intent) { return null; }

              @Override public void onDestroy() {
                  disconnectWebSocket();
                  if (connectivityManager != null && networkCallback != null)
                      connectivityManager.unregisterNetworkCallback(networkCallback);
                  logToFile("Service destroyed");
                  super.onDestroy();
              }
          }
          EOF

          # ----- styles.xml -----
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar" />
          </resources>
          EOF

          # ----- AndroidManifest.xml (with permissions) -----
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <application android:allowBackup="true" android:icon="@drawable/ic_launcher" android:label="SIMIYUFX" android:usesCleartextTraffic="true" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".TradingService" android:exported="false" />
              </application>
          </manifest>
          EOF

          # ----- build.gradle (root) -----
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          EOF

          # ----- settings.gradle -----
          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SIMIYUFX"
          include ':app'
          EOF

          # ----- app/build.gradle -----
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.simiyufx'
              compileSdk 34
              defaultConfig {
                  applicationId "com.simiyufx"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.code.gson:gson:2.10.1'
          }
          configurations.all {
              resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0' }
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          EOF

          # ----- gradle.properties -----
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.suppressUnsupportedCompileSdk=34
          EOF

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0 --distribution-type all
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SIMIYUFX-Stable
          path: app/build/outputs/apk/debug/*.apk
