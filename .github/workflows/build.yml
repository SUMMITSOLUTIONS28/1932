name: Build SIMIYUFX - Full Liquidity Sweep + CHOCH Strategy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/deriv/choch
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # ----- Simple dragon icon (compatible) -----
          cat > app/src/main/res/drawable/ic_dragon_launcher.xml << 'EOF'
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item>
                  <shape android:shape="oval">
                      <solid android:color="#FF9800" />
                  </shape>
              </item>
              <item>
                  <bitmap android:src="@drawable/ic_dragon_text" />
              </item>
          </layer-list>
          EOF
          cat > app/src/main/res/drawable/ic_dragon_text.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="48dp"
              android:height="48dp"
              android:viewportWidth="48"
              android:viewportHeight="48">
              <text
                  android:text="🐉"
                  android:x="12"
                  android:y="34"
                  android:textSize="28sp"
                  android:fillColor="#FFFFFF" />
          </vector>
          EOF

          # ----- MainActivity.kt (loads HTML from assets) -----
          cat > app/src/main/java/com/deriv/choch/MainActivity.kt << 'EOF'
          package com.deriv.choch

          import android.Manifest
          import android.content.pm.PackageManager
          import android.os.Build
          import android.os.Bundle
          import android.webkit.WebView
          import android.webkit.WebViewClient
          import android.webkit.WebChromeClient
          import android.widget.LinearLayout
          import android.widget.TextView
          import android.view.ViewGroup
          import android.view.View
          import android.graphics.Color
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import androidx.core.content.ContextCompat

          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              private lateinit var errorView: TextView

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  
                  val root = LinearLayout(this).apply {
                      layoutParams = ViewGroup.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT)
                      orientation = LinearLayout.VERTICAL
                  }
                  
                  errorView = TextView(this).apply {
                      layoutParams = LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT)
                      text = "Loading SIMIYUFX Strategy Bot..."
                      setTextColor(Color.RED)
                      setPadding(50, 50, 50, 50)
                      visibility = View.VISIBLE
                  }
                  
                  webView = WebView(this).apply {
                      layoutParams = LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT, 1f)
                      settings.apply {
                          javaScriptEnabled = true
                          domStorageEnabled = true
                          allowFileAccess = true
                      }
                      webViewClient = object : WebViewClient() {
                          override fun onPageFinished(view: WebView?, url: String?) {
                              errorView.visibility = View.GONE
                              webView.visibility = View.VISIBLE
                          }
                          override fun onReceivedError(view: WebView?, errorCode: Int, description: String?, failingUrl: String?) {
                              errorView.text = "WebView error: $description"
                              errorView.visibility = View.VISIBLE
                          }
                      }
                      webChromeClient = WebChromeClient()
                      visibility = View.GONE
                  }
                  
                  root.addView(errorView)
                  root.addView(webView)
                  setContentView(root)

                  if (Build.VERSION.SDK_INT >= 33) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, arrayOf(Manifest.permission.POST_NOTIFICATIONS), 100)
                      }
                  }

                  webView.loadUrl("file:///android_asset/strategy_dashboard.html")
              }
          }
          EOF

          # ----- strategy_dashboard.html (full Liquidity Sweep + CHOCH strategy) -----
          cat > app/src/main/assets/strategy_dashboard.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
              <title>SIMIYUFX | CHOCH Strategy Bot</title>
              <style>
                  * { margin:0; padding:0; box-sizing:border-box; }
                  body {
                      font-family: 'Segoe UI', system-ui;
                      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
                      color: #eee;
                      padding: 20px;
                      min-height: 100vh;
                  }
                  .container { max-width: 1400px; margin: auto; }
                  .header {
                      display: flex;
                      justify-content: space-between;
                      align-items: center;
                      flex-wrap: wrap;
                      background: rgba(0,0,0,0.3);
                      backdrop-filter: blur(8px);
                      padding: 15px 25px;
                      border-radius: 40px;
                      margin-bottom: 25px;
                  }
                  .logo { display: flex; align-items: center; gap: 12px; font-size: 28px; font-weight: bold; }
                  .logo span { font-size: 40px; }
                  .token-area { display: flex; gap: 12px; flex-wrap: wrap; }
                  input, button {
                      padding: 10px 18px;
                      border-radius: 40px;
                      border: none;
                      font-size: 14px;
                  }
                  input { background: #2c3e50; color: white; width: 260px; }
                  button {
                      background: #ff9800;
                      color: black;
                      font-weight: bold;
                      cursor: pointer;
                  }
                  button.disconnect { background: #e74c3c; color: white; }
                  .stats-grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
                      gap: 20px;
                      margin-bottom: 30px;
                  }
                  .card {
                      background: rgba(255,255,255,0.1);
                      backdrop-filter: blur(8px);
                      border-radius: 24px;
                      padding: 18px;
                      border: 1px solid rgba(255,255,255,0.2);
                  }
                  .card-title { font-size: 13px; opacity: 0.7; letter-spacing: 1px; }
                  .card-value { font-size: 32px; font-weight: bold; color: #ff9800; }
                  .profit { color: #2ecc71; }
                  .loss { color: #e74c3c; }
                  .row2 {
                      display: grid;
                      grid-template-columns: 1fr 1fr;
                      gap: 25px;
                      margin-bottom: 30px;
                  }
                  .panel {
                      background: rgba(0,0,0,0.35);
                      backdrop-filter: blur(8px);
                      border-radius: 24px;
                      padding: 20px;
                  }
                  .panel h3 { margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
                  .status-led {
                      width: 10px; height: 10px; border-radius: 50%; display: inline-block;
                  }
                  .green { background: #2ecc71; box-shadow: 0 0 4px #2ecc71; }
                  .red { background: #e74c3c; }
                  table { width: 100%; border-collapse: collapse; font-size: 13px; }
                  th, td { padding: 8px 6px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
                  th { color: #ff9800; }
                  .trade-log { max-height: 250px; overflow-y: auto; }
                  .strategy-status { background: #2c3e50; border-radius: 20px; padding: 8px 16px; font-size: 12px; display: inline-block; }
              </style>
          </head>
          <body>
          <div class="container">
              <div class="header">
                  <div class="logo"><span>🐉</span> SIMIYUFX</div>
                  <div class="token-area">
                      <input type="text" id="apiToken" placeholder="Deriv API token">
                      <button id="connectBtn">Connect & Start Strategy</button>
                      <button id="disconnectBtn" class="disconnect" style="display:none">Stop</button>
                  </div>
              </div>

              <div class="stats-grid">
                  <div class="card"><div class="card-title">Balance</div><div class="card-value" id="balance">—</div></div>
                  <div class="card"><div class="card-title">Equity</div><div class="card-value" id="equity">—</div></div>
                  <div class="card"><div class="card-title">Total P&L</div><div class="card-value" id="pnl">0.00</div></div>
                  <div class="card"><div class="card-title">Open Trades</div><div class="card-value" id="openTrades">0</div></div>
                  <div class="card"><div class="card-title">Consecutive Losses</div><div class="card-value" id="consecutiveLosses">0</div></div>
                  <div class="card"><div class="card-title">Connection</div><div><span class="status-led red" id="statusLed"></span> <span id="statusText">Disconnected</span></div></div>
              </div>

              <div class="row2">
                  <div class="panel">
                      <h3>📊 Open Positions</h3>
                      <div style="max-height: 200px; overflow-y: auto;">
                          <table id="openTradesTable">
                              <thead><tr><th>Symbol</th><th>Type</th><th>Entry</th><th>SL</th><th>TP</th><th>Current</th><th>P/L</th></tr></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>
                  <div class="panel">
                      <h3>📜 Trade History</h3>
                      <div class="trade-log">
                          <table id="historyTable">
                              <thead><tr><th>Time</th><th>Symbol</th><th>Action</th><th>Profit</th></tr></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>
              </div>

              <div class="panel">
                  <h3>🧠 Strategy Engine <span class="strategy-status" id="strategyStatus">● INACTIVE</span></h3>
                  <div style="font-size:12px; margin-top:5px;">Liquidity Sweep + CHOCH | Multi-TF (45,30,15,5m sweeps; 1,2m CHOCH) | Dynamic R:R 1:3–1:4</div>
                  <div id="lastSignal" style="margin-top:10px; font-family:monospace;"></div>
              </div>
          </div>

          <script>
              // ---------- Configuration ----------
              const APP_ID = 1089;
              const WS_URL = `wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`;
              const SYMBOLS = [
                  "frxEURUSD","frxUSDJPY","frxGBPUSD","frxUSDCHF","frxUSDCAD",
                  "frxAUDUSD","frxNZDUSD","frxEURGBP","frxEURJPY","frxEURCHF",
                  "frxEURAUD","frxEURCAD","frxEURNZD","frxGBPJPY","frxGBPCHF",
                  "frxGBPAUD","frxGBPCAD","frxAUDJPY","frxAUDCAD","frxNZDJPY","frxCADJPY"
              ];
              const TIMEFRAMES = [45,30,15,5,2,1]; // minutes
              const GRANULARITY_MAP = {1:60,2:120,5:300,15:900,30:1800,45:2700};
              
              // Strategy state
              let ws = null;
              let isConnected = false;
              let token = "";
              let balance = 0;
              let equity = 0;
              let openTrades = [];      // each trade: {id, symbol, direction, entry, sl, tp, rr, currentPrice, profit}
              let tradeHistory = [];
              let consecutiveLosses = 0;
              let tradingEnabled = true;
              const MAX_OPEN_TRADES = 3;
              
              // Candle storage: symbol -> timeframe -> array of candles (each candle: {open, high, low, close, epoch})
              let candleHistory = new Map();
              // Active sweeps: symbol -> array of {timeframe, type, priceLevel, timestamp}
              let activeSweeps = new Map();
              
              // UI elements
              const balanceEl = document.getElementById("balance");
              const equityEl = document.getElementById("equity");
              const pnlEl = document.getElementById("pnl");
              const openTradesEl = document.getElementById("openTrades");
              const consecutiveLossesEl = document.getElementById("consecutiveLosses");
              const statusLed = document.getElementById("statusLed");
              const statusText = document.getElementById("statusText");
              const strategyStatusSpan = document.getElementById("strategyStatus");
              const lastSignalDiv = document.getElementById("lastSignal");
              
              // Helper functions
              function logStatus(msg, isError = false) {
                  statusText.innerText = msg;
                  statusLed.className = isConnected ? "status-led green" : "status-led red";
                  if (isError) statusText.innerText = "Error: " + msg;
              }
              
              function updateUI() {
                  balanceEl.innerText = balance.toFixed(2);
                  equityEl.innerText = equity.toFixed(2);
                  let totalPnl = openTrades.reduce((sum, t) => sum + (t.profit || 0), 0);
                  pnlEl.innerText = totalPnl.toFixed(2);
                  openTradesEl.innerText = openTrades.length;
                  consecutiveLossesEl.innerText = consecutiveLosses;
                  
                  // open trades table
                  const tbody = document.querySelector("#openTradesTable tbody");
                  tbody.innerHTML = "";
                  openTrades.forEach(t => {
                      const row = tbody.insertRow();
                      row.insertCell(0).innerText = t.symbol;
                      row.insertCell(1).innerText = t.direction === "CALL" ? "CALL" : "PUT";
                      row.insertCell(2).innerText = t.entry.toFixed(5);
                      row.insertCell(3).innerText = t.sl.toFixed(5);
                      row.insertCell(4).innerText = t.tp.toFixed(5);
                      row.insertCell(5).innerText = (t.currentPrice || t.entry).toFixed(5);
                      const pnlCell = row.insertCell(6);
                      pnlCell.innerText = (t.profit || 0).toFixed(2);
                      pnlCell.className = (t.profit || 0) >= 0 ? "profit" : "loss";
                  });
                  // history table
                  const histBody = document.querySelector("#historyTable tbody");
                  histBody.innerHTML = "";
                  tradeHistory.slice().reverse().forEach(h => {
                      const row = histBody.insertRow();
                      row.insertCell(0).innerText = new Date(h.time).toLocaleTimeString();
                      row.insertCell(1).innerText = h.symbol;
                      row.insertCell(2).innerText = h.action;
                      const profitCell = row.insertCell(3);
                      profitCell.innerText = h.profit.toFixed(2);
                      profitCell.className = h.profit >= 0 ? "profit" : "loss";
                  });
              }
              
              function sendRequest(obj) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }
              
              // ---------- Candle subscription ----------
              function subscribeToCandles() {
                  for (let symbol of SYMBOLS) {
                      for (let tf of TIMEFRAMES) {
                          const granularity = GRANULARITY_MAP[tf];
                          sendRequest({ candles: { symbol, granularity, subscribe: 1 } });
                      }
                  }
              }
              
              // ---------- Liquidity Sweep detection ----------
              function detectSweep(symbol, tf, newCandle, prevCandle) {
                  if (!prevCandle) return null;
                  // Bearish sweep: high > previous high, close < previous high
                  if (newCandle.high > prevCandle.high && newCandle.close < prevCandle.high) {
                      return { type: "bearish", level: prevCandle.high };
                  }
                  // Bullish sweep: low < previous low, close > previous low
                  if (newCandle.low < prevCandle.low && newCandle.close > prevCandle.low) {
                      return { type: "bullish", level: prevCandle.low };
                  }
                  return null;
              }
              
              function addSweep(symbol, tf, sweep) {
                  if (!activeSweeps.has(symbol)) activeSweeps.set(symbol, []);
                  let sweeps = activeSweeps.get(symbol);
                  // Remove sweeps older than 5 * timeframe minutes
                  const now = Date.now();
                  sweeps = sweeps.filter(s => (now - s.timestamp) < (s.timeframe * 60 * 1000 * 5));
                  sweeps.push({ timeframe: tf, type: sweep.type, priceLevel: sweep.level, timestamp: now });
                  // Keep only highest timeframe sweep
                  const highest = sweeps.reduce((max, s) => s.timeframe > max.timeframe ? s : max, sweeps[0]);
                  activeSweeps.set(symbol, sweeps.filter(s => s.timeframe === highest.timeframe));
              }
              
              // ---------- CHOCH detection on 1m/2m ----------
              function checkCHOCH(symbol, execTF, candles) {
                  if (candles.length < 3) return null;
                  const sweeps = activeSweeps.get(symbol);
                  if (!sweeps || sweeps.length === 0) return null;
                  const sweep = sweeps[0]; // highest priority
                  const prevCandle = candles[candles.length-2];
                  const prevPrev = candles[candles.length-3];
                  const current = candles[candles.length-1];
                  
                  let chochValid = false;
                  let direction = "";
                  if (sweep.type === "bearish") {
                      // Bearish sweep => look for bullish CHOCH (price breaks structure up)
                      if (current.low > prevCandle.low && current.close > prevCandle.high) chochValid = true;
                      else if (current.close > Math.max(prevCandle.high, prevPrev.high)) chochValid = true;
                      if (chochValid) direction = "CALL";
                  } else if (sweep.type === "bullish") {
                      // Bullish sweep => look for bearish CHOCH
                      if (current.high < prevCandle.high && current.close < prevCandle.low) chochValid = true;
                      else if (current.close < Math.min(prevCandle.low, prevPrev.low)) chochValid = true;
                      if (chochValid) direction = "PUT";
                  }
                  if (chochValid) {
                      // Determine RR based on sweep timeframe and execTF
                      let rr = 3.0;
                      if (sweep.timeframe >= 30) rr = 4.0;
                      else if (sweep.timeframe === 15) rr = (execTF === 1) ? 4.0 : 3.0;
                      else if (sweep.timeframe === 5) rr = (execTF === 1) ? 3.0 : 3.5;
                      return { direction, rr, sweepLevel: sweep.priceLevel, sweepTF: sweep.timeframe };
                  }
                  return null;
              }
              
              // ---------- Execute trade ----------
              async function executeTrade(symbol, direction, rr, currentPrice, sweepLevel, sweepTF) {
                  if (!tradingEnabled) return;
                  if (openTrades.length >= MAX_OPEN_TRADES) { lastSignalDiv.innerText = "❌ Max open trades reached"; return; }
                  if (consecutiveLosses >= 3) { tradingEnabled = false; strategyStatusSpan.innerText = "● STOPPED (3 losses)"; return; }
                  
                  // Stop loss: for CALL (long) SL below sweep low (bullish sweep) else below recent low; for PUT above sweep high
                  let sl;
                  const pipSize = 0.0005;
                  if (direction === "CALL") {
                      sl = currentPrice - Math.max(pipSize, currentPrice * 0.001);
                  } else {
                      sl = currentPrice + Math.max(pipSize, currentPrice * 0.001);
                  }
                  const risk = Math.abs(currentPrice - sl);
                  if (risk > 0.001) { lastSignalDiv.innerText = `⚠️ Risk $${(risk*10000).toFixed(2)} exceeds $1`; return; }
                  const tp = direction === "CALL" ? currentPrice + risk * rr : currentPrice - risk * rr;
                  
                  // Send buy order via Deriv API
                  const contractType = direction;
                  const barrier = direction === "CALL" ? (currentPrice + 0.0001).toFixed(5) : (currentPrice - 0.0001).toFixed(5);
                  sendRequest({
                      buy: 1,
                      parameters: {
                          amount: 1,
                          basis: "stake",
                          contract_type: contractType,
                          currency: "USD",
                          duration: 60,
                          duration_unit: "t",
                          symbol: symbol,
                          barrier: barrier
                      }
                  });
                  
                  // For simulation, we'll add a pending trade; in real trading we'd listen for 'buy' response.
                  // Here we simulate trade closure after 60 seconds.
                  const tradeId = Date.now();
                  const newTrade = {
                      id: tradeId,
                      symbol: symbol,
                      direction: direction,
                      entry: currentPrice,
                      sl: sl,
                      tp: tp,
                      rr: rr,
                      currentPrice: currentPrice,
                      profit: 0
                  };
                  openTrades.push(newTrade);
                  updateUI();
                  lastSignalDiv.innerText = `✅ ${direction} on ${symbol} @ ${currentPrice.toFixed(5)} | SL:${sl.toFixed(5)} TP:${tp.toFixed(5)} R:R ${rr}:1`;
                  
                  // Simulate trade outcome after 60 seconds (replace with real contract closure listener)
                  setTimeout(() => {
                      const idx = openTrades.findIndex(t => t.id === tradeId);
                      if (idx !== -1) {
                          const closed = openTrades[idx];
                          const finalPrice = currentPrice + (Math.random() - 0.5) * 0.002; // random walk
                          const profit = (closed.direction === "CALL" ? (finalPrice - closed.entry) : (closed.entry - finalPrice)) * 10000;
                          if (profit > 0) {
                              consecutiveLosses = 0;
                          } else {
                              consecutiveLosses++;
                              if (consecutiveLosses >= 3) tradingEnabled = false;
                          }
                          balance += profit;
                          equity = balance;
                          tradeHistory.push({ time: Date.now(), symbol: closed.symbol, action: "CLOSE", profit: profit });
                          openTrades.splice(idx,1);
                          updateUI();
                          lastSignalDiv.innerText += `\n🔚 Trade closed P/L: ${profit.toFixed(2)}`;
                      }
                  }, 60000);
              }
              
              // ---------- WebSocket message handler ----------
              function handleMessage(data) {
                  if (data.error) { console.error(data.error); logStatus(data.error.message, true); return; }
                  if (data.msg_type === "authorize") {
                      isConnected = true;
                      balance = data.authorize.balance;
                      equity = data.authorize.balance;
                      updateUI();
                      logStatus("Connected & Strategy Active");
                      strategyStatusSpan.innerText = "● ACTIVE";
                      subscribeToCandles();
                  }
                  else if (data.msg_type === "candle") {
                      const candle = data.candle;
                      const symbol = candle.symbol;
                      const granularity = candle.granularity;
                      const tf = Object.keys(GRANULARITY_MAP).find(key => GRANULARITY_MAP[key] === granularity);
                      if (!tf) return;
                      const newCandle = {
                          open: candle.open,
                          high: candle.high,
                          low: candle.low,
                          close: candle.close,
                          epoch: candle.epoch
                      };
                      if (!candleHistory.has(symbol)) candleHistory.set(symbol, new Map());
                      const tfMap = candleHistory.get(symbol);
                      if (!tfMap.has(tf)) tfMap.set(tf, []);
                      const candles = tfMap.get(tf);
                      candles.push(newCandle);
                      if (candles.length > 100) candles.shift();
                      
                      // Detect sweep on higher TFs (45,30,15,5)
                      const higherTFs = [45,30,15,5];
                      if (higherTFs.includes(parseInt(tf))) {
                          if (candles.length >= 2) {
                              const prev = candles[candles.length-2];
                              const sweep = detectSweep(symbol, parseInt(tf), newCandle, prev);
                              if (sweep) {
                                  addSweep(symbol, parseInt(tf), sweep);
                                  lastSignalDiv.innerText = `🔄 Sweep detected on ${symbol} ${tf}m (${sweep.type}) @ ${sweep.level.toFixed(5)}`;
                              }
                          }
                      }
                      // Check CHOCH on 1m and 2m
                      const execTFs = [1,2];
                      if (execTFs.includes(parseInt(tf))) {
                          const chochSignal = checkCHOCH(symbol, parseInt(tf), candles);
                          if (chochSignal) {
                              const currentPrice = newCandle.close;
                              executeTrade(symbol, chochSignal.direction, chochSignal.rr, currentPrice, chochSignal.sweepLevel, chochSignal.sweepTF);
                              // Clear sweep after trade to avoid duplicate
                              activeSweeps.delete(symbol);
                          }
                      }
                  }
                  else if (data.msg_type === "buy") {
                      // In real implementation, we would update the trade with contract_id and listen for profit/loss.
                      console.log("Buy response", data);
                  }
              }
              
              // ---------- WebSocket connection ----------
              function connect(tokenValue) {
                  if (ws) ws.close();
                  ws = new WebSocket(WS_URL);
                  ws.onopen = () => { sendRequest({ authorize: tokenValue }); };
                  ws.onmessage = (e) => { const data = JSON.parse(e.data); handleMessage(data); };
                  ws.onclose = () => { isConnected = false; logStatus("Disconnected"); strategyStatusSpan.innerText = "● INACTIVE"; };
                  ws.onerror = (err) => { logStatus("WebSocket error", true); };
              }
              
              // UI event handlers
              document.getElementById("connectBtn").onclick = () => {
                  const tokenInput = document.getElementById("apiToken").value.trim();
                  if (!tokenInput) { alert("Enter Deriv API token"); return; }
                  token = tokenInput;
                  connect(token);
                  document.getElementById("connectBtn").style.display = "none";
                  document.getElementById("disconnectBtn").style.display = "inline-block";
              };
              document.getElementById("disconnectBtn").onclick = () => {
                  if (ws) ws.close();
                  isConnected = false;
                  document.getElementById("connectBtn").style.display = "inline-block";
                  document.getElementById("disconnectBtn").style.display = "none";
                  strategyStatusSpan.innerText = "● INACTIVE";
              };
          </script>
          </body>
          </html>
          EOF

          # ----- AndroidManifest.xml (dragon icon) -----
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application android:allowBackup="true" android:icon="@drawable/ic_dragon_launcher" android:label="SIMIYUFX" android:usesCleartextTraffic="true" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # ----- styles.xml -----
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar" />
          </resources>
          EOF

          # ----- build.gradle (root) -----
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          EOF

          # ----- settings.gradle -----
          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SIMIYUFX"
          include ':app'
          EOF

          # ----- app/build.gradle (minimal) -----
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.deriv.choch'
              compileSdk 34

              defaultConfig {
                  applicationId "com.deriv.choch"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
          }
          EOF

          # ----- gradle.properties -----
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.suppressUnsupportedCompileSdk=34
          EOF

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0 --distribution-type all
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SIMIYUFX-CHOCH-Strategy
          path: app/build/outputs/apk/debug/*.apk
