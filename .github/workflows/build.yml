name: Build TradeFlow Bot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/tradeflow/bot
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable

          # -------------------- build.gradle (root) --------------------
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          EOF

          # -------------------- settings.gradle --------------------
          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "TradeFlowBot"
          include ':app'
          EOF

          # -------------------- gradle.properties --------------------
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.suppressUnsupportedCompileSdk=34
          EOF

          # -------------------- app/build.gradle --------------------
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace 'com.tradeflow.bot'
              compileSdk 34

              defaultConfig {
                  applicationId "com.tradeflow.bot"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'androidx.cardview:cardview:1.0.0'
          }

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
              }
          }
          EOF

          # -------------------- AndroidManifest.xml --------------------
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />

              <application
                  android:label="TradeFlow Bot"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:allowBackup="true"
                  android:icon="@android:drawable/ic_dialog_info"
                  android:supportsRtl="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".TradingService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="dataSync" />

              </application>
          </manifest>
          EOF

          # -------------------- styles.xml --------------------
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar" />
          </resources>
          EOF

          # -------------------- colors.xml --------------------
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="primary_text">#1F3A4B</color>
              <color name="success">#15803D</color>
              <color name="danger">#C2410C</color>
              <color name="facebook">#1877F2</color>
              <color name="whatsapp">#25D366</color>
              <color name="background">#EEF2F5</color>
              <color name="card_bg">#FFFFFF</color>
          </resources>
          EOF

          # -------------------- activity_main.xml --------------------
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#EEF2F5"
              android:fillViewport="true">

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:padding="16dp">

                  <!-- Header -->
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:gravity="space_between"
                      android:layout_marginBottom="20dp">

                      <TextView
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="TradeFlow Bot"
                          android:textSize="24sp"
                          android:textStyle="bold"
                          android:textColor="#1F3A4B"/>

                      <LinearLayout
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:orientation="horizontal">

                          <Button
                              android:id="@+id/facebookBtn"
                              android:layout_width="48dp"
                              android:layout_height="48dp"
                              android:text="📘"
                              android:backgroundTint="#1877F2"
                              android:layout_marginEnd="8dp"
                              android:tooltipText="Facebook"/>

                          <Button
                              android:id="@+id/whatsappBtn"
                              android:layout_width="48dp"
                              android:layout_height="48dp"
                              android:text="💬"
                              android:backgroundTint="#25D366"
                              android:tooltipText="WhatsApp"/>
                      </LinearLayout>
                  </LinearLayout>
                   <!-- Password Overlay -->
                  <LinearLayout
                      android:id="@+id/passwordOverlay"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"
                      android:gravity="center"
                      android:padding="20dp">

                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="Enter Password"
                          android:textSize="22sp"
                          android:textStyle="bold"
                          android:layout_marginBottom="20dp"/>

                      <EditText
                          android:id="@+id/passwordInput"
                          android:layout_width="match_parent"
                          android:layout_height="55dp"
                          android:hint="Password"
                          android:inputType="textPassword"
                          android:padding="12dp"
                          android:background="@android:drawable/editbox_background"
                          android:layout_marginBottom="15dp"/>

                      <Button
                          android:id="@+id/unlockBtn"
                          android:layout_width="match_parent"
                          android:layout_height="55dp"
                          android:text="UNLOCK DASHBOARD"
                          android:backgroundTint="#1F3A4B"/>

                      <TextView
                          android:id="@+id/passwordError"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:text=""
                          android:textColor="#C2410C"
                          android:gravity="center"
                          android:layout_marginTop="10dp"/>
                  </LinearLayout>

                  <!-- Dashboard Content -->
                  <LinearLayout
                      android:id="@+id/dashboardContent"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"
                      android:visibility="gone">

                      <!-- Internet Status -->
                      <TextView
                          android:id="@+id/internetStatus"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:text="🌐 Internet: Checking..."
                          android:padding="12dp"
                          android:background="#FFFFFF"
                          android:gravity="center"
                          android:layout_marginBottom="8dp"
                          android:fontFamily="monospace"/>

                      <!-- Alarm Banner -->
                      <TextView
                          android:id="@+id/alarmBanner"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:text="⚠️ INTERNET CONNECTION LOST! ⚠️"
                          android:background="#C2410C"
                          android:textColor="#FFFFFF"
                          android:gravity="center"
                          android:padding="12dp"
                          android:visibility="gone"
                          android:textStyle="bold"/>

                      <!-- Bot Control Card -->
                      <androidx.cardview.widget.CardView
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:layout_marginBottom="12dp"
                          app:cardCornerRadius="24dp"
                          app:cardElevation="4dp"
                          app:cardUseCompatPadding="true">

                          <LinearLayout
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="vertical"
                              android:padding="16dp">

                              <TextView
                                  android:text="🤖 Bot Control"
                                  android:textSize="18sp"
                                  android:textStyle="bold"
                                  android:textColor="#1F3A4B"
                                  android:layout_marginBottom="12dp"/>

                              <LinearLayout
                                  android:layout_width="match_parent"
                                  android:layout_height="wrap_content"
                                  android:orientation="horizontal"
                                  android:layout_marginBottom="12dp">

                                  <TextView
                                      android:layout_width="0dp"
                                      android:layout_weight="1"
                                      android:text="Status: "
                                      android:textSize="14sp"/>

                                  <TextView
                                      android:id="@+id/botStatus"
                                      android:layout_width="0dp"
                                      android:layout_weight="1"
                                      android:text="INACTIVE"
                                      android:textColor="#9CA3AF"
                                      android:textStyle="bold"/>

                                  <TextView
                                      android:id="@+id/uptimeTimer"
                                      android:layout_width="0dp"
                                      android:layout_weight="1"
                                      android:text="00:00:00"
                                      android:fontFamily="monospace"
                                      android:textSize="12sp"/>
                              </LinearLayout>

                              <LinearLayout
                                  android:layout_width="match_parent"
                                  android:layout_height="wrap_content"
                                  android:orientation="horizontal">

                                  <Button
                                      android:id="@+id/startBotBtn"
                                      android:layout_width="0dp"
                                      android:layout_weight="1"
                                      android:layout_height="50dp"
                                      android:text="▶ START"
                                      android:backgroundTint="#15803D"
                                      android:layout_marginEnd="8dp"/>

                                  <Button
                                      android:id="@+id/stopBotBtn"
                                      android:layout_width="0dp"
                                      android:layout_weight="1"
                                      android:layout_height="50dp"
                                      android:text="⏹ STOP"
                                      android:backgroundTint="#B91C1C"/>
                              </LinearLayout>

                              <!-- Balance Display -->
                              <TextView
                                  android:id="@+id/balanceText"
                                  android:layout_width="match_parent"
                                  android:layout_height="wrap_content"
                                  android:text="💰 Balance: Loading..."
                                  android:padding="12dp"
                                  android:layout_marginTop="12dp"
                                  android:background="#F0F0F0"
                                  android:gravity="center"
                                  android:textStyle="bold"
                                  android:fontFamily="monospace"/>
                          </LinearLayout>
                      </androidx.cardview.widget.CardView>

                      <!-- Statistics Row 1 -->
                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="horizontal"
                          android:layout_marginBottom="12dp">

                          <androidx.cardview.widget.CardView
                              android:layout_width="0dp"
                              android:layout_weight="1"
                              android:layout_marginEnd="6dp"
                              app:cardCornerRadius="20dp"
                              app:cardElevation="2dp">

                              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                                  android:orientation="vertical" android:padding="12dp" android:gravity="center">
                                  <TextView text="✅ Wins" android:textSize="12sp" android:textColor="#6B7280"/>
                                  <TextView android:id="@+id/winsCount" text="0" android:textSize="28sp" 
                                      android:textStyle="bold" android:textColor="#15803D"/>
                              </LinearLayout>
                          </androidx.cardview.widget.CardView>

                          <androidx.cardview.widget.CardView
                              android:layout_width="0dp"
                              android:layout_weight="1"
                              android:layout_marginStart="6dp"
                              app:cardCornerRadius="20dp"
                              app:cardElevation="2dp">

                              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                                  android:orientation="vertical" android:padding="12dp" android:gravity="center">
                                  <TextView text="❌ Losses" android:textSize="12sp" android:textColor="#6B7280"/>
                                  <TextView android:id="@+id/lossesCount" text="0" android:textSize="28sp" 
                                      android:textStyle="bold" android:textColor="#C2410C"/>
                              </LinearLayout>
                          </androidx.cardview.widget.CardView>
                      </LinearLayout>

                      <!-- Statistics Row 2 -->
                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="horizontal"
                          android:layout_marginBottom="12dp">

                          <androidx.cardview.widget.CardView
                              android:layout_width="0dp"
                              android:layout_weight="1"
                              android:layout_marginEnd="6dp"
                              app:cardCornerRadius="20dp"
                              app:cardElevation="2dp">

                              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                                  android:orientation="vertical" android:padding="12dp" android:gravity="center">
                                  <TextView text="🔥 Consecutive Wins" android:textSize="12sp" android:textColor="#6B7280"/>
                                  <TextView android:id="@+id/consecutiveWins" text="0" android:textSize="20sp" 
                                      android:textStyle="bold"/>
                              </LinearLayout>
                          </androidx.cardview.widget.CardView>

                          <androidx.cardview.widget.CardView
                              android:layout_width="0dp"
                              android:layout_weight="1"
                              android:layout_marginStart="6dp"
                              app:cardCornerRadius="20dp"
                              app:cardElevation="2dp">

                              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                                  android:orientation="vertical" android:padding="12dp" android:gravity="center">
                                  <TextView text="📉 Consecutive Losses" android:textSize="12sp" android:textColor="#6B7280"/>
                                  <TextView android:id="@+id/consecutiveLosses" text="0" android:textSize="20sp" 
                                      android:textStyle="bold"/>
                              </LinearLayout>
                          </androidx.cardview.widget.CardView>
                      </LinearLayout>

                      <!-- Statistics Row 3 -->
                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="horizontal"
                          android:layout_marginBottom="12dp">

                          <androidx.cardview.widget.CardView
                              android:layout_width="0dp"
                              android:layout_weight="1"
                              android:layout_marginEnd="6dp"
                              app:cardCornerRadius="20dp"
                              app:cardElevation="2dp">

                              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                                  android:orientation="vertical" android:padding="12dp" android:gravity="center">
                                  <TextView text="📊 Win Rate" android:textSize="12sp" android:textColor="#6B7280"/>
                                  <TextView android:id="@+id/winRate" text="0%" android:textSize="20sp" 
                                      android:textStyle="bold"/>
                              </LinearLayout>
                          </androidx.cardview.widget.CardView>

                          <androidx.cardview.widget.CardView
                              android:layout_width="0dp"
                              android:layout_weight="1"
                              android:layout_marginStart="6dp"
                              app:cardCornerRadius="20dp"
                              app:cardElevation="2dp">
                              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                                  android:orientation="vertical" android:padding="12dp" android:gravity="center">
                                  <TextView text="💰 Total P/L" android:textSize="12sp" android:textColor="#6B7280"/>
                                  <TextView android:id="@+id/totalPL" text="$0.00" android:textSize="20sp" 
                                      android:textStyle="bold"/>
                              </LinearLayout>
                          </androidx.cardview.widget.CardView>
                      </LinearLayout>

                      <!-- Progress Bar for P/L -->
                      <androidx.cardview.widget.CardView
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:layout_marginBottom="12dp"
                          app:cardCornerRadius="20dp"
                          app:cardElevation="2dp">

                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                              android:orientation="vertical" android:padding="12dp">
                              <TextView text="Profit/Loss Progress" android:textSize="12sp" android:textColor="#6B7280"/>
                              <ProgressBar
                                  android:id="@+id/progressBar"
                                  style="?android:attr/progressBarStyleHorizontal"
                                  android:layout_width="match_parent"
                                  android:layout_height="12dp"
                                  android:layout_marginTop="8dp"
                                  android:max="100"
                                  android:progress="50" />
                          </LinearLayout>
                      </androidx.cardview.widget.CardView>

                      <!-- Active Trades -->
                      <TextView
                          android:text="📈 ACTIVE TRADES (from Deriv)"
                          android:textSize="16sp"
                          android:textStyle="bold"
                          android:textColor="#1F3A4B"
                          android:layout_marginTop="8dp"
                          android:layout_marginBottom="8dp"/>

                      <LinearLayout
                          android:id="@+id/activeTradesContainer"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"
                          android:layout_marginBottom="12dp"/>

                      <!-- Trade History -->
                      <TextView
                          android:text="📜 TRADE HISTORY"
                          android:textSize="16sp"
                          android:textStyle="bold"
                          android:textColor="#1F3A4B"
                          android:layout_marginTop="8dp"
                          android:layout_marginBottom="8dp"/>

                      <androidx.cardview.widget.CardView
                          android:layout_width="match_parent"
                          android:layout_height="200dp"
                          android:layout_marginBottom="12dp"
                          app:cardCornerRadius="16dp"
                          app:cardElevation="2dp">

                          <ScrollView android:layout_width="match_parent" android:layout_height="match_parent">
                              <LinearLayout
                                  android:id="@+id/historyContainer"
                                  android:layout_width="match_parent"
                                  android:layout_height="wrap_content"
                                  android:orientation="vertical"
                                  android:padding="8dp"/>
                          </ScrollView>
                      </androidx.cardview.widget.CardView>

                      <!-- Watchlist -->
                      <TextView
                          android:text="👀 WATCHLIST (28 Forex Pairs)"
                          android:textSize="16sp"
                          android:textStyle="bold"
                          android:textColor="#1F3A4B"
                          android:layout_marginTop="8dp"
                          android:layout_marginBottom="8dp"/>

                      <androidx.cardview.widget.CardView
                          android:layout_width="match_parent"
                          android:layout_height="150dp"
                          android:layout_marginBottom="12dp"
                          app:cardCornerRadius="16dp"
                          app:cardElevation="2dp">

                          <ScrollView android:layout_width="match_parent" android:layout_height="match_parent">
                              <LinearLayout
                                  android:id="@+id/watchlistContainer"
                                  android:layout_width="match_parent"
                                  android:layout_height="wrap_content"
                                  android:orientation="vertical"
                                  android:padding="8dp"/>
                          </ScrollView>
                      </androidx.cardview.widget.CardView>

                      <!-- Event Log -->
                      <TextView
                          android:text="📡 EVENT LOG (Liquidity + CHoCH)"
                          android:textSize="16sp"
                          android:textStyle="bold"
                          android:textColor="#1F3A4B"
                          android:layout_marginTop="8dp"
                          android:layout_marginBottom="8dp"/>

                      <androidx.cardview.widget.CardView
                          android:layout_width="match_parent"
                          android:layout_height="150dp"
                          android:layout_marginBottom="12dp"
                          app:cardCornerRadius="16dp"
                          app:cardElevation="2dp">

                          <ScrollView android:layout_width="match_parent" android:layout_height="match_parent">
                              <LinearLayout
                                  android:id="@+id/eventLogContainer"
                                  android:layout_width="match_parent"
                                  android:layout_height="wrap_content"
                                  android:orientation="vertical"
                                  android:padding="8dp"/>
                          </ScrollView>
                      </androidx.cardview.widget.CardView>

                      <!-- Developer Bio -->
                      <androidx.cardview.widget.CardView
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:layout_marginBottom="20dp"
                          app:cardCornerRadius="20dp"
                          app:cardElevation="2dp">

                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                              android:orientation="vertical" android:padding="16dp">

                              <TextView
                                  android:text="👨‍💻 Peter Simiyu"
                                  android:textSize="18sp"
                                  android:textStyle="bold"
                                  android:textColor="#1F3A4B"
                                  android:layout_marginBottom="8dp"/>

                              <TextView
                                  android:text="Peter Simiyu is a passionate Kenyan coder and forex trader from Nairobi. He built this trading bot to bridge the gap between algorithmic trading and real market psychology. With over five years of experience in both software development and financial markets, Peter believes that discipline and data drive success. He loves solving complex problems, writing clean code, and analyzing price action. When he is not coding, Peter enjoys drinking black coffee, studying liquidity concepts, and mentoring young developers. His mission is to create tools that empower retail traders with institutional-grade insights. This dashboard represents his vision of combining automation with human oversight."
                                  android:textSize="12sp"
                                  android:textColor="#4B5563"
                                  android:lineSpacingExtra="2dp"/>
                          </LinearLayout>
                      </androidx.cardview.widget.CardView>

                      <!-- API Token Input -->
                      <androidx.cardview.widget.CardView
                          android:id="@+id/apiCard"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:layout_marginBottom="20dp"
                          app:cardCornerRadius="20dp"
                          app:cardElevation="2dp"
                          android:visibility="gone">

                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                              android:orientation="vertical" android:padding="16dp">

                              <TextView text="🔑 Deriv API Settings" android:textSize="16sp" android:textStyle="bold"
                                  android:layout_marginBottom="12dp"/>

                              <EditText
                                  android:id="@+id/apiTokenInput"
                                  android:layout_width="match_parent"
                                  android:layout_height="55dp"
                                  android:hint="API Token"
                                  android:inputType="textPassword"
                                  android:padding="12dp"
                                  android:background="@android:drawable/editbox_background"
                                  android:layout_marginBottom="12dp"/>

                              <EditText
                                  android:id="@+id/accountIdInput"
                                  android:layout_width="match_parent"
                                  android:layout_height="55dp"
                                  android:hint="Account ID (e.g., VRTC1234567)"
                                  android:padding="12dp"
                                  android:background="@android:drawable/editbox_background"
                                  android:layout_marginBottom="12dp"/>

                              <Button
                                  android:id="@+id/saveApiBtn"
                                  android:layout_width="match_parent"
                                  android:layout_height="50dp"
                                  android:text="SAVE & CONNECT"
                                  android:backgroundTint="#1F3A4B"/>
                          </LinearLayout>
                      </androidx.cardview.widget.CardView>

                  </LinearLayout>
              </LinearLayout>
          </ScrollView>
          EOF

          # -------------------- MainActivity.java --------------------
          cat > app/src/main/java/com/tradeflow/bot/MainActivity.java << 'EOF'
          package com.tradeflow.bot;

          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.VibrationEffect;
          import android.os.Vibrator;
          import android.view.View;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.ProgressBar;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
