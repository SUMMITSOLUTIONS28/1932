          # -------------------- LiquidityCHoCHStrategy.java --------------------
          cat > app/src/main/java/com/deriv/trader/LiquidityCHoCHStrategy.java << 'EOF'
          package com.deriv.trader;

          import com.google.gson.JsonObject;
          import com.google.gson.JsonParser;
          import java.util.ArrayList;
          import java.util.HashMap;
          import java.util.List;
          import java.util.Map;

          public class LiquidityCHoCHStrategy {
              private final DerivWebSocket derivWS;
              private final RiskManager riskManager;
              private final LogCallback logCallback;
              
              private Map<String, List<Double>> priceHistory = new HashMap<>();
              private Map<String, List<Double>> highs = new HashMap<>();
              private Map<String, List<Double>> lows = new HashMap<>();
              private boolean isScanning = true;
              
              private String[] timeframes45 = {"45"};
              private String[] timeframes30 = {"30"};
              private String[] timeframes15 = {"15"};
              private String[] timeframes5 = {"5"};
              private String[] chochTimeframesLarge = {"3", "5"};
              private String[] chochTimeframesSmall = {"1", "2", "3"};
              
              private String[] forexPairs = {
                  "EURUSD", "USDJPY", "AUDUSD", "NZDUSD", "USDCAD", "USDCHF",
                  "EURJPY", "EURGBP", "EURAUD", "EURNZD", "EURCAD", "EURCHF",
                  "GBPJPY", "GBPAUD", "GBPCAD", "GBPNZD", "GBPCHF",
                  "AUDJPY", "AUDNZD", "AUDCAD", "AUDCHF", "CADJPY", "CADCHF",
                  "CHFJPY", "NZDJPY", "NZDCAD", "NZDCHF"
              };

              public interface LogCallback { void onLog(String message); }

              public LiquidityCHoCHStrategy(DerivWebSocket derivWS, RiskManager riskManager, LogCallback logCallback) {
                  this.derivWS = derivWS;
                  this.riskManager = riskManager;
                  this.logCallback = logCallback;
                  startScanning();
              }

              private void startScanning() {
                  for (String pair : forexPairs) {
                      if (!pair.equals("GBPUSD")) {
                          derivWS.subscribeTicks(pair);
                          priceHistory.put(pair, new ArrayList<>());
                          highs.put(pair, new ArrayList<>());
                          lows.put(pair, new ArrayList<>());
                      }
                  }
                  logCallback.onLog("Started scanning " + forexPairs.length + " forex pairs");
              }

              public void processMessage(String message) {
                  try {
                      JsonObject json = JsonParser.parseString(message).getAsJsonObject();
                      
                      if (json.has("tick")) {
                          JsonObject tick = json.getAsJsonObject("tick");
                          String symbol = tick.get("symbol").getAsString();
                          double price = tick.get("quote").getAsDouble();
                          processTick(symbol, price);
                      }
                      
                      if (json.has("authorize")) {
                          boolean authorized = json.get("authorize").getAsJsonObject().get("authorized").getAsBoolean();
                          if (authorized) {
                              logCallback.onLog("Authorized with Deriv - Strategy active");
                          }
                      }
                      
                      if (json.has("buy")) {
                          JsonObject buy = json.getAsJsonObject("buy");
                          if (buy.has("contract_id")) {
                              logCallback.onLog("Trade executed! Contract: " + buy.get("contract_id").getAsString());
                              riskManager.addActiveTrade();
                          }
                      }
                  } catch (Exception e) {
                      // Parse error, ignore
                  }
              }

              private void processTick(String symbol, double price) {
                  if (!priceHistory.containsKey(symbol)) return;
                  
                  List<Double> prices = priceHistory.get(symbol);
                  prices.add(price);
                  if (prices.size() > 1000) prices.remove(0);
                  
                  // Track highs and lows
                  List<Double> highList = highs.get(symbol);
                  List<Double> lowList = lows.get(symbol);
                  
                  if (highList.isEmpty() || price > highList.get(highList.size() - 1)) {
                      highList.add(price);
                  }
                  if (lowList.isEmpty() || price < lowList.get(lowList.size() - 1)) {
                      lowList.add(price);
                  }
                  if (highList.size() > 100) highList.remove(0);
                  if (lowList.size() > 100) lowList.remove(0);
                  
                  // Check for liquidity sweep and CHoCH
                  checkLiquidityAndCHoCH(symbol, price, prices);
              }

              private void checkLiquidityAndCHoCH(String symbol, double currentPrice, List<Double> prices) {
                  if (prices.size() < 50) return;
                  if (!riskManager.canTakeTrade()) return;
                  
                  // Find recent high and low
                  double recentHigh = prices.subList(Math.max(0, prices.size() - 50), prices.size()).stream().max(Double::compare).orElse(0);
                  double recentLow = prices.subList(Math.max(0, prices.size() - 50), prices.size()).stream().min(Double::compare).orElse(0);
                  double previousHigh = prices.subList(Math.max(0, prices.size() - 100), Math.max(0, prices.size() - 50)).stream().max(Double::compare).orElse(0);
                  double previousLow = prices.subList(Math.max(0, prices.size() - 100), Math.max(0, prices.size() - 50)).stream().min(Double::compare).orElse(0);
                  
                  // Detect liquidity sweep: price breaks previous high/low
                  boolean highSwept = currentPrice > previousHigh;
                  boolean lowSwept = currentPrice < previousLow;
                  
                  if (highSwept || lowSwept) {
                      // Check for CHoCH after sweep
                      boolean chochFound = checkCHoCH(prices);
                      
                      if (chochFound) {
                          logCallback.onLog(symbol + ": Liquidity Sweep + CHoCH detected!");
                          
                          // Calculate 40% retracement entry
                          double entryPrice = calculate40PercentRetracement(recentHigh, recentLow, highSwept);
                          boolean isBuy = !highSwept; // If high swept, we go SHORT, if low swept, we go LONG
                          
                          double stopLoss = riskManager.calculateStopLoss(entryPrice, isBuy, 0.001);
                          double takeProfit = riskManager.calculateTakeProfit(entryPrice, stopLoss, isBuy);
                          
                          logCallback.onLog(symbol + ": Entry=" + entryPrice + " SL=" + stopLoss + " TP=" + takeProfit);
                          
                          // Execute trade
                          double stake = 0.50;
                          derivWS.buyContract(symbol, stake, 60, "t");
                      } else {
                          logCallback.onLog(symbol + ": Liquidity Sweep + Failed CHoCH");
                      }
                  }
              }
              
              private boolean checkCHoCH(List<Double> prices) {
                  if (prices.size() < 20) return false;
                  
                  // Simple CHoCH detection: recent price action reverses direction
                  double avgLast5 = prices.subList(prices.size() - 5, prices.size()).stream().mapToDouble(Double::doubleValue).average().orElse(0);
                  double avgPrev5 = prices.subList(prices.size() - 10, prices.size() - 5).stream().mapToDouble(Double::doubleValue).average().orElse(0);
                  
                  // If direction changed significantly
                  return Math.abs(avgLast5 - avgPrev5) > 0.0005;
              }
              
              private double calculate40PercentRetracement(double high, double low, boolean isHighSwept) {
                  double range = high - low;
                  double retracement40 = range * 0.4;
                  
                  if (isHighSwept) {
                      // High swept means price went up then retraced down - SELL at 40% down from high
                      return high - retracement40;
                  } else {
                      // Low swept means price went down then retraced up - BUY at 40% up from low
                      return low + retracement40;
                  }
              }
          }
