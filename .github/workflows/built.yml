                          android:layout_marginBottom="8dp"/>

                      <ScrollView
                          android:layout_width="match_parent"
                          android:layout_height="150dp"
                          android:background="#FFFFFF"
                          android:layout_marginBottom="12dp">

                          <LinearLayout
                              android:id="@+id/watchlistContainer"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="vertical"
                              android:padding="8dp"/>
                      </ScrollView>

                      <!-- Event Log -->
                      <TextView
                          android:text="EVENT LOG (Liquidity + CHoCH)"
                          android:textSize="16sp"
                          android:textStyle="bold"
                          android:textColor="#1F3A4B"
                          android:layout_marginTop="8dp"
                          android:layout_marginBottom="8dp"/>

                      <ScrollView
                          android:layout_width="match_parent"
                          android:layout_height="150dp"
                          android:background="#FFFFFF"
                          android:layout_marginBottom="12dp">

                          <LinearLayout
                              android:id="@+id/eventLogContainer"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="vertical"
                              android:padding="8dp"/>
                      </ScrollView>

                      <!-- Developer Bio -->
                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"
                          android:background="#FFFFFF"
                          android:padding="16dp"
                          android:layout_marginBottom="12dp">

                          <TextView
                              android:text="👨‍💻 Peter Simiyu"
                              android:textSize="18sp"
                              android:textStyle="bold"
                              android:textColor="#1F3A4B"
                              android:layout_marginBottom="8dp"/>

                          <TextView
                              android:text="Peter Simiyu is a passionate Kenyan coder and forex trader from Nairobi. He built this trading bot to bridge the gap between algorithmic trading and real market psychology. With over five years of experience in both software development and financial markets, Peter believes that discipline and data drive success. He loves solving complex problems, writing clean code, and analyzing price action. When he is not coding, Peter enjoys drinking black coffee, studying liquidity concepts, and mentoring young developers. His mission is to create tools that empower retail traders with institutional-grade insights. This dashboard represents his vision of combining automation with human oversight."
                              android:textSize="12sp"
                              android:textColor="#4B5563"
                              android:lineSpacingExtra="2dp"/>
                      </LinearLayout>

                  </LinearLayout>
              </LinearLayout>
          </ScrollView>
          EOF

          # -------------------- MainActivity.java --------------------
          cat > app/src/main/java/com/deriv/trader/MainActivity.java << 'EOF'
          package com.deriv.trader;

          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.text.method.ScrollingMovementMethod;
          import android.view.View;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {

              private LinearLayout passwordOverlay;
              private LinearLayout dashboardContent;
              private EditText passwordInput;
              private Button unlockBtn;
              private TextView passwordError;
              
              private TextView botStatus;
              private TextView uptimeTimer;
              private Button startBotBtn;
              private Button stopBotBtn;
              private TextView winsCount, lossesCount, consecutiveWins, consecutiveLosses, winRate, totalPL;
              private LinearLayout activeTradesContainer;
              private LinearLayout historyContainer;
              private LinearLayout watchlistContainer;
              private LinearLayout eventLogContainer;
              private TextView internetStatus;
              private TextView alarmBanner;
              private Button facebookBtn, whatsappBtn;

              private Handler uiHandler = new Handler(Looper.getMainLooper());
              private boolean isBotRunning = false;
              private long startTime = 0;
              private SharedPreferences prefs;

              private static final String PASSWORD = "P28583s#";
              
              private String[] forexPairs = {
                  "EURUSD", "USDJPY", "AUDUSD", "NZDUSD", "USDCAD", "USDCHF",
                  "EURJPY", "EURGBP", "EURAUD", "EURNZD", "EURCAD", "EURCHF",
                  "GBPJPY", "GBPAUD", "GBPCAD", "GBPNZD", "GBPCHF",
                  "AUDJPY", "AUDNZD", "AUDCAD", "AUDCHF", "CADJPY", "CADCHF",
                  "CHFJPY", "NZDJPY", "NZDCAD", "NZDCHF"
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  prefs = getSharedPreferences("tradeflow_prefs", Context.MODE_PRIVATE);
                  
                  initViews();
                  setupListeners();
                  loadWatchlist();
                  loadTradeHistory();
                  loadEventLog();
                  
                  // Check if already authenticated
                  if (prefs.getBoolean("authenticated", false)) {
                      showDashboard();
                  }
              }

              private void initViews() {
                  passwordOverlay = findViewById(R.id.passwordOverlay);
                  dashboardContent = findViewById(R.id.dashboardContent);
                  passwordInput = findViewById(R.id.passwordInput);
                  unlockBtn = findViewById(R.id.unlockBtn);
                  passwordError = findViewById(R.id.passwordError);
                  
                  botStatus = findViewById(R.id.botStatus);
                  uptimeTimer = findViewById(R.id.uptimeTimer);
                  startBotBtn = findViewById(R.id.startBotBtn);
                  stopBotBtn = findViewById(R.id.stopBotBtn);
                  winsCount = findViewById(R.id.winsCount);
                  lossesCount = findViewById(R.id.lossesCount);
                  consecutiveWins = findViewById(R.id.consecutiveWins);
                  consecutiveLosses = findViewById(R.id.consecutiveLosses);
                  winRate = findViewById(R.id.winRate);
                  totalPL = findViewById(R.id.totalPL);
                  activeTradesContainer = findViewById(R.id.activeTradesContainer);
                  historyContainer = findViewById(R.id.historyContainer);
                  watchlistContainer = findViewById(R.id.watchlistContainer);
                  eventLogContainer = findViewById(R.id.eventLogContainer);
                  internetStatus = findViewById(R.id.internetStatus);
                  alarmBanner = findViewById(R.id.alarmBanner);
                  facebookBtn = findViewById(R.id.facebookBtn);
                  whatsappBtn = findViewById(R.id.whatsappBtn);
              }

              private void setupListeners() {
                  unlockBtn.setOnClickListener(v -> {
                      String entered = passwordInput.getText().toString();
                      if (PASSWORD.equals(entered)) {
                          prefs.edit().putBoolean("authenticated", true).apply();
                          showDashboard();
                      } else {
                          passwordError.setText("Access Denied");
                      }
                  });

                  startBotBtn.setOnClickListener(v -> startBot());
                  stopBotBtn.setOnClickListener(v -> stopBot());
                  
                  facebookBtn.setOnClickListener(v -> {
                      // Replace with your Facebook URL
                      Toast.makeText(this, "Facebook: https://facebook.com/peter.simiyu.trader", Toast.LENGTH_LONG).show();
                  });
                  
                  whatsappBtn.setOnClickListener(v -> {
                      // Replace with your WhatsApp number
                      Toast.makeText(this, "WhatsApp: https://wa.me/254700000000", Toast.LENGTH_LONG).show();
                  });
              }

              private void showDashboard() {
                  passwordOverlay.setVisibility(View.GONE);
                  dashboardContent.setVisibility(View.VISIBLE);
                  
                  // Load saved stats
                  winsCount.setText(String.valueOf(prefs.getInt("wins", 14)));
                  lossesCount.setText(String.valueOf(prefs.getInt("losses", 6)));
                  consecutiveWins.setText(String.valueOf(prefs.getInt("consecutive_wins", 2)));
                  consecutiveLosses.setText(String.valueOf(prefs.getInt("consecutive_losses", 1)));
                  updateWinRate();
                  updateTotalPL();
                  
                  startInternetMonitor();
              }

              private void startBot() {
                  if (!isBotRunning) {
                      isBotRunning = true;
                      startTime = System.currentTimeMillis();
                      botStatus.setText("ACTIVE");
                      botStatus.setTextColor(getColor(android.R.color.holo_green_dark));
                      Toast.makeText(this, "Bot started - connecting to Deriv...", Toast.LENGTH_SHORT).show();
                      
                      // Start trading service
                      Intent serviceIntent = new Intent(this, TradingBotService.class);
                      startForegroundService(serviceIntent);
                      
                      startUptimeTimer();
                  }
              }

              private void stopBot() {
                  if (isBotRunning) {
                      isBotRunning = false;
                      botStatus.setText("INACTIVE");
                      botStatus.setTextColor(getColor(android.R.color.darker_gray));
                      Toast.makeText(this, "Bot stopped", Toast.LENGTH_SHORT).show();
                      
                      // Stop trading service
                      Intent serviceIntent = new Intent(this, TradingBotService.class);
                      stopService(serviceIntent);
                  }
              }

              private void startUptimeTimer() {
                  new Thread(() -> {
                      while (isBotRunning) {
                          try {
                              Thread.sleep(1000);
                              long elapsed = System.currentTimeMillis() - startTime;
                              long hours = (elapsed / 3600000) % 24;
                              long minutes = (elapsed / 60000) % 60;
                              long seconds = (elapsed / 1000) % 60;
                              String time = String.format("%02d:%02d:%02d", hours, minutes, seconds);
                              runOnUiThread(() -> uptimeTimer.setText(time));
                          } catch (InterruptedException e) {
                              break;
                          }
                      }
