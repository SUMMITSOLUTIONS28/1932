                          android:layout_height="wrap_content"
                          android:text="⚠️ INTERNET CONNECTION LOST! ⚠️"
                          android:background="#C2410C"
                          android:textColor="#FFFFFF"
                          android:gravity="center"
                          android:padding="12dp"
                          android:visibility="gone"
                          android:textStyle="bold"/>

                      <!-- Bot Control Card -->
                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"
                          android:background="#FFFFFF"
                          android:padding="16dp"
                          android:layout_marginBottom="12dp"
                          android:baselineAligned="false">

                          <TextView
                              android:text="Bot Control"
                              android:textSize="18sp"
                              android:textStyle="bold"
                              android:textColor="#1F3A4B"
                              android:layout_marginBottom="12dp"/>

                          <LinearLayout
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="horizontal">

                              <TextView
                                  android:layout_width="0dp"
                                  android:layout_weight="1"
                                  android:text="Status: "
                                  android:textSize="16sp"/>

                              <TextView
                                  android:id="@+id/botStatus"
                                  android:layout_width="0dp"
                                  android:layout_weight="1"
                                  android:text="INACTIVE"
                                  android:textColor="#9CA3AF"
                                  android:textStyle="bold"/>

                              <TextView
                                  android:id="@+id/uptimeTimer"
                                  android:layout_width="0dp"
                                  android:layout_weight="1"
                                  android:text="00:00:00"
                                  android:fontFamily="monospace"/>
                          </LinearLayout>

                          <LinearLayout
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="horizontal"
                              android:layout_marginTop="12dp">

                              <Button
                                  android:id="@+id/startBotBtn"
                                  android:layout_width="0dp"
                                  android:layout_weight="1"
                                  android:layout_height="50dp"
                                  android:text="▶ START BOT"
                                  android:backgroundTint="#15803D"
                                  android:layout_marginEnd="8dp"/>

                              <Button
                                  android:id="@+id/stopBotBtn"
                                  android:layout_width="0dp"
                                  android:layout_weight="1"
                                  android:layout_height="50dp"
                                  android:text="⏹ STOP BOT"
                                  android:backgroundTint="#B91C1C"/>
                          </LinearLayout>
                      </LinearLayout>

                      <!-- Statistics Row -->
                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="horizontal"
                          android:layout_marginBottom="12dp">

                          <LinearLayout
                              android:layout_width="0dp"
                              android:layout_weight="1"
                              android:orientation="vertical"
                              android:background="#FFFFFF"
                              android:padding="12dp"
                              android:layout_marginEnd="6dp">

                              <TextView text="Wins" android:textSize="12sp" android:textColor="#6B7280"/>
                              <TextView android:id="@+id/winsCount" text="0" android:textSize="24sp" android:textStyle="bold" android:textColor="#15803D"/>
                          </LinearLayout>
                          <LinearLayout
                              android:layout_width="0dp"
                              android:layout_weight="1"
                              android:orientation="vertical"
                              android:background="#FFFFFF"
                              android:padding="12dp"
                              android:layout_marginStart="6dp">

                              <TextView text="Losses" android:textSize="12sp" android:textColor="#6B7280"/>
                              <TextView android:id="@+id/lossesCount" text="0" android:textSize="24sp" android:textStyle="bold" android:textColor="#C2410C"/>
                          </LinearLayout>
                      </LinearLayout>

                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="horizontal"
                          android:layout_marginBottom="12dp">

                          <LinearLayout
                              android:layout_width="0dp"
                              android:layout_weight="1"
                              android:orientation="vertical"
                              android:background="#FFFFFF"
                              android:padding="12dp"
                              android:layout_marginEnd="6dp">

                              <TextView text="Consecutive Wins" android:textSize="12sp" android:textColor="#6B7280"/>
                              <TextView android:id="@+id/consecutiveWins" text="0" android:textSize="20sp" android:textStyle="bold"/>
                          </LinearLayout>

                          <LinearLayout
                              android:layout_width="0dp"
                              android:layout_weight="1"
                              android:orientation="vertical"
                              android:background="#FFFFFF"
                              android:padding="12dp"
                              android:layout_marginStart="6dp">

                              <TextView text="Consecutive Losses" android:textSize="12sp" android:textColor="#6B7280"/>
                              <TextView android:id="@+id/consecutiveLosses" text="0" android:textSize="20sp" android:textStyle="bold"/>
                          </LinearLayout>
                      </LinearLayout>

                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="horizontal"
                          android:layout_marginBottom="12dp">

                          <LinearLayout
                              android:layout_width="0dp"
                              android:layout_weight="1"
                              android:orientation="vertical"
                              android:background="#FFFFFF"
                              android:padding="12dp"
                              android:layout_marginEnd="6dp">

                              <TextView text="Win Rate" android:textSize="12sp" android:textColor="#6B7280"/>
                              <TextView android:id="@+id/winRate" text="0%" android:textSize="20sp" android:textStyle="bold"/>
                          </LinearLayout>

                          <LinearLayout
                              android:layout_width="0dp"
                              android:layout_weight="1"
                              android:orientation="vertical"
                              android:background="#FFFFFF"
                              android:padding="12dp"
                              android:layout_marginStart="6dp">

                              <TextView text="Total P/L" android:textSize="12sp" android:textColor="#6B7280"/>
                              <TextView android:id="@+id/totalPL" text="$0.00" android:textSize="20sp" android:textStyle="bold"/>
                          </LinearLayout>
                      </LinearLayout>

                      <!-- Active Trades Section -->
                      <TextView
                          android:text="ACTIVE TRADES (3 Slots)"
                          android:textSize="16sp"
                          android:textStyle="bold"
                          android:textColor="#1F3A4B"
                          android:layout_marginTop="8dp"
                          android:layout_marginBottom="8dp"/>

                      <LinearLayout
                          android:id="@+id/activeTradesContainer"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"
                          android:layout_marginBottom="12dp"/>

                      <!-- Trade History -->
                      <TextView
                          android:text="TRADE HISTORY"
                          android:textSize="16sp"
                          android:textStyle="bold"
                          android:textColor="#1F3A4B"
                          android:layout_marginTop="8dp"
                          android:layout_marginBottom="8dp"/>

                      <ScrollView
                          android:layout_width="match_parent"
                          android:layout_height="200dp"
                          android:background="#FFFFFF"
                          android:layout_marginBottom="12dp">

                          <LinearLayout
                              android:id="@+id/historyContainer"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="vertical"
