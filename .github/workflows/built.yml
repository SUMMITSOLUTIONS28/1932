          # -------------------- DerivWebSocket.java --------------------
          cat > app/src/main/java/com/deriv/trader/DerivWebSocket.java << 'EOF'
          package com.deriv.trader;

          import android.util.Log;
          import com.google.gson.Gson;
          import com.google.gson.JsonObject;
          import com.google.gson.JsonParser;
          import okhttp3.OkHttpClient;
          import okhttp3.Request;
          import okhttp3.Response;
          import okhttp3.WebSocket;
          import okhttp3.WebSocketListener;
          import okio.ByteString;
          import java.util.HashMap;
          import java.util.Map;
          import java.util.concurrent.TimeUnit;

          public class DerivWebSocket {
              private final String apiToken;
              private final String appId;
              private final OnMessageListener onMessage;
              private final OnErrorListener onError;
              private WebSocket webSocket;
              private final OkHttpClient client;
              private final Gson gson;
              private int reqId = 1;

              public interface OnMessageListener { void onMessage(String message); }
              public interface OnErrorListener { void onError(String error); }

              public DerivWebSocket(String apiToken, String appId, OnMessageListener onMessage, OnErrorListener onError) {
                  this.apiToken = apiToken;
                  this.appId = appId;
                  this.onMessage = onMessage;
                  this.onError = onError;
                  this.gson = new Gson();
                  this.client = new OkHttpClient.Builder().pingInterval(30, TimeUnit.SECONDS).build();
              }

              public void connect() {
                  Request request = new Request.Builder().url("wss://ws.derivws.com/websockets/v3").build();
                  webSocket = client.newWebSocket(request, new WebSocketListener() {
                      @Override public void onOpen(WebSocket webSocket, Response response) {
                          onMessage.onMessage("Connected");
                          authenticate();
                      }
                      @Override public void onMessage(WebSocket webSocket, String text) { onMessage.onMessage(text); }
                      @Override public void onMessage(WebSocket webSocket, ByteString bytes) { onMessage.onMessage("Binary"); }
                      @Override public void onClosed(WebSocket webSocket, int code, String reason) { onMessage.onMessage("Closed"); }
                      @Override public void onFailure(WebSocket webSocket, Throwable t, Response response) { 
                          onError.onError(t.getMessage()); 
                      }
                  });
              }

              private void authenticate() {
                  Map<String, Object> auth = new HashMap<>();
                  auth.put("authorize", apiToken);
                  auth.put("app_id", Integer.parseInt(appId));
                  auth.put("req_id", reqId++);
                  send(gson.toJson(auth));
              }

              public void subscribeTicks(String symbol) {
                  Map<String, Object> req = new HashMap<>();
                  req.put("ticks", symbol);
                  req.put("subscribe", 1);
                  req.put("req_id", reqId++);
                  send(gson.toJson(req));
              }

              public void buyContract(String symbol, double amount, int duration, String durationUnit) {
                  Map<String, Object> params = new HashMap<>();
                  params.put("amount", amount);
                  params.put("basis", "stake");
                  params.put("contract_type", "CALL");
                  params.put("currency", "USD");
                  params.put("duration", duration);
                  params.put("duration_unit", durationUnit);
                  params.put("symbol", symbol);
                  
                  Map<String, Object> buy = new HashMap<>();
                  buy.put("buy", 1);
                  buy.put("parameters", params);
                  buy.put("req_id", reqId++);
                  send(gson.toJson(buy));
              }

              private void send(String message) {
                  if (webSocket != null) webSocket.send(message);
              }

              public void disconnect() { if (webSocket != null) webSocket.close(1000, null); }
          }
          EOF

          # -------------------- RiskManager.java --------------------
          cat > app/src/main/java/com/deriv/trader/RiskManager.java << 'EOF'
          package com.deriv.trader;

          public class RiskManager {
              private int consecutiveLosses = 0;
              private int activeTrades = 0;
              private static final int MAX_TRADES = 3;
              private static final int STOP_AFTER_LOSSES = 3;

              public boolean canTakeTrade() {
                  if (consecutiveLosses >= STOP_AFTER_LOSSES) return false;
                  if (activeTrades >= MAX_TRADES) return false;
                  return true;
              }
              public void recordLoss() { consecutiveLosses++; }
              public void recordWin() { consecutiveLosses = 0; }
              public void addActiveTrade() { activeTrades++; }
              public void removeActiveTrade() { activeTrades--; }
              public int getActiveTrades() { return activeTrades; }
              public int getConsecutiveLosses() { return consecutiveLosses; }
              public boolean isStopped() { return consecutiveLosses >= STOP_AFTER_LOSSES; }
              
              public double calculateStopLoss(double entryPrice, boolean isBuy, double atr) {
                  double slDistance = 0.0010; // 10 pips default
                  double sl = isBuy ? entryPrice - slDistance : entryPrice + slDistance;
                  return Math.round(sl * 100000.0) / 100000.0;
              }
              
              public double calculateTakeProfit(double entryPrice, double stopLoss, boolean isBuy) {
                  double risk = Math.abs(entryPrice - stopLoss);
                  double reward = risk * 3.0; // 1:3 ratio
                  double tp = isBuy ? entryPrice + reward : entryPrice - reward;
                  return Math.round(tp * 100000.0) / 100000.0;
              }
          }
