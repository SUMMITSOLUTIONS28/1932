          # ==================== HotspotService.java ====================
          cat > app/src/main/java/com/advanced/wifi/HotspotService.java << 'EOF'
          package com.advanced.wifi;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.database.Cursor;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.telephony.SmsManager;
          import android.widget.Toast;
          import androidx.core.app.NotificationCompat;
          import org.json.JSONArray;
          import org.json.JSONObject;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.io.OutputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.net.URLEncoder;
          import java.util.HashMap;
          import java.util.Map;
          import java.util.Timer;
          import java.util.TimerTask;

          public class HotspotService extends Service {
              private SharedPreferences prefs;
              private Map<String, UserData> activeUsers = new HashMap<>();
              private Map<String, UserData> disconnectedUsers = new HashMap<>();
              private Timer expiryTimer;
              private Handler mainHandler = new Handler(Looper.getMainLooper());

              @Override
              public void onCreate() {
                  super.onCreate();
                  prefs = getSharedPreferences("wifi_hotspot", MODE_PRIVATE);
                  
                  NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  if (nm != null && Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel("hotspot_service", "Hotspot Service", NotificationManager.IMPORTANCE_LOW);
                      nm.createNotificationChannel(channel);
                  }
                  
                  Notification notification = new NotificationCompat.Builder(this, "hotspot_service")
                      .setContentTitle("Advanced Astranetworks")
                      .setContentText("WiFi Hotspot is running")
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .build();
                  startForeground(2, notification);
                  
                  loadUsersFromPrefs();
                  startExpiryChecker();
              }

              private void loadUsersFromPrefs() {
                  // Load active users
                  String activeUsersJson = prefs.getString("active_users", "{}");
                  // Load disconnected users with paused time
                  String disconnectedUsersJson = prefs.getString("disconnected_users", "{}");
              }

              private void startExpiryChecker() {
                  expiryTimer = new Timer();
                  expiryTimer.scheduleAtFixedRate(new TimerTask() {
                      @Override
                      public void run() {
                          checkExpiredUsers();
                      }
                  }, 0, 10000);
              }

              private void checkExpiredUsers() {
                  long now = System.currentTimeMillis();
                  Map<String, UserData> updatedActive = new HashMap<>();
                  
                  for (Map.Entry<String, UserData> entry : activeUsers.entrySet()) {
                      if (entry.getValue().expiryTime <= now) {
                          // User expired
                          entry.getValue().status = "EXPIRED";
                          saveToPrefs("expired_" + entry.getKey(), String.valueOf(now));
                      } else {
                          updatedActive.put(entry.getKey(), entry.getValue());
                      }
                  }
                  activeUsers = updatedActive;
                  saveActiveUsersToPrefs();
              }

              public void verifyAndConnect(String userMessage, String userDeviceId, double hours, int priceKsh, String durationDisplay) {
                  new Thread(() -> {
                      try {
                          Thread.sleep(2000);
                          
                          // Check if message already used
                          String usedMessages = prefs.getString("used_messages", "");
                          if (usedMessages.contains(userMessage.substring(0, Math.min(50, userMessage.length())))) {
                              mainHandler.post(() -> sendSmsToUser(userDeviceId, "⚠️ This M-PESA message has already been used. Please use a new payment."));
                              return;
                          }
                             // Read last 10 SMS
                          String lastSms = getLast10SmsMessages();
                          
                          if (lastSms.contains(userMessage.substring(0, Math.min(100, userMessage.length())))) {
                              // Extract phone number
                              String phoneNumber = extractPhoneNumber(userMessage);
                              if (phoneNumber == null) phoneNumber = userDeviceId;
                              
                              // Add user
                              long expiryTime = System.currentTimeMillis() + (long)(hours * 60 * 60 * 1000);
                              UserData user = new UserData(phoneNumber, expiryTime, priceKsh, hours, durationDisplay, System.currentTimeMillis(), 0, "CONNECTED");
                              activeUsers.put(phoneNumber, user);
                              
                              // Save used message
                              String newUsedMessages = usedMessages + "|" + userMessage.substring(0, Math.min(50, userMessage.length()));
                              prefs.edit().putString("used_messages", newUsedMessages).apply();
                              
                              // Update earnings
                              int totalEarnings = prefs.getInt("total_earnings", 0);
                              totalEarnings += priceKsh;
                              prefs.edit().putInt("total_earnings", totalEarnings).apply();
                              
                              // Update total purchased time
                              float totalPurchasedHours = prefs.getFloat("total_purchased_hours", 0);
                              totalPurchasedHours += hours;
                              prefs.edit().putFloat("total_purchased_hours", totalPurchasedHours).apply();
                              
                              saveActiveUsersToPrefs();
                              
                              mainHandler.post(() -> {
                                  sendSmsToUser(phoneNumber, "✅ CONNECTED SUCCESSFULLY!\n\nPlan: " + durationDisplay + "\nAmount: " + priceKsh + " KSH\n\nYou may now browse the internet.");
                                  Toast.makeText(HotspotService.this, "User " + phoneNumber + " connected", Toast.LENGTH_SHORT).show();
                              });
                          } else {
                              mainHandler.post(() -> {
                                  sendSmsToUser(userDeviceId, "❌ VERIFICATION FAILED\n\nPayment not found. Please ensure you sent the correct amount to 0798688920 and paste the full M-PESA message.\n\nContact support on WhatsApp: https://wa.me/254798688920");
                              });
                          }
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }).start();
              }

              private String getLast10SmsMessages() {
                  StringBuilder result = new StringBuilder();
                  Cursor cursor = null;
                  try {
                      cursor = getContentResolver().query(
                          Uri.parse("content://sms/inbox"),
                          null, null, null, "date DESC");
                      
                      if (cursor != null && cursor.moveToFirst()) {
                          int bodyIdx = cursor.getColumnIndex("body");
                          int count = 0;
                          do {
                              if (bodyIdx != -1) {
                                  result.append(cursor.getString(bodyIdx)).append("\n");
                              }
                              count++;
                          } while (cursor.moveToNext() && count < 10);
                      }
                  } catch (SecurityException e) {
                      e.printStackTrace();
                  } finally {
                      if (cursor != null) cursor.close();
                  }
                  return result.toString();
              }

              private String extractPhoneNumber(String message) {
                  java.util.regex.Pattern p = java.util.regex.Pattern.compile("07[0-9]{8}");
                  java.util.regex.Matcher m = p.matcher(message);
                  if (m.find()) {
                      return m.group();
                  }
                  return null;
              }

              private void sendSmsToUser(String phoneNumber, String message) {
                  try {
                      SmsManager smsManager = SmsManager.getDefault();
                      smsManager.sendTextMessage(phoneNumber, null, message, null, null);
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              private void saveActiveUsersToPrefs() {
                  // Save for persistence
              }

              private void saveToPrefs(String key, String value) {
                  prefs.edit().putString(key, value).apply();
              }

              public void disconnectDevice(String phoneNumber) {
                  if (activeUsers.containsKey(phoneNumber)) {
                      UserData user = activeUsers.get(phoneNumber);
                      user.status = "DISCONNECTED";
                      user.pausedTime = System.currentTimeMillis();
                      disconnectedUsers.put(phoneNumber, user);
                      activeUsers.remove(phoneNumber);
                      saveActiveUsersToPrefs();
                  }
              }

              public void reconnectDevice(String phoneNumber) {
                  if (disconnectedUsers.containsKey(phoneNumber)) {
                      UserData user = disconnectedUsers.get(phoneNumber);
                      long elapsedPaused = System.currentTimeMillis() - user.pausedTime;
                      user.expiryTime += elapsedPaused;
                      user.status = "CONNECTED";
                      activeUsers.put(phoneNumber, user);
                      disconnectedUsers.remove(phoneNumber);
                      saveActiveUsersToPrefs();
                  }
              }

              public void disconnectAllDevices() {
                  for (Map.Entry<String, UserData> entry : activeUsers.entrySet()) {
                      entry.getValue().status = "DISCONNECTED";
                      entry.getValue().pausedTime = System.currentTimeMillis();
                      disconnectedUsers.put(entry.getKey(), entry.getValue());
                  }
                  activeUsers.clear();
                  saveActiveUsersToPrefs();
              }

              public void reconnectAllDevices() {
                  for (Map.Entry<String, UserData> entry : disconnectedUsers.entrySet()) {
                      long elapsedPaused = System.currentTimeMillis() - entry.getValue().pausedTime;
                      entry.getValue().expiryTime += elapsedPaused;
                      entry.getValue().status = "CONNECTED";
                      activeUsers.put(entry.getKey(), entry.getValue());
                  }
                  disconnectedUsers.clear();
                  saveActiveUsersToPrefs();
              }

              public Map<String, UserData> getActiveUsers() { return activeUsers; }
              public Map<String, UserData> getDisconnectedUsers() { return disconnectedUsers; }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  if (expiryTimer != null) expiryTimer.cancel();
              }

              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }

              private class UserData {
                  String phoneNumber;
                  long expiryTime;
                  int pricePaid;
                  double hoursPurchased;
                  String durationDisplay;
                  long connectedAt;
                  long pausedTime;
                  String status;
                  
                  UserData(String phoneNumber, long expiryTime, int pricePaid, double hoursPurchased, String durationDisplay, long connectedAt, long pausedTime, String status) {
                      this.phoneNumber = phoneNumber;
                      this.expiryTime = expiryTime;
                      this.pricePaid = pricePaid;
                      this.hoursPurchased = hoursPurchased;
                      this.durationDisplay = durationDisplay;
                      this.connectedAt = connectedAt;
                      this.pausedTime = pausedTime;
                      this.status = status;
                  }
              }
          }
