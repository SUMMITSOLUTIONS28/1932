                  sampleConnected.setPadding(20, 10, 20, 10);
                  sampleConnected.setBackgroundColor(0xFF2D2D2D);
                  sampleConnected.setPadding(20, 20, 20, 20);
                  connectedContainer.addView(sampleConnected);
                  
                  TextView sampleDisconnected = new TextView(this);
                  sampleDisconnected.setText("📱 0711122233\n├─ Paid: 900 KSH\n├─ Purchased: 3 months\n├─ Time Used: 12 days\n├─ Time Remaining: 78 days\n├─ Status: DISCONNECTED\n└─ [ CONNECT ]");
                  sampleDisconnected.setPadding(20, 10, 20, 10);
                  sampleDisconnected.setBackgroundColor(0xFF2D2D2D);
                  sampleDisconnected.setPadding(20, 20, 20, 20);
                  disconnectedContainer.addView(sampleDisconnected);
              }
              
              private String formatHours(float hours) {
                  if (hours < 24) {
                      return (int)hours + " hours";
                  } else if (hours < 720) {
                      return (int)(hours / 24) + " days";
                  } else {
                      return (int)(hours / 720) + " months";
                  }
              }
          }
