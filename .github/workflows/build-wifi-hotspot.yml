          # ==================== WebServerService.java ====================
          cat > app/src/main/java/com/advanced/wifi/WebServerService.java << 'EOF'
          package com.advanced.wifi;

          import android.app.Service;
          import android.content.Intent;
          import android.os.IBinder;
          import com.sun.net.httpserver.HttpServer;
          import com.sun.net.httpserver.HttpHandler;
          import com.sun.net.httpserver.HttpExchange;
          import java.io.IOException;
          import java.io.OutputStream;
          import java.net.InetSocketAddress;
          import java.nio.charset.StandardCharsets;

          public class WebServerService extends Service {
              private HttpServer server;

              @Override
              public void onCreate() {
                  super.onCreate();
                  startWebServer();
              }

              private void startWebServer() {
                  new Thread(() -> {
                      try {
                          server = HttpServer.create(new InetSocketAddress(8080), 0);
                          server.createContext("/", new CaptivePortalHandler());
                          server.setExecutor(null);
                          server.start();
                      } catch (IOException e) {
                          e.printStackTrace();
                      }
                  }).start();
              }

              private class CaptivePortalHandler implements HttpHandler {
                  @Override
                  public void handle(HttpExchange exchange) throws IOException {
                      String html = getCaptivePortalHtml();
                      exchange.getResponseHeaders().set("Content-Type", "text/html; charset=UTF-8");
                      exchange.sendResponseHeaders(200, html.getBytes(StandardCharsets.UTF_8).length);
                      OutputStream os = exchange.getResponseBody();
                      os.write(html.getBytes(StandardCharsets.UTF_8));
                      os.close();
                  }
              }

              private String getCaptivePortalHtml() {
                  return "<!DOCTYPE html>\n" +
                  "<html>\n" +
                  "<head>\n" +
                  "    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n" +
                  "    <title>Advanced Astranetworks</title>\n" +
                  "    <style>\n" +
                  "        * { margin: 0; padding: 0; box-sizing: border-box; }\n" +
                  "        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 20px; }\n" +
                  "        .container { max-width: 600px; margin: 0 auto; }\n" +
                  "        .header { background: linear-gradient(135deg, #e94560, #ff6b6b); padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; color: white; }\n" +
                  "        .trust-badge { background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 50px; display: inline-block; margin-top: 10px; font-size: 12px; }\n" +
                  "        .plans { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }\n" +
                  "        .plan-card { background: white; border-radius: 15px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: transform 0.2s; }\n" +
                  "        .plan-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }\n" +
                  "        .plan-info h3 { font-size: 18px; color: #333; }\n" +
                  "        .plan-info p { color: #666; font-size: 12px; margin-top: 5px; }\n" +
                  "        .plan-price .price { font-size: 24px; font-weight: bold; color: #e94560; }\n" +
                  "        .payment-section { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; display: none; }\n" +
                  "        .payment-number { background: #f0f0f0; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }\n" +
                  "        .payment-number .number { font-size: 28px; font-weight: bold; color: #e94560; letter-spacing: 2px; }\n" +
                  "        textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; font-family: monospace; font-size: 12px; resize: vertical; }\n" +
                  "        .submit-btn { background: linear-gradient(135deg, #e94560, #ff6b6b); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }\n" +
                  "        .support-buttons { display: flex; gap: 10px; margin-top: 20px; }\n" +
                  "        .support-btn { flex: 1; padding: 12px; border-radius: 10px; text-align: center; text-decoration: none; font-weight: bold; }\n" +
                  "        .whatsapp { background: #25D366; color: white; }\n" +
                  "        .facebook { background: #1877F2; color: white; }\n" +
                  "        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #e94560; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }\n" +
                  "        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }\n" +
                  "        .status { margin-top: 15px; padding: 10px; border-radius: 10px; display: none; text-align: center; }\n" +
                  "        .status.success { background: #d4edda; color: #155724; display: block; }\n" +
                  "        .status.error { background: #f8d7da; color: #721c24; display: block; }\n" +
                  "    </style>\n" +
                  "</head>\n" +
                  "<body>\n" +
                  "    <div class=\"container\">\n" +
                  "        <div class=\"header\">\n" +
                  "            <h1>🌐 Advanced Astranetworks</h1>\n" +
                  "            <div class=\"trust-badge\">✓ TRUSTED WI-FI SOURCE ✓ SECURE CONNECTION</div>\n" +
                  "        </div>\n" +
                  "        <div id=\"plansList\" class=\"plans\"></div>\n" +
                  "        <div id=\"paymentSection\" class=\"payment-section\">\n" +
                  "            <h3 id=\"selectedPlanTitle\">Selected Plan</h3>\n" +
                  "            <div class=\"payment-number\">\n" +
                  "                <p>Send payment via M-PESA to:</p>\n" +
                  "                <div class=\"number\">0798688920</div>\n" +
                  "            </div>\n" +
                  "            <textarea id=\"mpesaMessage\" rows=\"4\" placeholder=\"Paste your M-PESA confirmation message here...\"></textarea>\n" +
                  "            <button class=\"submit-btn\" onclick=\"submitPayment()\">✅ SUBMIT & CONNECT</button>\n" +
                  "            <div id=\"loader\" class=\"loader\"></div>\n" +
                  "            <div id=\"statusMessage\" class=\"status\"></div>\n" +
                  "        </div>\n" +
                  "        <div class=\"support-buttons\">\n" +
                  "            <a href=\"https://wa.me/254798688920\" class=\"support-btn whatsapp\">💬 WhatsApp</a>\n" +
                  "            <a href=\"https://www.facebook.com/profile.php?id=100090964671379\" class=\"support-btn facebook\">📘 Facebook</a>\n" +
                  "        </div>\n" +
                  "    </div>\n" +
                  "    <script>\n" +
                  "        const plans = [\n" +
                  "            { duration: \"22 mins 30 secs\", price: 2, hours: 0.375, display: \"22 mins 30 secs\" },\n" +
                  "            { duration: \"45 mins\", price: 3, hours: 0.75, display: \"45 mins\" },\n" +
                  "            { duration: \"1hr 30mins\", price: 5, hours: 1.5, display: \"1hr 30mins\" },\n" +
                  "            { duration: \"2hrs 15mins\", price: 8, hours: 2.25, display: \"2hrs 15mins\" },\n" +
                  "            { duration: \"6hrs\", price: 15, hours: 6, display: \"6hrs\" },\n" +
                  "            { duration: \"9hrs\", price: 20, hours: 9, display: \"9hrs\" },\n" +
                  "            { duration: \"18hrs\", price: 25, hours: 18, display: \"18hrs\" },\n" +
                  "            { duration: \"2 days 6hrs\", price: 60, hours: 54, display: \"2 days 6hrs\" },\n" +
                  "            { duration: \"5 days 6hrs\", price: 100, hours: 126, display: \"5 days 6hrs\" },\n" +
                  "            { duration: \"22 days 12hrs\", price: 200, hours: 540, display: \"22 days 12hrs\" },\n" +
                  "            { duration: \"30 days\", price: 375, hours: 720, display: \"30 days\" },\n" +
                  "            { duration: \"1 month 15 days\", price: 400, hours: 1080, display: \"1 month 15 days\" },\n" +
                  "            { duration: \"2 months\", price: 550, hours: 1440, display: \"2 months\" },\n" +
                  "            { duration: \"3 months\", price: 900, hours: 2160, display: \"3 months\" },\n" +
                  "            { duration: \"4 months\", price: 1350, hours: 2880, display: \"4 months\" },\n" +
                  "            { duration: \"6 months\", price: 1800, hours: 4320, display: \"6 months\" },\n" +
                  "            { duration: \"9 months\", price: 2700, hours: 6480, display: \"9 months\" },\n" +
                  "            { duration: \"1 year\", price: 3600, hours: 8760, display: \"1 year\" }\n" +
                  "        ];\n" +
                  "        let selectedPlan = null;\n" +
                  "\n" +
                  "        function selectPlan(plan) {\n" +
                  "            selectedPlan = plan;\n" +
                  "            document.getElementById('selectedPlanTitle').innerHTML = '📱 Selected: ' + plan.display + ' @ ' + plan.price + ' KSH';\n" +
                  "            document.getElementById('plansList').style.display = 'none';\n" +
                  "            document.getElementById('paymentSection').style.display = 'block';\n" +
                  "            document.getElementById('loader').style.display = 'none';\n" +
                  "            document.getElementById('statusMessage').className = 'status';\n" +
                  "            document.getElementById('statusMessage').style.display = 'none';\n" +
                  "            document.getElementById('mpesaMessage').value = '';\n" +
                  "        }\n" +
                  "\n" +
                  "        function submitPayment() {\n" +
                  "            const message = document.getElementById('mpesaMessage').value.trim();\n" +
                  "            if (!message) { alert('Please paste your M-PESA confirmation message'); return; }\n" +
                  "            if (!selectedPlan) { alert('Please select a plan first'); return; }\n" +
                  "            \n" +
                  "            document.getElementById('loader').style.display = 'block';\n" +
                  "            document.getElementById('statusMessage').style.display = 'none';\n" +
                  "            \n" +
                  "            setTimeout(() => {\n" +
                  "                document.getElementById('loader').style.display = 'none';\n" +
                  "                document.getElementById('statusMessage').className = 'status success';\n" +
                  "                document.getElementById('statusMessage').innerHTML = '✅ SUCCESS! Connected successfully. You may now browse the internet.';\n" +
                  "                document.getElementById('statusMessage').style.display = 'block';\n" +
                  "            }, 5000);\n" +
                  "        }\n" +
                  "\n" +
                  "        function renderPlans() {\n" +
                  "            const container = document.getElementById('plansList');\n" +
                  "            plans.forEach(plan => {\n" +
                  "                const card = document.createElement('div');\n" +
                  "                card.className = 'plan-card';\n" +
                  "                card.onclick = () => selectPlan(plan);\n" +
                  "                card.innerHTML = '<div class=\"plan-info\"><h3>⏱️ ' + plan.display + '</h3><p>📱 1 device only</p></div><div class=\"plan-price\"><div class=\"price\">' + plan.price + '</div><div class=\"ksh\">KSH</div></div>';\n" +
                  "                container.appendChild(card);\n" +
                  "            });\n" +
                  "        }\n" +
                  "        renderPlans();\n" +
                  "    </script>\n" +
                  "</body>\n" +
                  "</html>";
              }

              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  if (server != null) {
                      server.stop(0);
                  }
              }
          }
          EOF

          # ==================== activity_main.xml ====================
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="20dp"
              android:background="#1a1a2e"
              android:gravity="center">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="🌐 Advanced Astranetworks"
                  android:textSize="24sp"
                  android:textColor="#FFFFFF"
                  android:textStyle="bold"
                  android:layout_marginBottom="30dp"/>

              <TextView
                  android:id="@+id/statusText"
