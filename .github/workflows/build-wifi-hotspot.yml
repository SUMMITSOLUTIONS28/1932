yaml
name: Build Advanced Astranetworks WiFi Hotspot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create project files
        run: |
          # Create directory structure
          mkdir -p app/src/main/java/com/advanced/wifi
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # ==================== MainActivity.java ====================
          cat > app/src/main/java/com/advanced/wifi/MainActivity.java << 'EOF'
          package com.advanced.wifi;

          import android.Manifest;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.net.wifi.SoftApConfiguration;
          import android.net.wifi.WifiManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          public class MainActivity extends AppCompatActivity {
              private static final int PERMISSION_REQUEST_CODE = 100;
              private WifiManager wifiManager;
              private TextView statusText, connectedCountText, earningsText;
              private Button startHotspotButton, stopHotspotButton, viewDashboardButton;
              private boolean hotspotActive = false;
              private SharedPreferences prefs;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  wifiManager = (WifiManager) getApplicationContext().getSystemService(Context.WIFI_SERVICE);
                  prefs = getSharedPreferences("wifi_hotspot", MODE_PRIVATE);

                  statusText = findViewById(R.id.statusText);
                  connectedCountText = findViewById(R.id.connectedCountText);
                  earningsText = findViewById(R.id.earningsText);
                  startHotspotButton = findViewById(R.id.startHotspotButton);
                  stopHotspotButton = findViewById(R.id.stopHotspotButton);
                  viewDashboardButton = findViewById(R.id.viewDashboardButton);

                  checkPermissions();
                  updateEarningsDisplay();

                  startHotspotButton.setOnClickListener(v -> startHotspot());
                  stopHotspotButton.setOnClickListener(v -> stopHotspot());
                  viewDashboardButton.setOnClickListener(v -> {
                      Intent intent = new Intent(this, DashboardActivity.class);
                      startActivity(intent);
                  });
              }

              private void checkPermissions() {
                  String[] permissions;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      permissions = new String[]{
                          Manifest.permission.READ_SMS,
                          Manifest.permission.RECEIVE_SMS,
                          Manifest.permission.INTERNET,
                          Manifest.permission.ACCESS_WIFI_STATE,
                          Manifest.permission.CHANGE_WIFI_STATE,
                          Manifest.permission.NEARBY_WIFI_DEVICES,
                          Manifest.permission.FOREGROUND_SERVICE
                      };
                  } else {
                      permissions = new String[]{
                          Manifest.permission.READ_SMS,
                          Manifest.permission.RECEIVE_SMS,
                          Manifest.permission.INTERNET,
                          Manifest.permission.ACCESS_WIFI_STATE,
                          Manifest.permission.CHANGE_WIFI_STATE,
                          Manifest.permission.ACCESS_FINE_LOCATION,
                          Manifest.permission.FOREGROUND_SERVICE
                      };
                  }

                  boolean allGranted = true;
                  for (String perm : permissions) {
                      if (ContextCompat.checkSelfPermission(this, perm) != PackageManager.PERMISSION_GRANTED) {
                          allGranted = false;
                          break;
                      }
                  }

                  if (!allGranted) {
                      ActivityCompat.requestPermissions(this, permissions, PERMISSION_REQUEST_CODE);
                  } else {
                      startBackgroundServices();
                  }
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == PERMISSION_REQUEST_CODE) {
                      boolean allGranted = true;
                      for (int result : grantResults) {
                          if (result != PackageManager.PERMISSION_GRANTED) {
                              allGranted = false;
                              break;
                          }
                      }
                      if (allGranted) {
                          startBackgroundServices();
                          Toast.makeText(this, "All permissions granted", Toast.LENGTH_SHORT).show();
                      } else {
                          Toast.makeText(this, "Permissions required for app to work", Toast.LENGTH_LONG).show();
                      }
                  }
              }

              private void startBackgroundServices() {
                  Intent hotspotIntent = new Intent(this, HotspotService.class);
                  Intent webServerIntent = new Intent(this, WebServerService.class);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      startForegroundService(hotspotIntent);
                      startForegroundService(webServerIntent);
                  } else {
                      startService(hotspotIntent);
                      startService(webServerIntent);
                  }
              }

              private void startHotspot() {
                  if (hotspotActive) {
                      Toast.makeText(this, "Hotspot already active", Toast.LENGTH_SHORT).show();
                      return;
                  }

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      String password = generatePassword();
                      SoftApConfiguration config = new SoftApConfiguration.Builder()
                          .setSsid("Advanced_astranetworks")
                          .setPassphrase(password, SoftApConfiguration.SECURITY_TYPE_WPA2_PSK)
                          .setMaxNumberOfClients(10)
                          .build();
                      
                      wifiManager.setSoftApConfiguration(config);
                      hotspotActive = true;
                      statusText.setText("Hotspot: ACTIVE");
                      statusText.setTextColor(0xFF00FF00);
                      
                      // Save password
                      prefs.edit().putString("hotspot_password", password).apply();
                      
                      Toast.makeText(this, "Hotspot 'Advanced_astranetworks' started\nPassword: " + password, Toast.LENGTH_LONG).show();
                  } else {
                      Toast.makeText(this, "Android 10+ required", Toast.LENGTH_LONG).show();
                  }
              }

              private String generatePassword() {
                  String chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
                  StringBuilder password = new StringBuilder();
                  for (int i = 0; i < 8; i++) {
                      int index = (int) (Math.random() * chars.length());
                      password.append(chars.charAt(index));
                  }
                  return password.toString();
              }

              private void stopHotspot() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      SoftApConfiguration config = new SoftApConfiguration.Builder()
                          .setSsid("Advanced_astranetworks")
                          .setPassphrase("", SoftApConfiguration.SECURITY_TYPE_OPEN)
                          .build();
                      wifiManager.setSoftApConfiguration(config);
                  }
                  hotspotActive = false;
                  statusText.setText("Hotspot: INACTIVE");
                  statusText.setTextColor(0xFFFF0000);
                  Toast.makeText(this, "Hotspot stopped", Toast.LENGTH_SHORT).show();
              }

              private void updateEarningsDisplay() {
                  int earnings = prefs.getInt("total_earnings", 0);
                  earningsText.setText("Total Earnings: " + earnings + " KSH");
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  updateEarningsDisplay();
                  if (hotspotActive) {
                      statusText.setText("Hotspot: ACTIVE");
                      statusText.setTextColor(0xFF00FF00);
                  }
              }
          }
